"attributes":{"property":"og:site_name","content":"https://metrobank.com.ph"},"content":null,"tag":"meta"},{"__typename":"Tag","attributes":{"property":"article:modified_time","content":"2026-02-03T11:31:14Z"},"content":null,"tag":"meta"},{"__typename":"Tag","attributes":{"property":"article:publisher","content":""},"content":null,"tag":"meta"},{"__typename":"Tag","attributes":{"name":"twitter:card","content":"summary_large_image"},"content":null,"tag":"meta"}],"seoSiteKeywords":"","seo":null,"title":"Help \u0026 Support","pageName":"Accounts and Banking Services - Cash Pick-up - Service Fees","backgroundImageColor":"linear-gradient(171.84deg, #003FEC 0%, #01068F 45.6%)","bannerImage":{"__typename":"FileField","url":"https://web-assets.metrobank.com.ph/1758206631-transporter-banner.jpg","focalPoint":{"__typename":"focalPoint","x":0.5,"y":0.5}},"searchItems":[{"__typename":"QuicklinkV2Record","quicklinkV2Text":"Open an account","quicklinkV2Url":"/promos","external":false,"buttonDataName":""},{"__typename":"QuicklinkV2Record","quicklinkV2Text":"ATM","quicklinkV2Url":"https://www.facebook.com/metrobank/","external":true,"buttonDataName":""},{"__typename":"QuicklinkV2Record","quicklinkV2Text":"Debit Cards","quicklinkV2Url":"/home","external":false,"buttonDataName":""},{"__typename":"QuicklinkV2Record","quicklinkV2Text":"Loan","quicklinkV2Url":"/espresso","external":false,"buttonDataName":""},{"__typename":"QuicklinkV2Record","quicklinkV2Text":"Metrobank Online","quicklinkV2Url":"/espresso","external":false,"buttonDataName":""},{"__typename":"QuicklinkV2Record","quicklinkV2Text":"Investment","quicklinkV2Url":"/promos","external":false,"buttonDataName":""}],"filters":[{"__typename":"SearchFiltersV2Record","label":"All Results","value":""},{"__typename":"SearchFiltersV2Record","label":"Articles ","value":"articles"},{"__typename":"SearchFiltersV2Record","label":"Documents","value":"documents"},{"__typename":"SearchFiltersV2Record","label":"Promos","value":"promos"},{"__typename":"SearchFiltersV2Record","label":"Pages","value":"pages"},{"__typename":"SearchFiltersV2Record","label":"FAQs","value":"faqs"}],"pageContent":[{"__typename":"HelpCategorySectionRecord","id":"JgtKV-7aS-mFqcoEL1_ADg","navigationLabel":"","category":{"__typename":"FaqCategoryRecord","name":"Accounts and Banking Services","subcategories":[{"__typename":"FaqSubcategoryRecord","name":"ATMs, CAMs and Branch","slug":"/atms-cams-and-branch","topics":[{"__typename":"FaqTopicRecord","name":"ATM Concerns","displayName":"ATM Concerns","slug":"/atm-concerns","items":[{"__typename":"FaqItemV2Record","question":"My card was captured. What do I do next?","answer":"If your card has been captured by one of our ATM terminals, you may coordinate immediately with the branch where the ATM is located. For ATM terminals outside of any of our branches, you need to call our Contact Center hotline at (02) 88-700-700 or email [customercare@metrobank.com.ph](mailto:customercare@metrobank.com.ph) for assistance."},{"__typename":"FaqItemV2Record","question":"No money was dispensed when I tried to withdraw.","answer":"Please monitor your bank account within 24 hours for your balance to be updated. Otherwise, call our Contact Center at (02) 88-700-700 or email the Customer Service Team: [customercare@metrobank.com.ph](mailto:customercare@metrobank.com.ph)."},{"__typename":"FaqItemV2Record","question":"What are the ATM withdrawal fees and limits?","answer":"\u003cp class=\"styles_p__SERpE\"\u003eSee our ATM fees below:\u003c/p\u003e\n\u003cp class=\"styles_p__SERpE\"\u003e\u003cstrong\u003eMetrobank\u003c/strong\u003e\u003c/p\u003e\n\u003cul class=\"styles_ul__zNcZo\"\u003e\n\u003cli\u003eBalance inquiry and withdrawal -- Free\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"styles_p__SERpE\"\u003e\u003cstrong\u003ePSBank\u003c/strong\u003e\u003c/p\u003e\n\u003cul class=\"styles_ul__zNcZo\"\u003e\n\u003cli\u003eBalance inquiry -- Free\u003c/li\u003e\n\u003cli\u003eWithdrawal -- PHP 7.50\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"styles_p__SERpE\"\u003e\u003cstrong\u003eOther LOCAL cards\u003c/strong\u003e\u003c/p\u003e\n\u003cul class=\"styles_ul__zNcZo\"\u003e\n\u003cli\u003eBalance inquiry -- PHP 2.00\u003c/li\u003e\n\u003cli\u003eWithdrawal -- PHP 18.00\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"styles_p__SERpE\"\u003e\u003cstrong\u003eInternational cards\u003c/strong\u003e\u003c/p\u003e\n\u003cul class=\"styles_ul__zNcZo\"\u003e\n\u003cli\u003eWithdrawal -- \u003cspan\u003ePHP 250 access fee\u003c/span\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"styles_p__SERpE\"\u003e\u003cstrong\u003eWithdrawal limit\u003c/strong\u003e\u003c/p\u003e\n\u003cp class=\"styles_p__SERpE\"\u003e\u003cspan\u003eThe withdrawal limit per transaction is PHP 20,000 for Metrobank cards and PHP 10,000 for non-Metrobank cards.\u003c/span\u003e\u003c/p\u003e\n\u003cp class=\"styles_p__SERpE\"\u003eCall our Contact Center at (02) 88-700-700 should you need to adjust your withdrawal limit.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhen will Metrobank\u0026nbsp;discontinue\u0026nbsp;bills\u0026nbsp;payment, statement print, statement request, and checkbook request on Metrobank ATMs?\u0026nbsp;\u003c/p\u003e","answer":"\u003cp\u003eStarting\u0026nbsp;July 1, 2026,\u0026nbsp;bills\u0026nbsp;payment, statement print, statement request, and checkbook request are no longer available across all Metrobank ATMs nationwide.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhy\u0026nbsp;is\u0026nbsp;Metrobank\u0026nbsp;discontinuing\u0026nbsp;bills\u0026nbsp;payment\u0026nbsp;and other services on\u0026nbsp;Metrobank ATMs?\u0026nbsp;\u003c/p\u003e","answer":"\u003cp\u003eWe\u0026rsquo;re\u0026nbsp;streamlining our ATM services to improve your overall experience. By focusing on essential cash transactions, we can make withdrawals and deposits faster, more stable, and more reliable.\u0026nbsp; \u0026nbsp;\u003c/p\u003e\n\u003cp\u003eFor bills payment and other non-cash services, you may conveniently use the Metrobank App or Metrobank Online site anytime.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhich ATM services are still available?\u003c/p\u003e","answer":"\u003cp\u003eYou can still use Metrobank ATMs for cash withdrawal, balance inquiry, and PIN change, including payroll and credit card cash advances.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eCan I still pay bills on other banks\u0026rsquo; ATMs?\u003c/p\u003e","answer":"\u003cp\u003eBills Payment is also unavailable on other banks\u0026rsquo; ATMs when accessed using a Metrobank Debit or Prepaid Card. You may settle bills via the Metrobank App or Metrobank Online site instead.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eHow can I sign up on the Metrobank App or Metrobank Online site?\u003c/p\u003e","answer":"\u003cp\u003eVisit this\u0026nbsp;\u003ca href=\"https://mcas-proxyweb.mcas.ms/certificate-checker?login=false\u0026amp;originalUrl=https%3A%2F%2Fyoutu.be.mcas.ms%2Fbq6OiimKCmU%3FMcasTsid%3D15600\u0026amp;McasCSRF=e8e4ff5a60dddefe41545edff4dcd721b1eb5716bd7ed3293143a502f484087a\"\u003elink\u003c/a\u003e.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eHow can I pay bills via the Metrobank App or Metrobank Online site?\u003c/p\u003e","answer":"\u003cp\u003eVisit this\u0026nbsp;\u003ca href=\"https://mcas-proxyweb.mcas.ms/certificate-checker?login=false\u0026amp;originalUrl=https%3A%2F%2Fyoutu.be.mcas.ms%2F3jJr4x1WwSA%3FMcasTsid%3D15600\u0026amp;McasCSRF=e8e4ff5a60dddefe41545edff4dcd721b1eb5716bd7ed3293143a502f484087a\"\u003elink\u003c/a\u003e.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eHow can I set up auto debit arrangements on the Metrobank App or Metrobank Online site?\u003c/p\u003e","answer":"\u003cp\u003eVisit this\u0026nbsp;\u003ca href=\"https://mcas-proxyweb.mcas.ms/certificate-checker?login=false\u0026amp;originalUrl=https%3A%2F%2Fwww.metrobank.com.ph.mcas.ms%2Fhelp%2Fdigital-banking%2Fmetrobank-app%2Fauto-debit-arrangement-e-ada-metrobank-app%3Ffaq%3Dhow_to_request_auto_debit_arrangement_eada_in_metrobank_app%26McasTsid%3D15600\u0026amp;McasCSRF=e8e4ff5a60dddefe41545edff4dcd721b1eb5716bd7ed3293143a502f484087a\"\u003elink\u003c/a\u003e.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eHow can I request a statement of account via the Metrobank App and Metrobank Online site?\u003c/p\u003e","answer":"\u003cp\u003eVisit this\u0026nbsp;\u003ca href=\"https://mcas-proxyweb.mcas.ms/certificate-checker?login=false\u0026amp;originalUrl=https%3A%2F%2Fwww.metrobank.com.ph.mcas.ms%2Fhelp%2Fdigital-banking%2Fmetrobank-app%2Fesoa-metrobank-app%3Ffaq%3Dcan_i_download_my_statement_of_account_esoa_through_the_metrobank_app%26McasTsid%3D15600\u0026amp;McasCSRF=e8e4ff5a60dddefe41545edff4dcd721b1eb5716bd7ed3293143a502f484087a\"\u003elink\u003c/a\u003e.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eHow can I order a checkbook via the Metrobank App and Metrobank Online site?\u003c/p\u003e","answer":"\u003cp\u003eVisit this\u0026nbsp;\u003ca href=\"https://mcas-proxyweb.mcas.ms/certificate-checker?login=false\u0026amp;originalUrl=https%3A%2F%2Fwww.metrobank.com.ph.mcas.ms%2Fhelp%2Fdigital-banking%2Fmetrobank-app%2Fcheckbook-metrobank-app%3Ffaq%3Dhow_can_i_order_checkbooks_through_the_metrobank_app_%26McasTsid%3D15600\u0026amp;McasCSRF=e8e4ff5a60dddefe41545edff4dcd721b1eb5716bd7ed3293143a502f484087a\"\u003elink\u003c/a\u003e.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhy are you reducing ATM services instead of adding more?\u003c/p\u003e","answer":"\u003cp\u003e\u003cspan\u003eThis change allows us to improve overall service. This means quicker transactions, shorter wait times, and a more dependable ATM experience for you.\u003c/span\u003e\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eIs this temporary, or will Metrobank bring back these transactions on Metrobank ATMs?\u003c/p\u003e","answer":"\u003cp\u003eThis is permanent and part of Metrobank\u0026rsquo;s long-term ATM modernization efforts. For your other banking transactions and needs, you may conveniently access the Metrobank App or the Metrobank Online site.\u003c/p\u003e"}]},{"__typename":"FaqTopicRecord","name":"Lost Card","displayName":"Lost Card","slug":"/lost-card","items":[{"__typename":"FaqItemV2Record","question":"I lost my debit/prepaid card. What do I do?","answer":"For lost or stolen cards, you need to immediately call our Contact Center hotline at (02) 88-700-700 for your account security. Our bank officers will guide you with the process, including how to get a replacement card. You may also visit any Metrobank branch should you wish to replace the card."},{"__typename":"FaqItemV2Record","question":"I lost my PayCard. How do I get a replacement?","answer":"Inform your company regarding your lost PayCard and you will be issued a replacement card immediately. Your company will then inform Metrobank about the lost card and to transfer all the remaining balance to the new PayCard."}]}]},{"__typename":"FaqSubcategoryRecord","name":"Bank Certificate","slug":"/bank-certificate","topics":[{"__typename":"FaqTopicRecord","name":"General Information - Bank Certificate","displayName":"General Information","slug":"/general-information-bank-certificate","items":[{"__typename":"FaqItemV2Record","question":"How do I apply for a Bank Certificate?","answer":"There are different kinds of Bank Certificates that are issued depending on the purpose and the information needed or required.\n\nYou may ask your Branch of account so they will be able to help determine the right unit who will issue the certificate."},{"__typename":"FaqItemV2Record","question":"How can I verify the authenticity of a Bank Certificate issued by Metrobank?","answer":"Indicated in the certificate issued by the Bank are the Bank officers that you can call to verify its authenticity. For the most common certificates issued, here are the list of officers designated by the Bank to verify certificates. The names below should match those indicated in the certificate you received. This is one of the ways to verify its authenticity.\n\n![](https://web-assets.metrobank.com.ph/1606458027-info-on-how-to-validate.png)"}]}]},{"__typename":"FaqSubcategoryRecord","name":"Cardless Withdrawal","slug":"/cardless-withdrawal","topics":[{"__typename":"FaqTopicRecord","name":"General Information - Cardless withdrawal","displayName":"Cardless withdrawal","slug":"/general-information-cardless-withdrawal","items":[{"__typename":"FaqItemV2Record","question":"What is Cardless Withdrawal?","answer":"Cardless Withdrawal is a feature that lets you withdraw cash from any Metrobank or PSBank ATM without your Metrobank debit card.  \n\nWithdrawing from Metrobank ATM is free, while withdrawing from PSBank ATM has a fee of PHP 7.50."},{"__typename":"FaqItemV2Record","question":"What are the eligible accounts for Cardless Withdrawal?","answer":"All accounts with issued cards, except for Paycard, can be used for Cardless Withdrawal as long as they are enrolled on Metrobank Online or the Metrobank App."},{"__typename":"FaqItemV2Record","question":"How much can I withdraw through Cardless Withdrawal?","answer":"For a single withdrawal, the minimum amount is PHP 100, while the maximum amount is PHP 10,000.  \n\nThe daily maximum withdrawal limit for Cardless Withdrawal is PHP 30,000.  \n\nNote that these limits apply to both cardless withdrawals and withdrawals using debit cards."},{"__typename":"FaqItemV2Record","question":"How do I make a Cardless Withdrawal?","answer":"\u003cp\u003eTo make a Cardless Withdrawal request, follow these steps:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eLog in to the Metrobank App\u003c/li\u003e\n\u003cli\u003eTap \u0026ldquo;Cardless Withdrawal\u0026rdquo; on the Dashboard\u003c/li\u003e\n\u003cli\u003eSelect a source account\u003c/li\u003e\n\u003cli\u003eEnter the amount you wish to withdraw\u003c/li\u003e\n\u003cli\u003eNominate a 4-digit number as your PIN 1, then tap \"Next\"\u003c/li\u003e\n\u003cli\u003eReview and confirm the details\u003c/li\u003e\n\u003cli\u003eEnter your passcode and SMS OTP\u003c/li\u003e\n\u003cli\u003eYou receive a 6-digit number. This is your PIN2.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cp\u003eAfter doing these steps, you can make your cardless withdrawal. Just do this:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eGo to any Metrobank or PSBank ATM\u003c/li\u003e\n\u003cli\u003ePress \"Enter\u0026rdquo;\u003c/li\u003e\n\u003cli\u003eKey in the PIN 1 followed by PIN 2, then the requested amount.\u003c/li\u003e\n\u003c/ol\u003e"},{"__typename":"FaqItemV2Record","question":"What is the difference between PIN1 and PIN2?","answer":"PIN 1 is the 4-digit number you create when making a Cardless Withdrawal request. Do not use repeating or consecutive numbers.\n\nPIN 2 is a 6-digit number generated by the app when you successfully make a Cardless Withdrawal request.\n\nWhen you go to a Metrobank or PSBank ATM to make your cardless withdrawal, key in PIN1 and PIN2."},{"__typename":"FaqItemV2Record","question":"How long is the validity of the Cardless Withdrawal request?","answer":"A Cardless Withdrawal request is valid for 30 minutes only."},{"__typename":"FaqItemV2Record","question":"Can I cancel a Cardless Withdrawal request?","answer":"Yes. You can cancel your Pending Cardless Withdrawal requests.\n\nTo cancel your Cardless Withdrawal request, follow these steps:\n\n1.\tLog in to the Metrobank App\n2.\tTap “Cardless Withdrawal” on the Dashboard \n3.\tSelect the specific pending Cardless Withdrawal request\n4.\tSelect “Cancel Request”\n5.\tProvide your Passcode\n6.\tConfirmation will be provided"},{"__typename":"FaqItemV2Record","question":"Can I withdraw an amount lower than the amount requested?","answer":"No. You cannot make partial withdrawals."},{"__typename":"FaqItemV2Record","question":"If I get see an error message on the ATM for typing incorrect details, can I try again?","answer":"Yes. You have a maximum of three attempts. If you enter incorrect details three times, you will have to create a new request."}]}]},{"__typename":"FaqSubcategoryRecord","name":"Statements of Account","slug":"/statements-of-account","topics":[{"__typename":"FaqTopicRecord","name":"SOA Accessibility","displayName":"SOA Accessibility","slug":"/soa-accessibility","items":[{"__typename":"FaqItemV2Record","question":"Where can I view my Statements of Account (SOAs)?","answer":"You can download your SOAs as a PDF on the Metrobank website using your Metrobank Online username and password at https://statements.metrobank.com.ph/"},{"__typename":"FaqItemV2Record","question":"What web browsers can be used to access to view SOAs?","answer":"You can view and download SOAs on your PC, laptop, or mobile device using any of the following browsers:\n\n* Google Chrome (Minimum: Version 49)\n* Mozilla Firefox (Minimum: Version 52)\n* Microsoft Edge (Minimum: Version 14)\n* Apple Safari (Minimum: Version 10)"},{"__typename":"FaqItemV2Record","question":"How do I access my SOA?","answer":"To access your SOA, you must first enroll in Metrobank Online. Then follow these steps:\n1. Go to statements.metrobank.com.ph or click on the SOA icon on metrobank.com.ph\n2. Log in using your Metrobank Online username and password\n3. Use the options on the screen to select the SOA for the period you want to view and download\n\nIf you are not yet enrolled in Metrobank Online, sign up using the email address and mobile number registered at your branch of account at https://onlinebanking.metrobank.com.ph/signup"},{"__typename":"FaqItemV2Record","question":"How can I download my SOA?","answer":"Access your SOA and take the following steps:\n1. Select an account\n2. Select a period (Daily or monthly SOA)\n3. Choose a day or month and click _Download_\n\nYou will see a message saying, “Your statement of account is being downloaded.”"},{"__typename":"FaqItemV2Record","question":"What is the format of the password for my SOAs?","answer":"The format of the password is XXXX (the last 4 digits of account number) + your date of birth DDMmmMYY.\n\nFor example, if the last 4 digits of your account number are 1234 and your date of birth is June 1, 2001, enter “123401Jun2001” as your password.\n\nIf there are multiple accountholders, use the date of birth of the primary accountholder."}]},{"__typename":"FaqTopicRecord","name":"SOA Information","displayName":"SOA Information","slug":"/soa-information","items":[{"__typename":"FaqItemV2Record","question":"What SOAs are available for download?","answer":"There are two types of SOAs available for download: Daily SOA and Monthly SOA.\n**Daily SOA**\n\nDaily SOAs are made available on the next banking day at 2:00 PM. Only daily SOAs from the past 5 available banking days can be downloaded.\nThis means, if you access your daily SOAs on April 14, 2021:\n\n* Before 2:00 PM, you can download SOAs from April 6-12, 2021* From 2:00 PM onwards, you can download SOAs from April 7-13, 2021\n\nNote that daily SOAs that fall on the last day of the month (or on the 25th of the month, for ATM accounts) are not available. Transactions that fall on these days can be viewed in monthly SOAs.\n\n\u0026nbsp;\n\n**Monthly SOA**\n\nMonthly SOAs are made available on the display transactions for all banking days within the period. Only monthly SOAs from the past 3 months can be downloaded. Note that the earliest monthly SOA available is for April 2021. \nFor ATM accounts, monthly SOAs show transactions from the 26th of the previous month to the 25th of the selected month."},{"__typename":"FaqItemV2Record","question":"What happens if my transactions fall on weekends or holidays?","answer":"Transactions that fall on a weekend or holiday are available on the 2nd banking day afterwards, at 2:00 PM."},{"__typename":"FaqItemV2Record","question":"Why am I getting a message that says “You have no transaction on this date. No statement to display” during SOA download?","answer":"If you get this message, it means either:\n\n* You have no transactions for the selected SOA period\n* Your selected SOA is not yet available"},{"__typename":"FaqItemV2Record","question":"For which types of account can SOAs be generated?","answer":"SOAs can be generated for Savings and Checking accounts enrolled to Metrobank Online only.\n\nA SOA displays an account’s transaction history. For current accounts, you can also see images of checks issued.\n\nIf you cannot see your accounts in the account list for SOAs, please add them to your Metrobank Online account first. To add them, do the following:\n\n1. Log in to Metrobank Online\n2. On the account dashboard, click the **\u003cfont size=5\u003e+\u003c/font\u003e** icon\n3. Enter your account details"},{"__typename":"FaqItemV2Record","question":"What is the meaning of my eSOA transaction?","answer":"\u003ctable style=\"undefined;table-layout: fixed; width: 845px\"\u003e\u003ccolgroup\u003e\n\u003ccol style=\"width: 83.25px\"\u003e\n\u003ccol style=\"width: 249.25px\"\u003e\n\u003ccol style=\"width: 512.25px\"\u003e\n\u003c/colgroup\u003e\n\u003cthead\u003e\n  \u003ctr\u003e\n    \u003cth\u003eProduct\u003c/th\u003e\n    \u003cth\u003eSoa Narrative\u003c/th\u003e\n    \u003cth\u003eDescription\u003c/th\u003e\n  \u003c/tr\u003e\u003c/thead\u003e\n\u003ctbody\u003e\n  \u003ctr\u003e\n    \u003ctd\u003eCASA\u003c/td\u003e\n    \u003ctd\u003eATM Withdrawal\u003c/td\u003e\n    \u003ctd\u003eCash withdrawal from ATM\u003c/td\u003e\n  \u003c/tr\u003e\n  \u003ctr\u003e\n    \u003ctd\u003eCASA\u003c/td\u003e\n    \u003ctd\u003eBills Payment Collection - Cash\u003c/td\u003e\n    \u003ctd\u003ePayment of utilities, investments, loans from subscribers,\u003cbr\u003e investors, borrowers that are paid in cash\u003c/td\u003e\n  \u003c/tr\u003e\n  \u003ctr\u003e\n    \u003ctd\u003eCASA\u003c/td\u003e\n    \u003ctd\u003eCash Deposit\u003c/td\u003e\n    \u003ctd\u003eCash deposit to\u0026nbsp;\u0026nbsp;\u0026nbsp;savings or current accounts \u003c/td\u003e\n  \u003c/tr\u003e\n  \u003ctr\u003e\n    \u003ctd\u003eCASA\u003c/td\u003e\n    \u003ctd\u003eCash Withdrawal\u003c/td\u003e\n    \u003ctd\u003eCash withdrawal from passbook or atm accounts \u003cbr\u003eover-the-counter\u003c/td\u003e\n  \u003c/tr\u003e\n  \u003ctr\u003e\n    \u003ctd\u003eCASA\u003c/td\u003e\n    \u003ctd\u003eCash Withdrawal - Closing\u003c/td\u003e\n    \u003ctd\u003eCash withdrawal by taking out all the account balance with \u003cbr\u003ethe request to close the account over-the-counter\u003c/td\u003e\n  \u003c/tr\u003e\n  \u003ctr\u003e\n    \u003ctd\u003eCASA\u003c/td\u003e\n    \u003ctd\u003eCheck Deposit - Local\u003c/td\u003e\n    \u003ctd\u003eDepositing checks from another bank into \u003cbr\u003ea metrobank savings or current account that requires a \u003cbr\u003eclearing process before the funds are available\u003c/td\u003e\n  \u003c/tr\u003e\n  \u003ctr\u003e\n    \u003ctd\u003eCASA\u003c/td\u003e\n    \u003ctd\u003eCheck Deposit - MBTC\u003c/td\u003e\n    \u003ctd\u003eDepositing Metrobank checks into a metrobank savings\u003cbr\u003e or current account that requires a clearing \u003cbr\u003eprocess before the funds are available\u003c/td\u003e\n  \u003c/tr\u003e\n  \u003ctr\u003e\n    \u003ctd\u003eCASA\u003c/td\u003e\n    \u003ctd\u003eCheck Encashment\u003c/td\u003e\n    \u003ctd\u003eMetrobank check is presented by a payee in exchange of cash\u003c/td\u003e\n  \u003c/tr\u003e\n  \u003ctr\u003e\n    \u003ctd\u003eCASA\u003c/td\u003e\n    \u003ctd\u003eCheck Encashment - Closing\u003c/td\u003e\n    \u003ctd\u003eMetrobank check is presented by the drawer/payee\u003cbr\u003e in exchange of cash and with the intention to close the account\u003c/td\u003e\n  \u003c/tr\u003e\n  \u003ctr\u003e\n    \u003ctd\u003eCASA\u003c/td\u003e\n    \u003ctd\u003eCheck in-clearing\u003c/td\u003e\n    \u003ctd\u003eA metrobank check is presented for deposit or payment then \u003cbr\u003everified and cleared by the servicing branch before funds become available\u003c/td\u003e\n  \u003c/tr\u003e\n  \u003ctr\u003e\n    \u003ctd\u003eCASA\u003c/td\u003e\n    \u003ctd\u003eCM - Account Sweep\u003c/td\u003e\n    \u003ctd\u003eAmount credited from other accounts\u003c/td\u003e\n  \u003c/tr\u003e\n  \u003ctr\u003e\n    \u003ctd\u003eCASA\u003c/td\u003e\n    \u003ctd\u003eCM - Adjustment\u003c/td\u003e\n    \u003ctd\u003eAmount credited to adjust the account balance\u003c/td\u003e\n  \u003c/tr\u003e\n  \u003ctr\u003e\n    \u003ctd\u003eCASA\u003c/td\u003e\n    \u003ctd\u003eCM - ATA Fund Transfer\u003c/td\u003e\n    \u003ctd\u003eAutomatic fund transfer from parent account \u003c/td\u003e\n  \u003c/tr\u003e\n  \u003ctr\u003e\n    \u003ctd\u003eCASA\u003c/td\u003e\n    \u003ctd\u003eCM - Bills Payment Collection\u003c/td\u003e\n    \u003ctd\u003ePayment proceeds of utilities, investments, loans is credited \u003cbr\u003eto the settlement account\u003c/td\u003e\n  \u003c/tr\u003e\n  \u003ctr\u003e\n    \u003ctd\u003eCASA\u003c/td\u003e\n    \u003ctd\u003eCM - Bills Payment Collection ATM\u003c/td\u003e\n    \u003ctd\u003ePayment proceeds of utilities, investments, loans is credited \u003cbr\u003eto the settlement account (ATM)\u003c/td\u003e\n  \u003c/tr\u003e\n  \u003ctr\u003e\n    \u003ctd\u003eCASA\u003c/td\u003e\n    \u003ctd\u003eCM - Check Deposit On-us\u003c/td\u003e\n    \u003ctd\u003eProceeds of Metrobank check deposited to savings or current \u003cbr\u003eaccount and funds is available same day\u003c/td\u003e\n  \u003c/tr\u003e\n  \u003ctr\u003e\n    \u003ctd\u003eCASA\u003c/td\u003e\n    \u003ctd\u003eCM - Cleared FX Check\u003c/td\u003e\n    \u003ctd\u003eProceeds of foreign check credited to designated savings or current account\u003c/td\u00 \n    \u003ctd\u003eNon LC Settlement\u003c/td\u003e\n    \u003ctd\u003eCharges for payment of non LC transaction such as bank commission, doc stamps (DST), and cable\u003c/td\u003e\n  \u003c/tr\u003e\n  \u003ctr\u003e\n    \u003ctd\u003eTrade\u003c/td\u003e\n    \u003ctd\u003eSSB/AWB Issuance\u003c/td\u003e\n    \u003ctd\u003eShip side bond (SSB) / airway bill (AWB)\u003cbr\u003eCharges for shipping guarantee issuance such as doc stamp and issuance fee\u003c/td\u003e\n  \u003c/tr\u003e\n  \u003ctr\u003e\n    \u003ctd\u003eTrade\u003c/td\u003e\n    \u003ctd\u003eTR Settlement\u003c/td\u003e\n    \u003ctd\u003ePayment for trust receipts loan\u003c/td\u003e\n  \u003c/tr\u003e\n  \u003ctr\u003e\n    \u003ctd\u003eTrade\u003c/td\u003e\n    \u003ctd\u003eTR Extension\u003c/td\u003e\n    \u003ctd\u003eCharges for extending trust receipt terms\u003c/td\u003e\n  \u003c/tr\u003e\n  \u003ctr\u003e\n    \u003ctd\u003eTrade\u003c/td\u003e\n    \u003ctd\u003eTR Reclassification\u003c/td\u003e\n    \u003ctd\u003eCharges for reclassifying trust receipt which includes TR interest\u003c/td\u003e\n  \u003c/tr\u003e\n  \u003ctr\u003e\n    \u003ctd\u003eTrade\u003c/td\u003e\n    \u003ctd\u003eExport Bills Nego\u003c/td\u003e\n    \u003ctd\u003eCharges for export documents for negotiation such as \u003cbr\u003edoc stamps (DST), postage, correspondent bank charges, cable\u003c/td\u003e\n  \u003c/tr\u003e\n  \u003ctr\u003e\n    \u003ctd\u003eTrade\u003c/td\u003e\n    \u003ctd\u003eExport Bills Settlement\u003c/td\u003e\n    \u003ctd\u003eCharges for export documents for settlement  such as \u003cbr\u003edoc stamps (DST), postage, correspondent bank charges, cable\u003c/td\u003e\n  \u003c/tr\u003e\n\u003c/tbody\u003e\u003c/table\u003e \n\u003cbr/\u003e\n\u003cbr/\u003e "}]}]},{"__typename":"FaqSubcategoryRecord","name":"Online Time Deposit","slug":"/online-time-deposit","topics":[{"__typename":"FaqTopicRecord","name":"General Information - Online Time Deposit","displayName":"General Information","slug":"/general-information-online-time-deposit","items":[{"__typename":"FaqItemV2Record","question":"What is an Online Time Deposit?","answer":"Online Time Deposit is a feature on Metrobank Online and the Metrobank App that lets existing users open a Time Deposit without visiting a branch."},{"__typename":"FaqItemV2Record","question":"What does settlement account mean and why do I need to have one?","answer":"A settlement account is where your desired placement amount for your time deposit will come from. It is also where your time deposit proceeds (principal placement plus income from interest) will be credited, depending on the payout option you choose. \n\nIf you currently don’t have a settlement account, you can open via [Earnest](https://earnest.ph/invest/) and use this as your settlement account.  \n"},{"__typename":"FaqItemV2Record","question":"What are the payout options?","answer":"Payout option refers to what you want to do with the principal and the interest payment when your time deposit matures.\n\nThese are your payout options: \n\n* Pay Out Both Principal and Interest means at the end of your chosen term, your principal time deposit placement, plus the interest you earned will be credited to your settlement account. \n* Auto Roll Principal Only and Pay Out Interest means at the end of your chosen term, your principal time deposit will be placed again for another term. Interest earned from the previous term will be credited back to your settlement account. \n* Auto Roll Both Principal and Interest means at the end of your chosen term, both your principal and the interest earned will be placed again for another term.\n\n"}]},{"__typename":"FaqTopicRecord","name":"Opening an Online Time Deposit","displayName":"Opening an Online Time Deposit","slug":"/opening-an-online-time-deposit","items":[{"__typename":"FaqItemV2Record","question":"What are the requirements to open a Time Deposit account online?","answer":"To open a Time Deposit online, you need to register and log in to Metrobank Online at https://onlinebanking.metrobank.com.ph, or through the Metrobank App. You also need an eligible deposit account to serve as a settlement account for the Time Deposit placement. "},{"__typename":"FaqItemV2Record","question":"How can I open a Time Deposit online? ","answer":"To open a Time Deposit online, log in to Metrobank Online or the Metrobank App. On your deposit dashboard, select a savings or checking account that you want to use as a settlement account, and then click the “*Open a Time Deposit*” tile found at the right side of the dashboard. \n\nEnter your Time Deposit placement details and click “*Confirm*”. \n"},{"__typename":"FaqItemV2Record","question":"Will I get a confirmation on my Time Deposit application?","answer":"Once you are done with your application, a notification confirming receipt of your application for processing will be sent to your registered email address and mobile number. You may also check your Metrobank Online Inbox for the status."},{"__typename":"FaqItemV2Record","question":"How will I know if my Time Deposit application is successful?","answer":"On the next banking day from the date of application, you will receive another SMS and email notification regarding the status of your Time Deposit application.\n\nIf your Time Deposit request is successful, you will also see the new Time Deposit account among your enrolled deposit accounts on Metrobank Online and the Metrobank App."},{"__typename":"FaqItemV2Record","question":"Will I receive a Time Deposit Certificate for my Online Time Deposit that was successfully opened?","answer":"Your email notification will serve as your time deposit confirmation for your placement."},{"__typename":"FaqItemV2Record","question":"Is there a cut-off time for opening an Online Time Deposit account?","answer":"Yes, Online Time Deposit applications must be submitted before 11:00 PM. Applications received before this time will be processed immediately. Applications received after 11:00 PM or on non-banking days will be processed on the next banking day. "},{"__typename":"FaqItemV2Record","question":"I cannot find the Open a Time Deposit icon on my dashboard. What could be the problem?","answer":"You could be trying to select an account that is not suited for use as a settlement account for your time deposit.\n\nThe types of accounts that cannot be used as a settlement are the following: \n* US Pensioner Accounts \n* Hold out Savings \n* World Cash Card and Paycard \n* Joint-and Accounts \n* In Trust-For-Accounts\n\nIf none of your accounts can be used as a settlement account, please proceed to your nearest branch to open a savings or checking account to serve as your settlement account."},{"__typename":"FaqItemV2Record","question":"How much is the minimum amount to open a Time Deposit?","answer":"The minimum placement amount for a time deposit is PHP 10,000."},{"__typename":"FaqItemV2Record","question":"Where can I see the interest rate for Online Time Deposit?","answer":"You may check https://metrobank.com.ph/rates-and-fees for online time deposit rates. When you open a Time Deposit online, you get higher interest rate versus regular time deposit rates (rates may change without prior notice).\n\nNote that the interest you will earn will depend on your placement amount and length of term.\n"},{"__typename":"FaqItemV2Record","question":"My Time Deposit application was unsuccessful. What could be the reason?","answer":"If your online time deposit application was unsuccessful, you will be notified of the reason through an in-app notification and email.\n\nHere are some reasons why a time deposit application can be unsuccessful:\n\n* Nominated settlement account has insufficient funds \n* Nominated settlement account is inactive at the time of debiting.\n"},{"__typename":"FaqItemV2Record","question":"Can I open more than one Online Time Deposit account?","answer":"Yes, you may open multiple time deposit accounts online, as long as your nominated settlement account has sufficient balance to fund your TDs. "},{"__typename":"FaqItemV2Record","question":"Can I submit another Time Deposit application after an unsuccessful TD account opening?","answer":"Yes. You can fund your account such that it has enough to make your desired placement so that when you apply for a time deposit again, your application will be successful. \n\nYou may also choose a different settlement account that has a sufficient balance as well.\nHowever, if your account has been tagged as inactive, please proceed to your branch of account to request for reactivation.\n"},{"__typename":"FaqItemV2Record","question":"Where else can I open an Online Time Deposit?","answer":"You can also open an Online Time Deposit via Earnest.\nFor more details, you can visit the Earnest website [here](https://earnest.ph/invest/).\n"}]},{"__typename":"FaqTopicRecord","name":"Existing Time Deposit Accounts","displayName":"Existing Time Deposit Accounts","slug":"/existing-time-deposit-accounts","items":[{"__typename":"FaqItemV2Record","question":"I already have a Time Deposit account that I opened at my branch. Can I enroll it on Metrobank Online or the Metrobank App?","answer":"Yes. On your Metrobank Online or Metrobank App dashboard, click the “+” button and enter the account number of the Time Deposit you want to add.\n \nOnce your Time Deposit is added, you can check its balance online. However, you cannot pre-terminate or terminate the account online. You will need to go to your branch of account for this.\n\nNote that the interest rate of your original placement at the branch will apply.\n"},{"__typename":"FaqItemV2Record","question":"I have an existing time deposit account. Do I have to pre-terminate it before I can apply to Online Time Deposit on Metrobank Online or the Metrobank App?","answer":"No, you do not have to pre-terminate your existing time deposit to open a time deposit online. You can make a new time deposit placement as long as you have the funds available in your selected settlement account."}]},{"__typename":"FaqTopicRecord","name":"Pretermination \u0026 Withdrawal","displayName":"Pretermination \u0026 Withdrawal","slug":"/pretermination-and-withdrawal","items":[{"__typename":"FaqItemV2Record","question":"I want to pre-terminate or withdraw my Online Time Deposit. How can I request this?","answer":"\u003cp\u003eTo pre-terminate your Time Deposit, go to Metrobank Online or the Metrobank App and click on the Time Deposit you want to pre-terminate. Click the \u0026ldquo;Pre-terminate\u0026rdquo; button at the lower right side of the screen to submit your request.\u003c/p\u003e\n\u003cp\u003eNote that requests for pre-termination are processed during banking days only.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"Are there penalties if I pre-terminate my Time Deposit?","answer":"\u003cp\u003eIf you pre-terminate your Time Deposit to withdraw funds before the maturity date, you will receive a reduced portion of the interest.\u003c/p\u003e\n\u003cp\u003eIf pre-terminated within the first half of the term, you will earn 75% of the interest. If it\u0026rsquo;s within the second half of the term, you will receive 50% of the interest. Additionally, the applicable Documentary Stamp Tax will be deducted.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhat happens when I click the pre-terminate button?\u003c/p\u003e","answer":"\u003cp\u003eYou will receive an in-app notification, SMS, and email confirming your pre-termination. Your placement amount and interest earned will be immediately credited to your settlement account after corresponding charges and taxes.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eCan I pre-terminate my Online Time Deposit at the branch?\u003c/p\u003e","answer":"\u003cp\u003eYes, just bring one valid ID for proper identification.\u003c/p\u003e"}]},{"__typename":"FaqTopicRecord","name":"Settlement Account Concerns","displayName":"Settlement Account Concerns","slug":"/settlement-account-concerns","items":[{"__typename":"FaqItemV2Record","question":"\u003cp\u003eHow can my settlement account have insufficient funds when my Time Deposit application was acknowledged?\u003c/p\u003e","answer":"\u003cp\u003eTime deposit applications are processed every 10:00 PM and the placement amounts are debited every 11:00 PM. It\u0026rsquo;s possible that you performed a transaction, had scheduled transactions (e.g. bill payments, fund transfers), or withdrew cash which put your account balance below your placement amount.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"Will I be penalized for having insufficient funds in my settlement account or having an inactive settlement account?","answer":"No, you will not be penalized. Your time deposit application will just be unsuccessful."},{"__typename":"FaqItemV2Record","question":"How can my settlement account be inactive when my Time Deposit application was acknowledged?","answer":"Your settlement account may have been tagged as inactive before your application was processed."},{"__typename":"FaqItemV2Record","question":"Can I change my settlement account in the middle of my term?","answer":"No, the only time you can designate a settlement account is when you’re making an online time deposit application."}]},{"__typename":"FaqTopicRecord","name":"Maturity and Rollover","displayName":"Maturity and Rollover","slug":"/maturity-and-rollover","items":[{"__typename":"FaqItemV2Record","question":"What is weekend maturity and why is the maturity moved to the next banking day?","answer":"This means that the maturity date of your time deposit based on the term you chose fell on a weekend or scheduled national holiday. Since financial transactions are only processed on weekdays, the maturity date has to be moved to the next banking day so your account can be credited. \n\nRest assured that interest amount will still be computed based on the number of your actual placement days."},{"__typename":"FaqItemV2Record","question":"Will I be notified on my Time Deposit maturity or rollover?","answer":"Yes, you will receive an in-app message, SMS, and email at 7:00 AM of your maturity date that your time deposit has matured or rolled over."},{"__typename":"FaqItemV2Record","question":"What time can I expect my placement proceeds to be credited to my settlement account on maturity date?","answer":"For Pay Out Both Principal and Interest, and Auto Roll Principal Only, interest earned will be credited to your settlement account at 10:30 AM on the maturity date.\n\nFor Auto Roll Principal and Interest, your time deposit will be updated indicating the placement amount plus the interest earned at the end of the maturity date.\n"},{"__typename":"FaqItemV2Record","question":"My time deposit is set to Auto Roll payout. How do I cancel the next placement?","answer":"You may click the Terminate button on your time deposit’s maturity date to avoid penalties."},{"__typename":"FaqItemV2Record","question":"I chose auto-roll as payout option. Can I add or deduct funds to my Online Time Deposit account before the next roll over?","answer":"No, if you have more savings to place in a Time Deposit, you may opt to terminate the existing account on the day of maturity and place again, or open another Time Deposit."}]}]},{"__typename":"FaqSubcategoryRecord","name":"Merchant Services","slug":"/merchant-services","topics":[{"__typename":"FaqTopicRecord","name":"General Information - Merchant Services","displayName":"General Information","slug":"/general-information-merchant-services","items":[{"__typename":"FaqItemV2Record","question":"How can merchant services help my business?","answer":"**Enhance customer experience** - Metrobank’s comprehensive range of merchant payment solutions gives you the advantage on every sales opportunity.\u003cbr\u003e \n\n**Improve cash management** - Payments made via Metrobank Point-of-Sale (POS) terminal are credited to your Metrobank account on the next banking day."},{"__typename":"FaqItemV2Record","question":"What types of payments are accepted by a Metrobank POS terminal?","answer":"Our POS terminals allow you to accept payments via:\n\n* Visa\n* Mastercard\n* American Express\n* JCB\n* UnionPay\n* BancNet Debit cards\n* QR code transactions."},{"__typename":"FaqItemV2Record","question":"Is there a monthly sales requirement for merchant partners?","answer":"It depends on the type of product and service you avail."},{"__typename":"FaqItemV2Record","question":"Does Metrobank teach how to use their POS terminals?","answer":"Yes. Metrobank conducts orientations on card and QR acceptance, and fraud awareness."},{"__typename":"FaqItemV2Record","question":"Do your merchant partners receive transaction reports?","answer":"Yes, daily reports are sent via email to help reconcile transactions."},{"__typename":"FaqItemV2Record","question":"When are payments credited to Metrobank account?","answer":"Payments are credited on the next banking day."},{"__typename":"FaqItemV2Record","question":"How can I get more information?","answer":"For more information, contact us at\u003cbr\u003e \n**Hotline:** (02) 88-700-999\u003cbr\u003e\n**PLDT Toll Free Hotline:** 1-800-10-8700999\u003cbr\u003e\n**Email:** merchanthelpdesk@metrobankcard.com\n\nYou may also visit your nearest Metrobank branch."}]}]},{"__typename":"FaqSubcategoryRecord","name":"Accounts","slug":"/accounts","topics":[{"__typename":"FaqTopicRecord","name":"Account Opening","displayName":"Account Opening","slug":"/account-opening","items":[{"__typename":"FaqItemV2Record","question":"\u003cp\u003eHow do I open an account?\u003c/p\u003e","answer":"\u003cp\u003eVisit any Metrobank branch to open an account. You will be required to submit one valid, photo-bearing ID with your signature and the initial deposit of the account you want to open. Check the complete list\u003cspan\u003e\u0026nbsp;\u003c/span\u003e\u003ca target=\"_self\" href=\"https://www.metrobank.com.ph/articles/application-requirements\"\u003ehere\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eYou are required to fill up a mandatory\u003cspan\u003e\u0026nbsp;\u003c/span\u003e\u003ca target=\"_self\" href=\"https://web-assets.metrobank.com.ph/1622704408-cif-individual.pdf\"\u003eCustomer Information Form\u003c/a\u003e\u003cspan\u003e\u0026nbsp;\u003c/span\u003ethat will go with your other account requirements.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"What valid IDs can I present?","answer":"\u003cp\u003eExamples of valid IDs include the following:\u003c/p\u003e\n\u003col\u003e\n\u003cli style=\"list-style-type: none;\"\u003e\n\u003col\u003e\n\u003cli\u003ePhilippine Identification Card (PhilID)\u003c/li\u003e\n\u003cli\u003ePassport (including those issued by foreign governments)\u003c/li\u003e\n\u003cli\u003eDriver\u0026rsquo;s License\u003c/li\u003e\n\u003cli\u003eProfessional Regulation Commission ID\u003c/li\u003e\n\u003cli\u003ePostal Identity Card\u003c/li\u003e\n\u003cli\u003eVoter\u0026rsquo;s ID\u003c/li\u003e\n\u003cli\u003eGSIS e-Card\u003c/li\u003e\n\u003cli\u003eSocial Security System card or Unified Multi-Purpose ID\u003c/li\u003e\n\u003cli\u003eSenior Citizen Card\u003c/li\u003e\n\u003cli\u003eOverseas Filipino Worker ID or e-card\u003c/li\u003e\n\u003cli\u003eSeaman\u0026rsquo;s Book\u003c/li\u003e\n\u003cli\u003eAlien Certificate of Registration or Immigrant Certificate of Registration (for foreign individuals)\u003c/li\u003e\n\u003cli\u003eGovernment Office and Government Owned and Controlled Corporations ID (e.g. BSP, SEC, Insurance Commission)\u003c/li\u003e\n\u003cli\u003ePersons with Disabilities (PWD) ID issued by the National Council on Disability Affairs\u003c/li\u003e\n\u003cli\u003eIntegrated Bar of the Philippines ID\u003c/li\u003e\n\u003cli\u003ePhoto-bearing School ID duly signed by the principal or head of school for Filipino students who are not of voting age\u003c/li\u003e\n\u003cli\u003eCompany ID (if signature bearing) issued by Covered Person registered with or supervised/regulated by BSP, SEC or Insurance Commission\u003c/li\u003e\n\u003c/ol\u003e\n\u003c/li\u003e\n\u003c/ol\u003e"},{"__typename":"FaqItemV2Record","question":"How much is the maintaining balance?","answer":"We offer a variety of deposit products to suit your financial needs. Click this [link](/application-requirements) to see our deposit products and their corresponding maintaining balances."},{"__typename":"FaqItemV2Record","question":"Do you offer foreign currency accounts?","answer":"Yes. We offer deposit accounts in the following foreign currencies:\n\n\n* US dollar (USD)\n* Canadian dollar (CAD)\n* Chinese yuan renminbi (CNY)\n* Japanese yen (JPY)\n* Sterling pound (GBP)\n* Euro (EUR)\n* Swiss franc (CHF)\n* Australian dollar (AUD)\n* Singapore dollar (SGD)\n\n\nPlease check at the nearest Metrobank branch for their availability of these foreign currency accounts."},{"__typename":"FaqItemV2Record","question":"Can I open an account at any Metrobank branch?","answer":"Yes. Just bring a valid ID and the initial deposit for the type of account you want to open. For your convenience, go to a Metrobank branch near your home or place of work."},{"__typename":"FaqItemV2Record","question":"What are the interest rates for deposit accounts?","answer":"Interest rates depend on the account you open. See [here](/application-requirements) the list of interest rates."},{"__typename":"FaqItemV2Record","question":"How does my deposit account earn interest?​","answer":"Metrobank computes the interest of your deposit account using this formula:\n\n![](https://web-assets.metrobank.com.ph/1689235858-casa-interest-rate-computation-faq.jpg)\n\nClick [here](/articles/how-to-compute-the-interest-earned-from-your-deposit-account) to learn more about how this formula works."}]},{"__typename":"FaqTopicRecord","name":"Special Account Holders","displayName":"Special Account Holders","slug":"/special-account-holders","items":[{"__typename":"FaqItemV2Record","question":"I'm a foreigner. Can I open an account?","answer":"Yes. All you need to do is to visit any nearest Metrobank branch, bring your passport or Alien Certificate of Registration (ACR), and the initial deposit requirement."},{"__typename":"FaqItemV2Record","question":"I'm working abroad. Can my family in the Philippines open an account for me?","answer":"No, they cannot open an account under your name. But as your beneficiary, they can open an OFW Savings account under their name in the following currencies:\n\n* Philippine peso\n* US dollar\n* Euro\n* Japanese yen\n* British pound\n* Canadian dollar\n\nYour beneficiaries only need to bring a valid signature-based ID or government-issued ID, and the initial deposit."},{"__typename":"FaqItemV2Record","question":"I would like to open an account for my business. What are the requirements?","answer":"To open a business account, visit any Metrobank branch to open an account. You will be required to submit one valid, photo-bearing ID with your signature and the initial deposit of the account you want to open. Check the complete list [here](/application-requirements).\n\nAs a business, you are also required to fill up a mandatory [Customer Information Form](https://web-assets.metrobank.com.ph/1622706027-cif-institutional.pdf) that will go with your other account requirements."},{"__typename":"FaqItemV2Record","question":"I am a US citizen and would like to open an account. What are the requirements?","answer":"Visit any nearest Metrobank branch, bring your passport or Alien Certificate of Registration (ACR), and the initial deposit requirement.\n\nYou are also required to fill up and submit a FATCA Certification, Consent, and Waiver form, which you can download [here](https://web-assets.metrobank.com.ph/1622706098-fatca-certification-consent-and-waiver.pdf)."},{"__typename":"FaqItemV2Record","question":"Do you have account types for kids and students?","answer":"Yes. For those 17 years and below, they could open a Fun Savers Club Account. Meanwhile, young savers aged 7 to 21 years old can open a Spark Savings Account. Check out more information [here](/accounts/savings)."}]},{"__typename":"FaqTopicRecord","name":"Account Maintenance and Issues","displayName":"Account Maintenance and Issues","slug":"/account-maintenance-and-issues","items":[{"__typename":"FaqItemV2Record","question":"I want to dispute a suspicious transaction in my account. How do I file a complaint?","answer":"For concerns about duplicate billing, cancelled subscriptions, unauthorized withdrawals or transfers, and other suspicious transaction, you may fill up a [Customer Dispute Form](https://web-assets.metrobank.com.ph/1622705959-client-dispute-form.pdf) and submit to your branch of account. You may also send it via email to [customercare@metrobank.com.ph](mailto:customercare@metrobank.com.ph)."},{"__typename":"FaqItemV2Record","question":"I lost my passbook. How do I get a replacement?","answer":"You may request for a new passbook by going to your branch of account and filling up a [Customer Maintenance and Instruction Form](https://web-assets.metrobank.com.ph/1622706167-cmif.pdf). You will also pay the passbook replacement fee of PHP 200."},{"__typename":"FaqItemV2Record","question":"What are the terms and conditions for deposit accounts?","answer":"Please read Metrobank’s Deposit Terms and Conditions [here](https://web-assets.metrobank.com.ph/1624586882-deposit-terms-and-conditions-as-of-6-25-2021.pdf)."}]},{"__typename":"FaqTopicRecord","name":"Prepaid Card","displayName":"Prepaid Card","slug":"/prepaid-card","items":[{"__typename":"FaqItemV2Record","question":"How do I get a Prepaid Card?","answer":"\u003cp\u003eVisit any Metrobank branch to open an account. You will be required to submit one valid, photo-bearing ID with your signature and the initial deposit of the account you want to open. You will need to fill up a \u003ca href=\"https://web-assets.metrobank.com.ph/1622706414-prepaid-card-application-form.pdf\"\u003ePrepaid Card Application Form\u003c/a\u003e as part of your application. Check the complete list of valid IDs \u003ca href=\"/application-requirements\"\u003ehere\u003c/a\u003e.\u003c/p\u003e"}]},{"__typename":"FaqTopicRecord","name":"Accounts of Deceased Depositors","displayName":"Accounts of Deceased Depositors","slug":"/accounts-of-deceased-depositors","items":[{"__typename":"FaqItemV2Record","question":"What happens to the account of depositors upon death?","answer":"a. **Individual accounts**—refer to accounts owned and controlled by one person/ depositor; these are placed on hold once the bank is notified of the death of the accountholder.  \n\nb. **For joint accounts** (under the name of two or more depositors), the hold out will be applied to the share of the deceased depositor. The surviving co-accountholder may access his share of the deposit, but the heirs of the deceased may only receive the deceased’s share upon compliance with and submission of certain documentary requirements."},{"__typename":"FaqItemV2Record","question":"Who has a claim over the funds left by a deceased depositor?","answer":"The rightful heirs of the deceased can claim his funds. The legal heirs depend on who survived the deceased depositor:  \n\na. If only the legitimate children are left, then they get everything to be shared equally.  \nb. If the widow/widower and legitimate children are left, the estate is divided equally among the children and the widow/widower.  \nc. If the widow/widower and illegitimate children are left, the illegitimate children will get half of the estate while the remaining half will go to the widow/widower.  \nd. If the legitimate children and illegitimate children are left, all will be heirs. However, the illegitimate child will get a share equivalent to half of the share of a legitimate child.  \ne. If the widow/widower, legitimate children and illegitimate children are left, the widow/widower and the legitimate children each get equal shares while the illegitimate child will get a share equivalent to half of the share of a legitimate child.  \nf. If the parents of the decedent and legitimate children are left, the legitimate children will get everything.  \ng. If the parents of the decedent and illegitimate children are left, the parents will get half of the estate while the remaining half will go to the illegitimate children.  \nh. If the widow/widower and parents of the decedent are left, the widow/widower shall get half while the remaining half goes to the decedent’s parents.  \ni. If the parents of the decedent and his brothers and sisters are left, everything will go to the decedent’s parents.  \nj. If the widow/widower and brothers and sisters of the decedent are left, the widow/widower shall get half while the remaining half goes to the decedent’s brothers and sisters.  \nk. In the absence of any descendant or ascendant or sibling of the decedent, the widow/widower inherits everything.  \nl. If the decedent has no surviving heirs, then the state is entitled to the funds."},{"__typename":"FaqItemV2Record","question":"What are the required documents if a Filipino deceased depositor left a last will and testament?","answer":"If the deceased left a last will and testament, existing laws require that it must first be probated in court before it can bind and be effective on third parties.\n\nThe Bank can only act on the disposition of the deceased’s funds in his account once the probate court issues an order allowing the will, or instructing the Bank to release the funds to the appointed executor. \n\nPlease coordinate with the deceased depositor's branch of account for the list of applicable requirements. "},{"__typename":"FaqItemV2Record","question":"Who are legally entitled to claim the account balance if a Filipino deceased depositor left a last will and testament?","answer":"The persons named in the Order/Decision/Judgment/Resolution of the probate court are legally entitled to claim the account balance."},{"__typename":"FaqItemV2Record","question":"What are the required documents if the Filipino deceased depositor has NO last will and testament, AND there are NO conflicting claims on his account?","answer":"If the Filipino deceased depositor has no last will and testament and there are no conflicting claims on the account, the Bank normally requires documents to establish the following, among others:  \n\na. The fact of death;  \nb. Filiation of the heirs to the deceased; and  \nc. Payment of applicable taxes.  \n\nPlease coordinate with the deceased depositor's branch of account for the list of applicable requirements. "},{"__typename":"FaqItemV2Record","question":"What is the period within which the Bank can withhold the 6% estate tax on the deceased’s deposit for remittance to the BIR?","answer":"Under BIR Revenue Memorandum Circular No. 62-2018, banking institutions may only withhold the 6% final withholding tax on the deceased’s deposits within one (1) year from the date of death. After said period, the heirs will have to pay the 6% estate tax directly with the BIR.  "}]}]},{"__typename":"FaqSubcategoryRecord","name":"Remittance","slug":"/remittance","topics":[{"__typename":"FaqTopicRecord","name":"General Information - Remittance","displayName":"General Information","slug":"/general-information-remittance","items":[{"__typename":"FaqItemV2Record","question":"How do I replace a lost/damaged ATM card?","answer":"If your ATM card is lost or damaged, you need to visit a Metrobank Foreign Branch near you. You only need to bring a valid government-issued ID to request for a replacement. An ID issued to you by the government where you are residing is also accepted.\n\nYou can read more about how to replace or update your debit card [here](https://web-assets.metrobank.com.ph/1622706940-customer-application-to-purchase.pdf)."},{"__typename":"FaqItemV2Record","question":"What forms do I need to fill up to make a remittance when I’m abroad?","answer":"Indicated in the certificate issued by the Bank are the Bank officers that you can call to verify its authenticity. For the most common certificates issued, here are the list of officers designated by the Bank to verify certificates. The names below should match those indicated in the certificate you received. This is one of the ways to verify its authenticity.\n\n![](https://web-assets.metrobank.com.ph/1606458027-info-on-how-to-validate.png)"}]}]},{"__typename":"FaqSubcategoryRecord","name":"Cash Pick-up","slug":"/cash-pickup","topics":[{"__typename":"FaqTopicRecord","name":"Service Details","displayName":"Service Details","slug":"/service-details","items":[{"__typename":"FaqItemV2Record","question":"What is Cash Pick-up?","answer":"Cash Pick-up is a service on Metrobank Online that allows you to remit cash to over 10,200 remittance partners in the Philippines."},{"__typename":"FaqItemV2Record","question":"Does the beneficiary need to have a Metrobank account?","answer":"No. The beneficiary does not need to have a Metrobank account to be the recipient of a Cash Pick-up transaction."},{"__typename":"FaqItemV2Record","question":"How will the beneficiary know that the money is ready for pick-up?","answer":"Your beneficiary will receive a reference number via SMS and email notifications through the contact details you provided. The reference number is used to claim the cash at the remittance partner outlet."},{"__typename":"FaqItemV2Record","question":"How soon will the cash be available for pick-up of the beneficiary?","answer":"The cash will be available for pick-up as soon as you receive confirmation that your transaction is successful."},{"__typename":"FaqItemV2Record","question":"How can my beneficiary claim the cash at a remittance partner outlet?","answer":"When your beneficiary claims the cash, they should prepare these:\n\n* The transaction reference number (found in the SMS and email notification)\n* A valid government-issued photo ID\n\nThey can collect the cash at any outlet of these domestic remittance partners:\n\n* Cebuana Lhuillier\n* M. Lhuilier\n* RD Pawnshop\n* LBC Express\n* Villarica Pawnshop\n* Palawan Pawnshop\n* PERA Hub\n* Tambunting Pawnshop"},{"__typename":"FaqItemV2Record","question":"Until when can the beneficiary claim the remittance?","answer":"The cash remittance is available for pick-up for 30 calendar days. If left unclaimed, the amount will be credited back to the sender’s Metrobank account on the 31st day."}]},{"__typename":"FaqTopicRecord","name":"Using Cash Pickup","displayName":"Using Cash Pickup","slug":"/using-cash-pickup","items":[{"__typename":"FaqItemV2Record","question":"What accounts can be used for Cash Pick-up transactions?","answer":"You can use your savings accounts enrolled on Metrobank Online for Cash Pick-up transactions."},{"__typename":"FaqItemV2Record","question":"How much cash can be sent through the Cash Pick-up service?","answer":"You can send a maximum of PHP 30,000 per enrolled deposit account per day. \n\nHowever, please note that Palawan Pawnshop has a maximum of PHP 10,000 payout limit at their counters."},{"__typename":"FaqItemV2Record","question":"How will I know the status of the Cash Pick-up service?","answer":"When you remit cash to your beneficiary, you will receive SMS and email notifications indicating if your transaction is successful, failed, or cancelled.\n\nCancelled transaction means your beneficiary did not pick up the cash within 30 calendar days."},{"__typename":"FaqItemV2Record","question":"What information do I need to provide when using the Cash Pick-up service?","answer":"As the sender, you need to provide these pieces of information on your beneficiary:\n\n* First name\n* Middle name (Optional)\n* Last name\n* Address (Maximum of 40 characters, special characters allowed)\n* Mobile number\n* Email address (Optional)\n* Nationality\n* Purpose"},{"__typename":"FaqItemV2Record","question":"Can I cancel a Cash Pick-up transaction?","answer":"Yes. To cancel a Cash Pick-up transaction, call our Contact Center at (02) 88-700-700 (domestic toll-free 1-800-1888-5775) within 30 calendar days from when you initiated the transaction.\n\nYou will receive a notification to confirm the cancellation, and the amount will be credited back to your account within 24 hours, but the PHP100 service fee is not refundable."},{"__typename":"FaqItemV2Record","question":"Can I edit the beneficiary details of a Cash Pick-up transaction request?","answer":"No. The details of a Cash Pick-up transaction request are final once confirmed. Please be sure to review the details carefully before you proceed with a transaction."}]},{"__typename":"FaqTopicRecord","name":"Service Fees","displayName":"Service Fees","slug":"/service-fees","items":[{"__typename":"FaqItemV2Record","question":"Is there a fee for using the Cash Pick-up service?","answer":"Yes. There is a fee of PHP 100 per transaction, which is automatically deducted from your account."},{"__typename":"FaqItemV2Record","question":"Is there a fee to be paid by the beneficiary?","answer":"None. The beneficiary does not have to pay any fee when they pick up the cash at the remittance partner outlet."}]},{"__typename":"FaqTopicRecord","name":"Online Service","displayName":"Online Service","slug":"/online-service","items":[{"__typename":"FaqItemV2Record","question":"What is Cash Pick-up service that is available on the Metrobank Mobile App?","answer":"\u003cp\u003eCash Pick-Up is a service on the app that allows you to remit cash through the Metrobank Mobile App to any beneficiary in the Philippines, even if they do not have a bank account. Cash Pick-Up Service has the following advantages: * Real-time remittance * Beneficiary is notified via SMS and email * Single reference number that can be presented at any remittance partner 10,200+ remittance outlet partners located nationwide\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eHow does Cash Pick-Up work through the Metrobank Mobile App?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; You can remit money using the Metrobank Mobile App through the Cash Pick-Up feature. Once the money is sent through the app, your beneficiary receives notifications via SMS and email with a reference number. Your beneficiary can claim the cash from accredited domestic remittance partners. They just need to prepare the reference number and show a valid government ID to claim the money. A PHP 100 fee is also debited from your account, and this amount is non-refundable.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eWhat accounts can be used for Cash Pick-Up transactions?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; You can remit money using the Metrobank Mobile App through the Cash Pick-Up feature. Once the money is sent through the app, your beneficiary receives notifications via SMS and email with a reference number. Your beneficiary can claim the cash from accredited domestic remittance partners. They just need to prepare the reference number and show a valid government ID to claim the money. A PHP 100 fee is also debited from your account, and this amount is non-refundable.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eWhat accounts can be used for Cash Pick-Up transactions??\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; You can use your Savings accounts enrolled to the Metrobank Mobile App for Cash Pick-Up transactions.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eWhat are the benefits of using the Cash Pick-Up service?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; This service allows you to send cash remittances available for pick-up by the beneficiary immediately at over 10,200 remittance partner outlets nationwide through the Metrobank Mobile App. You can remit money from the safety and convenience of your home, and both you and your beneficiary are notified of the money sent.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eHow much cash can be sent through the Cash Pick-Up service?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; You can send a maximum amount of PHP 30,000 per enrolled deposit account per day. However, please note that Palawan Pawnshop has a maximum of PHP 10,000 payout limit at their counters.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eIs there a fee for using the Cash Pick-Up service?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; Every Cash Pick-Up transaction will be charged with a non-refundable transaction fee of PHP 100, which is deducted from your account. Your beneficiary will not be charged for the transaction. There are no transaction fees to be collected from the beneficiary when he picks up cash at remittance partner outlets.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eWhat currencies are accepted by the Cash Pick-Up service?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; As of now, only Philippine Peso Cash Pick-Up transactions are available.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eHow will I know the status of your transaction via the Cash Pick-up service?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; You will receive notifications via SMS and email. These notifications will indicate if the transaction failed; is successful; or if it was cancelled because the cash was not claimed by the beneficiary within 30 calendar days from when the Cash Pick-up transaction was initiated.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eHow will my beneficiary know they have been sent cash for pick-up?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; Your beneficiary is notified via SMS and email through the contact details you provided when you sent cash for pick-up. The SMS and email contain a transaction reference number, which your beneficiary will use to claim the cash at the remittance center outlets.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eHow can I check the status of my Cash Pick-Up transaction?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; * You can check it by visiting our official website: https://metrobank.com.ph/home * Choose \u0026ldquo;Manage\u0026rdquo; then choose \u0026ldquo;Remittance Services\u0026rdquo;. * Look for \u0026ldquo;Remittance Status\u0026rdquo;, then choose \u0026ldquo;Check Now\u0026rdquo;. * Enter the complete reference number (ex. REF# 0123456789123MBS then click \u0026ldquo;Submit\u0026rdquo;).\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eHow fast will the cash be available for pick-up of the beneficiary?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; The cash is available for pick-up immediately after the transaction is processed and confirmed successful. Beneficiary can pick up the cash remittance within 30 calendar days. If cash remittance is not claimed, it will be refunded to the Metrobank account of the sender on the 31st day.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eWhat information do I need to fill when using the Cash Pick-Up service?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; As a sender, you need to provide the following beneficiary information: * First name * Middle name (Optional) * Last name * Address * Mobile number * Email address (Optional) * Nationality * Purpose When typing the address, what is the maximum character length and what are the allowed special characters? * Length: 40 Characters * Allowed Special Characters: Space # \u0026amp; \u0026lsquo;,\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eHow will my beneficiaries claim the cash at the remittance partner outlets?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; They need to be ready to show the following: * Transaction reference number (from the SMS or email notifications) * Valid government-issued ID Domestic remittance partners will also require a form to be filled out with the details of the transaction.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eWhy is my Cash pick-Up transaction \u0026ldquo;Not Available\u0026rdquo; yet at the remittance partner outlet?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; The reference number your Beneficiary submitted to the remittance partner may have been incomplete. Please ensure that you beneficiary provides the complete reference number, including all the alphanumeric characters. (ex. REF# 0123456789123MBS). If an incomplete reference number is provided to the remittance partner outlet by the beneficiary, the transaction will appear as \u0026ldquo;Not Available\u0026rdquo;, \u0026ldquo;Cannot be Found\u0026rdquo;, or \u0026ldquo;Cannot be Located\u0026rdquo;.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eCan I cancel a Cash Pick-Up transaction?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; Yes. As long as the cash has not been claimed by the beneficiary, you can cancel a Cash Pick-Up transaction by calling the Metrobank Contact Center at (02) 88-700-700 (domestic toll-free 1-800-1888-5775). This may be done within 30 calendar days from the time the Cash Pick-Up transaction was initiated. You will receive an SMS and email notification to confirm that cancellation of the transaction. The cash will be credited back to your account within 24 hours, but the PHP 100 service fee is non-refundable. To prevent cancelling Cash Pick-Up transaction details, please verify the details of the transaction before confirming.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eAt what point will I not be allowed to cancel a Cash Pick-Up transaction?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; You may not cancel the Cash Pick-Up transaction once the transaction has been paid out to or claimed by the recipient.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eHow can I be sure that the cash I sent was picked up by the intended beneficiary?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; Before releasing the cash to the beneficiary, the remittance partners will validate the identity of a remittance claimant through a verification process and by comparing the information you have provided and the information submitted by the beneficiary.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eCan the beneficiary details of the Cash Pick-Up transaction requests be edited?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; Yes. The beneficiary details for the Cash Pick-Up transaction can be edited as long as it has not yet been claimed by the beneficiary. In order to edit the beneficiary details of the Cash Pick-Up transaction, you must call the Metrobank Contact Center at (02) 88-700-700 (domestic toll-free 1-800-1888-5775). There are no additional charges to edit beneficiary details. This may be done within 30 days from the time the Cash Pick-up transaction was initiated.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eCan the sending amount of the Cash Pick-Up transaction be edited?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; No. You may not edit the sending amount.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eAt what point will I not be able to edit the beneficiary details of Cash Pick-up transaction request?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; You may not edit the Cash Pick-Up transaction details once the transaction has been paid out to or claimed by the recipient.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eAre there additional charges for editing Cash Pick-Up transaction requests?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; No. There are no additional charges for editing Cash Pick-up transaction requests.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eAs a sender, can I send money without the Metrobank Mobile App?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; No. The Cash Pick-Up service is only available on the Metrobank Mobile App.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eAs a beneficiary, do I need to have a Metrobank account? What about the Metrobank Mobile App?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; No. You do not need to have a Metrobank account or to download the Metrobank Mobile App. As a beneficiary, you only need a valid government ID with photo, a mobile number and/or an email address, so you can receive the transaction reference number to claim the cash.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eWhere can my beneficiary collect the cash sent to them?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; They can collect the cash sent to them at any of the following domestic remittance partner outlets: * Cebuana Lhuillier * M. Lhuilier * RD Pawnshop * LBC * Villarica Pawnshop * Palawan Pawnshop\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eDo the remittance partner outlets have payout limits at their counters?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; * Only Palawan Pawnshop has a maximum Cash Pick-Up limit of PHP 10,000 at their counters for the Metrobank Mobile App Cash Pick-up transactions. * Please note that the Metrobank Mobile App Cash Pick-Up transactions have a PHP 30,000 transaction limit per source account.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eCan I pick up cash remittances sent from the Metrobank Mobile App at any Metrobank Branch?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; No, you may only claim Metrobank Mobile App Cash Pick-Up transactions at the mentioned remittance partner outlets.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eHow will I know if the Cash remittance is sent from the Metrobank Mobile App Cash Pick-Up service?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; You may refer to the last three alpha-numeric characters in the reference number to determine if it is a domestic remittance from the Metrobank Mobile App Cash Pick-Up service: Example: REF# 0123456789123MBS. The \u0026ldquo;MBS\u0026rdquo; at the end of the reference number indicates it is a Metrobank Mobile App Cash Pick-Up transaction.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eMy beneficiary cannot claim Cash Pick-Up at a remittance partner outlet. What do I do?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; There could be various reasons why the beneficiary cannot claim: * The reference number provided might not be complete. The reference number includes the 13-digit numeric code plus \u0026ldquo;MBS\u0026rdquo;. Example: REF#1234567890123MBS. It\u0026rsquo;s best to have the beneficiary show the SMS or email notification on the remittance and have the outlet double-check the reference number in their system. * The remittance outlet may not be familiar with the new Cash Pick-Up service. For example, some outlets might say that the reference number is not familiar to them because it is an \u0026ldquo;international\u0026rdquo; remittance. Remittances, whether international or domestic, are processed the same way and there is no distinction between \u0026ldquo;international\u0026rdquo; or \u0026ldquo;domestic\u0026rdquo; reference numbers. Please request the customer to provide the following information so that we can inform our payout partner to call the attention of the concerned outlet: * Reference number of the Cash Pick-Up transaction * Name of remittance partner or agent * Specific outlet or branch\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eAs a sender or beneficiary, how do I check the status of the Cash Pick-Up requested through the Metrobank Mobile App?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; You can check the status of the Cash Pick-Up by accessing MB Pay Station. Here\u0026rsquo;s how: 1. Log in to https://metrobank.com.ph/home 2. From the menu, choose \u0026ldquo;Manage\u0026rdquo;. 3. Select \u0026ldquo;Remittance Services\u0026rdquo;. 4. Look for the \u0026ldquo;Remittance Status\u0026rdquo;. 5. Click \u0026ldquo;Check Now\u0026rdquo;. 6. Type in complete transaction reference number. 7. Press \u0026ldquo;Submit\u0026rdquo;. Or you can visit https://mbpaystation.mbremit.com/remittance-status/\u003c/details\u003e"}]}]}]},"selectedSubcategory":{"__typename":"FaqSubcategoryRecord","name":"Cash Pick-up"},"selectedTopic":{"__typename":"FaqTopicRecord","name":"Service Fees"},"quickSearchLabel":"","quickSearchItems":[]}],"externalLinkWarningTitle":"You are leaving the Metrobank website","externalLinkWarningDescription":"The link you clicked leads to an external website where\nour Terms and Conditions and Privacy Policy do not apply.\n\nWhen you click Proceed, the external website will open in\na new browser window or tab."},"layoutV2Data":{"navbarV2":{"menuItemsV2":[{"desktopLabel":"Home","mobileLabel":"Home","dataName":"navbar-home","redirectLabel":"Go To Homepage","
