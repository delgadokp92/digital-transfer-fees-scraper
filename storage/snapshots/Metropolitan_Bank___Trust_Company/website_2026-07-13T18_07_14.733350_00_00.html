 \t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\u003c/div\u003e\n\u003c/br\u003e\n\n3.\tOn the credit card overview, toggle the “Locked” button.\n\n\u003cdiv class=\"mbd-row\"\u003e\n\u003cdiv class=\"mbd-column\"\u003e\n\u003cimg src=\"https://web-assets.metrobank.com.ph/1741766007-10-1-2-b-confirmation.png\"\u003e\n\u003c/div\u003e \t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\u003c/div\u003e\n\u003c/br\u003e\n\n4.\tTap “Yes, unlock card now” to proceed.\n\n\u003cdiv class=\"mbd-row\"\u003e\n\u003cdiv class=\"mbd-column\"\u003e\n\u003cimg src=\"https://web-assets.metrobank.com.ph/1741765893-verification-face-id2.png\"\u003e\n\u003c/div\u003e \t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\u003c/div\u003e\n\u003c/br\u003e\n\n5.\tAuthenticate using AppKey.\n\n\u003cdiv class=\"mbd-row\"\u003e\n\u003cdiv class=\"mbd-column\"\u003e\n\u003cimg src=\"https://web-assets.metrobank.com.ph/1741765893-appkey-device-success.png\"\u003e\n\u003c/div\u003e \t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\u003c/div\u003e\n\u003c/br\u003e\n\n*Note: If you have not yet enabled AppKey, enter your 6-digit passcode and the SMS OTP sent to your registered mobile number.*\n\nThat’s it! Your credit card is now unlocked. You will receive SMS and email notifications confirming that your credit card has been successfully unlocked.\n"},{"__typename":"FaqItemV2Record","question":"I unlocked my card, but my transactions are still being rejected. What should I do?","answer":"Your transaction may be rejected due to any of the following reasons:\n\n* Insufficient credit limit\n*\tOverdue payment, causing your card to be blocked or suspended by Metrobank or the merchant\n\nIf your card is active and has enough available limit but still with declined transactions, you may call our Customer Service Hotline at (02) 88-700-700 or 1-800-1888-5775 for checking of your account. You can also send us an email at customerservice@metrobankcard.com.\n"},{"__typename":"FaqItemV2Record","question":"I got an error message: “Something went wrong” when trying to lock/unlock my card. What should I do?","answer":"This may be due to a network issue. Ensure you have a stable internet connection, then try these troubleshooting steps:\n\n* Refresh your connection:  \n\t\t1.\tRestart your modem/router (if on Wifi)  \n\t\t2.\tToggle Airplane mode on and off (if using mobile data).  \n\t\t3.\tRestart your mobile device  \n\n* For iPhone users: Go to Settings and enable “Background App Refresh” for Metrobank App.\n\n* For Android users, try to clear your app cache:  \n\t\t1.\tLog out from the Metrobank App.  \n\t\t2.\tGo to your device’s Settings.  \n\t\t3.\tTap “Applications” and select “Metrobank App.”  \n\t\t4.\tTap “Storage.”  \n\t\t5.\tTap “Clear Cache.”  \n\t\t6.\tLog in again on the app.  \n\n*\tUninstall and reinstall the app.\n"}]},{"__typename":"FaqTopicRecord","name":"Checkbook - Metrobank App","displayName":"Checkbook","slug":"/checkbook-metrobank-app","items":[{"__typename":"FaqItemV2Record","question":"How can I order checkbook/s through the Metrobank App?     ","answer":"\u003cstyle\u003e\n* {\n  box-sizing: border-box;\n}\n\n/* Create two equal columns that floats next to each other */\n.mbd-column {\n  float: left;\n  width: 30%;\n}\n\n/* Clear floats after the columns */\n.mbd-row:after {\n  content: \"\";\n  display: table;\n  clear: both;\n}\n\n/* Responsive layout - makes the two columns stack on top of each other instead of next to each other */\n@media screen and (max-width: 600px) {\n  .mbd-column {\n    width: 100%;\n  }\n}\n\u003c/style\u003e\n\nTo order checkbook/s through the Metrobank App: \n\n\n1. Log in to your Metrobank App account and select 'Checkbook Order'.\n\n\u003cdiv class=\"mbd-row\"\u003e\n\u003cdiv class=\"mbd-column\"\u003e\n\u003cimg src=\"https://web-assets.metrobank.com.ph/1747274143-image00001.jpeg\"\u003e\n\u003c/div\u003e \t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\u003c/div\u003e\n\u003c/br\u003e\n\n\n2. Fill out the Checkbook Order form, then click “Next.” \n\n\u003cdiv class=\"mbd-row\"\u003e\n\u003cdiv class=\"mbd-column\"\u003e\n\u003cimg src=\"https://web-assets.metrobank.com.ph/1747274147-image00004.jpeg\"\u003e\n\u003c/div\u003e \t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\u003c/div\u003e\n\u003c/br\u003e\n\n3. Review your details and tap “Confirm” to proceed. \n\n\u003cdiv class=\"mbd-row\"\u003e\n\u003cdiv class=\"mbd-column\"\u003e\n\u003cimg src=\"https://web-assets.metrobank.com.ph/1747274143-image00003.jpeg\"\u003e\n\u003c/div\u003e \t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\u003c/div\u003e\n\u003c/br\u003e\n\n4. Authenticate using AppKey and that’s it! Your checkbook order is submitted.\n\n\u003cdiv class=\"mbd-row\"\u003e\n\u003cdiv class=\"mbd-column\"\u003e\n\u003cimg src=\"https://web-assets.metrobank.com.ph/1741587324-3-4-authenticate-using-appkey.png\"\u003e\n\u003c/div\u003e \t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\u003c/div\u003e\n\u003c/br\u003e\n\n\u003cdiv class=\"mbd-row\"\u003e\n\u003cdiv class=\"mbd-column\"\u003e\n\u003cimg src=\"https://web-assets.metrobank.com.ph/1747274143-image00002.jpeg\"\u003e\n\u003c/div\u003e \t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\u003c/div\u003e\n\u003c/br\u003e"},{"__typename":"FaqItemV2Record","question":"Can I assign a savings account to be debited for an order checkbook transaction?  ","answer":"No. The transaction is debited from the checking account you are ordering for.  "},{"__typename":"FaqItemV2Record","question":"Can I order a checkbook using Metrobank Online?  ","answer":"Yes, you can order checkbook via Metrobank Online and Metrobank App."},{"__typename":"FaqItemV2Record","question":"How many checkbooks can I order online?","answer":"You can order up to nine (9) checkbooks per transaction per day. "},{"__typename":"FaqItemV2Record","question":"How much is the fee to order a checkbook? ","answer":"The fee is PHP 250 per checkbook and will be debited from your checking account immediately. "},{"__typename":"FaqItemV2Record","question":"Where can I claim the checkbook/s ordered online? ","answer":"You may pick up your checkbook/s at your branch of account and just bring valid government issued ID."},{"__typename":"FaqItemV2Record","question":"When can I claim my order checkbook/s? ","answer":"You may claim it in within 2 to 3 weeks after placing a successful order via the app. "},{"__typename":"FaqItemV2Record","question":"How can I know status of my request? ","answer":"You can check the availability of your checkbook request on your branch of account.  "},{"__typename":"FaqItemV2Record","question":"Can I cancel my order checkbook request online? ","answer":"Unfortunately, you cannot cancel the checkbook order request once payment has been made. But you can still cancel your scheduled checkbook requests. "}]},{"__typename":"FaqTopicRecord","name":"Card Delivery Status","displayName":"Card Delivery Status","slug":"/card-delivery-status","items":[{"__typename":"FaqItemV2Record","question":"What is Card Delivery Status in Metrobank App?","answer":"This feature allows clients to view their credit card delivery status in the Metrobank App, once the client received the delivery reference number via SMS. "},{"__typename":"FaqItemV2Record","question":"Can I use card delivery status on Metrobank Online?","answer":"No, card delivery status is currently available on Metrobank App only. Download and sign-up in the app to enjoy this feature. "},{"__typename":"FaqItemV2Record","question":"How will I check my card delivery status in Metrobank App?","answer":"\u003cp\u003e3.1 On the Log in page, click the Card Application and Delivery, then select Delivery Status\u003cbr\u003e\u003cbr\u003e\u003cimg src=\"https://web-assets.metrobank.com.ph/1752563258-1.png\" width=\"399\" height=\"709\"\u003e\u003cbr\u003e\u003cbr\u003e\u003cimg src=\"https://web-assets.metrobank.com.ph/1752563258-2.png\" width=\"395\" height=\"702\"\u003e\u003cbr\u003e\u003cbr\u003e3.2 Input the 14 -digit delivery reference number you received via SMS, official SMS sender is MCC.\u003cbr\u003e\u003cbr\u003e\u003cimg src=\"https://web-assets.metrobank.com.ph/1752563257-3.png\" width=\"398\" height=\"708\"\u003e\u003cbr\u003e\u003cbr\u003e\u0026nbsp;3.3 The ff: status will be viewable Client\u0026rsquo;s card is with the courier pending for delivery\u003cbr\u003e\u003cbr\u003e\u0026nbsp;\u003cimg src=\"https://web-assets.metrobank.com.ph/1752563257-4.png\" width=\"398\" height=\"707\"\u003e\u003cbr\u003e\u003cbr\u003eClient\u0026rsquo;s card was successfully delivered to client\u0026rsquo;s nominated address\u003cbr\u003e\u003cbr\u003e\u003cbr\u003e\u003cimg src=\"https://web-assets.metrobank.com.ph/1752563258-5.png\" width=\"399\" height=\"709\"\u003e\u003cbr\u003eInvalid Reference No. \u003cbr\u003e\u003cbr\u003e\u003cimg src=\"https://web-assets.metrobank.com.ph/1752563257-6.png\" width=\"400\" height=\"712\"\u003e\u003cbr\u003e\u003cbr\u003e\u0026nbsp;Unsuccessful delivery of card to client\u0026rsquo;s nominated address\u0026nbsp;\u003cbr\u003e\u003cbr\u003e\u003cimg src=\"https://web-assets.metrobank.com.ph/1752563257-7.png\" width=\"399\" height=\"709\"\u003e\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eCan I install the Metrobank App on multiple devices?\u003c/p\u003e","answer":"Yes. Just register your new device and enter the verification codes sent to your registered mobile number and email address."},{"__typename":"FaqItemV2Record","question":"I did not receive an SMS regarding the 14-digit delivery reference number.  How can I get this? ","answer":"I did not receive an SMS regarding the 14-digit delivery reference number.  How can I get this? "},{"__typename":"FaqItemV2Record","question":"What should I do after too many wrong attempts entering a 14-digit reference number?  ","answer":"You may retry after 30 minutes. "}]},{"__typename":"FaqTopicRecord","name":"QR Ph Transactions - Metrobank App","displayName":"QR Ph Transactions","slug":"/qr-ph-transactions-metrobank-app","items":[{"__typename":"FaqItemV2Record","question":"What is QR Ph?","answer":"QR Ph is the Philippines' official QR code standard. It's a quick, contactless, and secure way to pay, send, and receive money between different banks and e-money accounts in the country."},{"__typename":"FaqItemV2Record","question":"What is QR Code payments for merchants?","answer":"**QR Code** payment is a secure, contactless way for customers to pay for goods and services. A customer simply scans a merchant's unique QR code with their phone, and the payment is instantly credited to the merchant's account. To know if a merchant accepts this payment method, just look for the **QR Ph logo**."},{"__typename":"FaqItemV2Record","question":"Is paying with QR Ph secure?","answer":"Yes, it's very secure. Transactions are encrypted and authenticated, so your payment data is safely transferred between your Metrobank App and the merchant's account."},{"__typename":"FaqItemV2Record","question":"How do I know if a merchant accepts QR Ph?","answer":"Just look for the official QR Ph logo in the middle of their QR code. This means they are a QR Ph Participant and can accept payments from your Metrobank App."},{"__typename":"FaqItemV2Record","question":"Can I pay merchants via QR Ph using the Metrobank App?","answer":"Yes. Person-to-Merchant (P2M) payment is now available on the Metrobank App. Merchants with QR Ph signage can accommodate contactless payment via the Metrobank App. Download or update the app via Google Play Store, Apple App Store, or Huawei AppGallery."},{"__typename":"FaqItemV2Record","question":"How can I pay merchants via QR Ph using the Metrobank App?","answer":"Just follow the steps below:\n\n1. Tap “QR Code” on the lower dashboard menu.  \n\t![](https://web-assets.metrobank.com.ph/1761011514-screenshot-2025-10-17-at-3-59-00-pm.png)\n\n2. Tap “Scan or Upload QR Code”.  \n\t![](https://web-assets.metrobank.com.ph/1761011514-screenshot-2025-10-17-at-3-59-35-pm.png)\n\n3. Scan or upload the Merchant’s QR Ph Code to proceed.  \n\t![](https://web-assets.metrobank.com.ph/1761011514-screenshot-2025-10-17-at-4-03-21-pm.png)\n\n4. Fill out the following information on and then tap “Next”:  \n\n\ta. Source Account  \n\t![](https://web-assets.metrobank.com.ph/1761011514-screenshot-2025-10-17-at-4-03-41-pm.png)\n\n\tb. Amount (for static QR)  \n\n5. Review the transaction details then tap “Confirm”  \n6. Authenticate the transaction using AppKey.  \n\t![](https://web-assets.metrobank.com.ph/1761011514-screenshot-2025-10-17-at-4-04-05-pm.png)  \n\nNote: Use your six-digit passcode and SMS One-Time Password (OTP) if you are not yet AppKey-enabled.\n\nYou will instantly receive SMS and email confirmation that your transaction is successful or failed.\n\n![](https://web-assets.metrobank.com.ph/1761012023-screenshot-2025-10-21-at-10-00-07-am.png)\n\n"},{"__typename":"FaqItemV2Record","question":"Are there fees for using QR Ph?","answer":"No, paying merchants via QR Ph is free."},{"__typename":"FaqItemV2Record","question":"What’s the transaction limit of payment via QR Ph?","answer":"You can pay up to PHP 50,000 per transaction, per day."},{"__typename":"FaqItemV2Record","question":"How long does it take for the merchant to receive the payment?","answer":"QR Ph uses InstaPay facility, so your merchant receives your payment in real time."},{"__typename":"FaqItemV2Record","question":"Can I cancel my QR Ph payment to merchant?","answer":"No. Once authorized, all transactions via QR Ph are final. The funds are debited from your account and credited to the merchant in real time."},{"__typename":"FaqItemV2Record","question":"What is “static QR” and “dynamic QR”?","answer":"- Static QR: You scan and manually enter the amount to be paid.  \n\n- Dynamic QR: The merchant generates a unique QR code for your purchase, and the amount is already filled in for you."},{"__typename":"FaqItemV2Record","question":"Can I use a foreign currency or credit card to pay with QR Ph?","answer":"- Foreign Currency: No, QR Ph payments can only be made using an active Philippine peso account.  \n\n- Credit Card: This feature is not yet available, but we are working to make it an option in the future.  "},{"__typename":"FaqItemV2Record","question":"Can I save a merchant or schedule a payment?","answer":"- Saving a Merchant: You cannot save merchants as a \"contact\" after a QR Ph transaction.\n\n- Scheduling Payments: QR Ph is designed for single, real-time transactions, so you cannot schedule a payment for a later date."},{"__typename":"FaqItemV2Record","question":"What should I do if my payment fails?","answer":"The amount will be auto reversed or credited back in real time, then you can retry the transaction. Otherwise, please wait within three (3) banking days for the amount to be credited back to your account.  \n\nFor assistance, you may call our Customer Service Hotline at (02) 88-700-700 or 1-800-1888-5775 to check your account. You can also send us an email at customerservice@metrobankcard.com."}]},{"__typename":"FaqTopicRecord","name":"Metrobank AppKey","displayName":"Metrobank AppKey","slug":"/metrobank-appkey","items":[{"__typename":"FaqItemV2Record","question":"What is Metrobank AppKey? ","answer":"The Metrobank AppKey is an enhanced security feature on the Metrobank App that lets you authenticate your online transactions either with a biometrics or your passcode.\nEnable your phone biometrics to use the AppKey.\n\nPlease ensure you’re connected to wi-fi or mobile data to use AppKey."},{"__typename":"FaqItemV2Record","question":"How do I activate Metrobank AppKey?","answer":"Learn how to activate AppKey by watching this video:\n\n\u003ciframe width=\"400\" height=\"200\" src=\"https://www.youtube.com/embed/kDNgLxNaL8s?si=Xq-uk7xt5SldRDm9\" title=\"YouTube video player\" frameborder=\"0\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share\" referrerpolicy=\"strict-origin-when-cross-origin\" allowfullscreen\u003e\u003c/iframe\u003e\u003cbr\u003e\n\n1. After Login, tap \"Enhance security with AppKey\"\n2. Enter your passcode and SMS OTP for verification\n3. Tap \"Yes, enable biometrics,\" and authenticate via Face ID or fingerprint scan\n\nAnother way to activate is thru settings. \n\n1.\tAfter Login, select Settings\n2.\tTap AppKey and Passcode \n3.\tToggle the button to enable AppKey\n\nAppKey will be active in 24 hours for enhanced security. In the meantime, you may continue transacting with your current authentication."},{"__typename":"FaqItemV2Record","question":"When do I use AppKey? ","answer":"Upon activation, all transactions will be authenticated using your AppKey such as send money, bills payment and others."},{"__typename":"FaqItemV2Record","question":"How do I approve transactions in Metrobank Online using AppKey?","answer":"You need to have access on your AppKey device to approve the transaction. Simply tap the push notification sent to your AppKey device to proceed. Keep your Metrobank Online open until you see the transaction details page."},{"__typename":"FaqItemV2Record","question":"Can I activate AppKey in another device?","answer":"Yes you can, but you will be deactivated on your current appkey device and won’t be able to approve your transactions. \n\nTo change your AppKey device, tap “Use as AppKey device.”\n\nSimply tap the push notification sent to your AppKey device to proceed with changing your AppKey device.\n\nYou have to activate your AppKey on your new device."},{"__typename":"FaqItemV2Record","question":"What will happen if I use a different device to access my online account?","answer":"A notification will be sent to your AppKey device and approval from it is required before you can proceed with online transactions using other devices."},{"__typename":"FaqItemV2Record","question":"What should I do if I lost my AppKey Device? ","answer":"For your security, immediately block any potential access to your lost device:\n \n1. Call our Contact Center at (02) 88-700-700 to disable your online banking access.\n2. Immediately contact your telco provider to block your SIM card.\n3. Change the passwords to your online accounts, email, and social media.\n4. If possible, lock your phone or erase its data remotely\n\nYou can activate AppKey on your new device: \n\n1. Login and tap “Use as AppKey device.”\n2. Tap “I cannot access my AppKey device” then “Continue”\n3. Click “Enable” and input your passcode.\n4. Verify via OTPs then Enable Biometrics"},{"__typename":"FaqItemV2Record","question":"How do I deactivate my AppKey?","answer":"While we recommend keeping your AppKey activated for maximum security, you can deactivate it if necessary.\n \nHere's how:\n\n1. On the Metrobank App, go to Settings  \n2. Choose “AppKey and Passcode”  \n3. Toggle off \"Biometrics for AppKey\"\n \nPlease note: Your AppKey will automatically deactivate if you perform any of the following actions:\n\n* Uninstall the Metrobank App\n* Change or reset your passcode\n* Add, update, or delete the enrolled biometrics or Face ID on your device\n* Request deactivation through our Contact Center"},{"__typename":"FaqItemV2Record","question":"What should I do if my AppKey gets deactivated?","answer":"Simply login to your device and activate your AppKey."},{"__typename":"FaqItemV2Record","question":"Can I enable/disable FaceID / fingerprint scan in AppKey anytime?","answer":"Yes, you may go to Settings \u003e AppKey and Passcode \u003e toggle the switch"},{"__typename":"FaqItemV2Record","question":"Who do I contact for any concerns on AppKey?","answer":"For inquiries, you may call our Metrobank Contact Center at (02) 88-700-700, or our domestic toll-free number at 1-800-1888-5775, or send an e-mail to customercare@metrobank.com.ph"}]},{"__typename":"FaqTopicRecord","name":"Cooling Off Period","displayName":"Cooling Off Period","slug":"/cooling-off-period","items":[{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhat is a Cooling Off Period?\u003c/p\u003e","answer":"\u003cp\u003eA Cooling Off Period is a temporary waiting period that may apply to your account under certain circumstances. During this time, some financial transactions may be temporarily unavailable. This is part of Metrobank's efforts to help protect customers and support regulatory requirements like BSP’s Anti-Financial Account Scamming Act (AFASA) Republic Act No. 12010.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eHow does a Cooling Off Period work?\u003c/p\u003e","answer":"\u003cp\u003eA Cooling Off Period is designed to provide an additional layer of protection for customers and their accounts. Selected transactions may be restricted from use if a Cooling Off Period applies. During this time, you may be unable to select the source account or proceed with the transaction.\u0026nbsp;\u003c/p\u003e\n\u003cp\u003eA notification will appear on screen, and you will also receive notifications indicating the duration. Transactions can resume once the Cooling Off Period ends.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"https://web-assets.metrobank.com.ph/1783049484-afasa-faq-coolingperiod-3.png\"\u003e\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhat transactions will trigger a Cooling Off Period?\u003c/p\u003e","answer":"\u003cp\u003eTransactions that trigger Cooling Off Period are those related to important account and device changes.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eHow do I know if my account is under a Cooling Off Period?\u003c/p\u003e","answer":"\u003cp\u003eYou will be notified through the Metrobank App, Metrobank Online, or other bank notifications when a cooling off period is applied to your account.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"https://web-assets.metrobank.com.ph/1783049484-afasa-faq-coolingperiod-1.png\"\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e*Sample notification through the Metrobank App.\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cimg src=\"https://web-assets.metrobank.com.ph/1783049484-afasa-faq-coolingperiod-2.png\"\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e*Sample notification through the Metrobank Online website.\u003c/em\u003e\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eHow long is the Cooling Off Period duration?\u003c/p\u003e","answer":"\u003cp\u003eThe duration of the applicable Cooling-Off Period will be communicated to you through the Metrobank App or Online Site, or through other official bank notifications.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eCan I still access my account during the Cooling Off Period?\u003c/p\u003e","answer":"\u003cp\u003eYes. You may continue to access your account and use available banking services during the Cooling-Off Period. Please note that certain outgoing financial transactions, such as fund transfers and bill payments, will be temporarily restricted.\u003c/p\u003e\n\u003cp\u003eAll incoming transactions, and transactions done outside of the Metrobank App or Online site will still push through.\u003c/p\u003e\n\u003cp\u003eNon-financial transactions can still proceed while under Cooling Off Period such as credit card activation, lost credit card reporting, etc.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eCan you perform different transactions that will trigger a Cooling Off Period?\u003c/p\u003e","answer":"\u003cp\u003eYes. When multiple transactions trigger a Cooling-Off Period, the longest applicable duration will apply.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eCan the Cooling Off Period be shortened or removed?\u003c/p\u003e","answer":"\u003cp\u003eNo. The Cooling Off Period is a standard control that cannot be shortened, waived, or bypassed. Affected services will automatically become available once the period has ended.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003e\u003cspan\u003eWhat should I do if I need assistance?\u003c/span\u003e\u003c/p\u003e","answer":"\u003cp\u003eIf you have questions or need assistance, please contact Metrobank through our official customer service channels.\u003c/p\u003e"}]},{"__typename":"FaqTopicRecord","name":"Geolocation Monitoring","displayName":"Geolocation Monitoring","slug":"/geolocation-monitoring","items":[{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhat is Geolocation Monitoring?\u003c/p\u003e","answer":"\u003cp\u003eIn compliance with BSP’s Anti-Financial Account Scamming Act (AFASA) (Republic Act 12010), Geolocation Monitoring is a security feature that checks your device’s location when you make transactions on the Metrobank App, helping confirm it’s really you.\u0026nbsp;\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhy is this feature important?\u003c/p\u003e","answer":"\u003cp\u003eGeolocation monitoring provides an additional layer of security by validating whether your device location is consistent with the transaction being performed. It enhances fraud detection, improves customer experience, and strengthens compliance with BSP AFASA requirements.\u003c/p\u003e\n\u003cp\u003eThis helps keep your account safe by:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eDetecting unusual or suspicious activity\u003c/li\u003e\n\u003cli\u003ePreventing unauthorized access\u003c/li\u003e\n\u003cli\u003eProtecting your funds and personal information\u003c/li\u003e\n\u003c/ul\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWill this affect how I use Metrobank App? \u0026nbsp;\u003c/p\u003e","answer":"\u003cp\u003eNo. You can continue using Metrobank App as usual. Allowing the App to access your location simply enables real-time fraud protection and more accurate security checks, helping ensure that only you can access your account wherever you are. \u0026nbsp; \u0026nbsp;\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eDoes Metrobank track my location all the time?\u003c/p\u003e","answer":"\u003cp\u003eNo. We do not continuously track your location. \u0026nbsp;It’s checked only when you log in or make a transaction, to help detect unusual or suspicious activity.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhat happens if I don’t allow Metrobank App to access my location?\u003c/p\u003e","answer":"\u003cp\u003eIf you choose not to allow location access, you will not benefit from the additional layer of security for your account and transaction.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eHow can I enable or disable location services on my device?\u003c/p\u003e","answer":"\u003cp\u003eYou can enable or disable location services through your device settings by looking for the location permissions for Metrobank App. \u0026nbsp;Steps may vary depending on your device.\u0026nbsp;\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWill my transaction be blocked if my location appears unusual?\u003c/p\u003e","answer":"\u003cp\u003eYour transaction may be blocked if your location appears unusual, as this may be flagged as potential security risk.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003e\u003cspan\u003eDoes Geolocation Monitoring work when I am traveling?\u003c/span\u003e\u003c/p\u003e","answer":"\u003cp\u003eYes. As long as you share your location, this feature will work even when you travel.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhat should I do if my transaction gets blocked because of my location?\u003c/p\u003e","answer":"\u003cp\u003eIf you are traveling or using a secure network and still cannot proceed, please contact Metrobank Customer Service immediately at (+632) 88 700 700 for assistance.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eDo I need to notify Metrobank before I travel to another province or country?\u003c/p\u003e","answer":"\u003cp\u003eNo notification is needed for most trips! Our smart system recognizes a wide list of secure locations to keep your banking seamless.\u0026nbsp;\u003c/p\u003e"}]},{"__typename":"FaqTopicRecord","name":"Money Lock","displayName":"Money Lock","slug":"/money-lock","items":[{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhat is Money Lock?\u003c/p\u003e","answer":"\u003cp\u003eMoney Lock is a security feature available in the Metrobank App that allows you to “lock” part of your available balance. Funds that are locked cannot be used for transfers, withdrawals, or payments until you unlock them, helping protect your money from unauthorized transactions.\u003c/p\u003e\n\u003cp\u003eMoney Lock helps add an extra layer of protection to your account by:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eReducing risk of unauthorized withdrawals or transfers\u003c/li\u003e\n\u003cli\u003eSafeguarding your accounts in case your account is ever compromised\u003c/li\u003e\n\u003cli\u003eGiving you better control over how much money is accessible at any time\u003c/li\u003e\n\u003c/ul\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eHow does Money Lock work?\u003c/p\u003e","answer":"\u003cp\u003eMoney Lock allows you to lock part of your available balance for added security. Locked funds are temporarily unavailable for transactions until unlocked.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eAre all my enrolled accounts eligible for Money lock?\u003c/p\u003e","answer":"\u003cp\u003eNo. You may only use your deposit accounts and prepaid cards to do Money Lock\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eHow to lock my money?\u003c/p\u003e","answer":"\u003cp\u003eTo activate:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eLog in to Metrobank App\u003c/li\u003e\n\u003cli\u003eOn the dashboard, tap the account you want to lock funds in\u003c/li\u003e\n\u003cli\u003eSelect “Money Lock” icon\u003c/li\u003e\n\u003cli\u003eEnter the amount you wish to lock in increments of 100 (in your account’s currency)\u003c/li\u003e\n\u003cli\u003eConfirm the details of the Money Lock transaction\u003c/li\u003e\n\u003cli\u003eAgree to the terms and conditions\u003c/li\u003e\n\u003c/ol\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eCan I change the locked amount?\u003c/p\u003e","answer":"\u003cp\u003eYes. You may adjust your locked funds anytime using the Metrobank App. Simply select your account and enter the amount you want to lock or release.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eHow do I unlock my funds?\u003c/p\u003e","answer":"\u003cp\u003eTo unlock funds:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eLog in to Metrobank App\u003c/li\u003e\n\u003cli\u003eOn the dashboard, tap the account you want to unlock funds in\u003c/li\u003e\n\u003cli\u003eSelect “Money Lock” icon\u003c/li\u003e\n\u003cli\u003eSelect “Unlock Funds” button\u003c/li\u003e\n\u003cli\u003eEnter the amount you want to unlock in increments of 100 (in your account’s currency)\u003c/li\u003e\n\u003cli\u003eConfirm the details of the transaction\u003c/li\u003e\n\u003cli\u003eAgree to the terms and conditions\u003c/li\u003e\n\u003cli\u003eEnter your passcode or authenticate via Appkey\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eOnce unlocked, the funds become immediately available for transactions.\u0026nbsp;\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWill I still earn interest in locked funds?\u003c/p\u003e","answer":"\u003cp\u003eYes. Locked funds remain part of your account balance and will continue to earn interest based on your account terms and conditions.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhat happens if my transaction amount exceeds my available balance?\u003c/p\u003e","answer":"\u003cp\u003eAll financial transactions must be within your available balance. Make sure you have enough unlocked balance to complete your transactions.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhat happens if I uninstall or change my phone?\u003c/p\u003e","answer":"\u003cp\u003eNo worries! \u0026nbsp;Your locked funds will remain restricted from any financial transactions even when you log in on a new device.\u0026nbsp;\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eCan I use Metrobank Online Site to lock and unlock?\u003c/p\u003e","answer":"\u003cp\u003eNo. Money Lock is only available in the Metrobank App. However, you can view your locked balance on the Metrobank Online site.\u0026nbsp;\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eIs there a limit on the number of times I can lock and unlock my funds?\u003c/p\u003e","answer":"\u003cp\u003eNo, there is no limit.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eCan I still perform transactions at branches or ATMs to do Fund Transfers or Cash withdrawals?\u003c/p\u003e","answer":"\u003cp\u003eYes. You may continue transacting at branches and ATMs. However, only your available balance can be used, as locked funds are not accessible for these transactions.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhat happens to my auto-debit arrangements (ADA) or scheduled bills if my funds are locked?\u003c/p\u003e","answer":"\u003cp\u003eScheduled payments will not push through if you do not have enough unlocked balance. To avoid failed payments, unlock sufficient funds before the payment date.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWill the checks that I issued still clear if the funds are locked?\u003c/p\u003e","answer":"\u003cp\u003eNo. Checks may not clear if your unlocked balance is not enough. Always maintain enough unlocked funds to cover issued checks.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eCan I use Money Lock on a joint account?\u003c/p\u003e","answer":"\u003cp\u003eMoney Lock is not available for joint accounts that require approval from all account holders. For joint accounts where either account holder can transact independently, any account holder with Metrobank App access can lock or unlock funds, and changes will apply to both account holders.\u003c/p\u003e"}]},{"__typename":"FaqTopicRecord","name":"Payee Verification (Intrabank)","displayName":"Payee Verification (Intrabank)","slug":"/payee-verification-intrabank","items":[{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhat is Payee Verification?\u003c/p\u003e","answer":"\u003cp\u003e\u003cstrong\u003ePayee Verification\u003c/strong\u003e is a safety feature designed to help ensure you’re sending money to the correct Metrobank account. Before completing your transfer, you’ll see a masked version of the recipient’s account name, allowing you to verify that it matches the person or account you intend to pay.\u003c/p\u003e\n\u003cp\u003eThis feature helps protect you from:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eSending money to the wrong account\u003c/li\u003e\n\u003cli\u003eFraud or scams\u003c/li\u003e\n\u003cli\u003eTyping errors when entering account numbers\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eWhen you enter a Metrobank account number in your transfer:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eThe system checks the account details.\u003c/li\u003e\n\u003cli\u003eThe masked version of the recipient's account name will be displayed.\u003c/li\u003e\n\u003cli\u003eYou review the details before confirming your transaction.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eYou will typically see:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe \u003cstrong\u003emasked version of the recipient account name\u0026nbsp;\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ctable border=\"1\" style=\"border-collapse: collapse;\"\u003e\u003ccolgroup\u003e\u003ccol style=\"width: 50%;\"\u003e\u003ccol style=\"width: 50%;\"\u003e\u003c/colgroup\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eUnmasked version\u003c/td\u003e\n\u003ctd\u003eChristopher Santos Adame\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eMasked version\u003c/td\u003e\n\u003ctd\u003eCh********r S***** A.\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003eFor security and privacy, limited details are shown to prevent misuse.\u003c/p\u003e\n\u003cp\u003eFor joint accounts, only the principal account holder’s name will be masked and displayed. \u0026nbsp;\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003e\u003cspan\u003eWhat should I do if the name shown does not match my intended recipient? \u0026nbsp;Can I still proceed?\u003c/span\u003e\u003c/p\u003e","answer":"\u003cp\u003eIf the name clearly doesn't match your intended recipient, do not proceed. Double check the account number and confirm the details with your recipient before trying again.\u003c/p\u003e\n\u003cp\u003eWe strongly recommend ensuring the details match, as transfers will be processed based on the information provided.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003e\u003cspan\u003eDoes Payee Verification guarantee that the recipient is legitimate?\u003c/span\u003e\u003c/p\u003e","answer":"\u003cp\u003eNo. Payee Verification only confirms the recipient's account name. It does \u003cstrong\u003enot guarantee\u003c/strong\u003e that the account belongs to a trusted or legitimate person or business. For your security, always verify the recipient’s account details before completing the transaction.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhat if the account name has a typo or appears different from what I expect?\u003c/p\u003e","answer":"\u003cp\u003eMinor differences (e.g., abbreviations, spacing, middle names, or masking) are normal and do not necessarily indicate an incorrect account. If the name is generally consistent but you are unsure, please confirm with your recipient before proceeding. If it appears to belong to a completely different person, do not proceed with the transfer and treat it as a mismatch.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhere can I use Payee Verification?\u003c/p\u003e","answer":"\u003cp\u003eYou can use Payee Verification when sending money to a Metrobank account through:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eSend Money\u003c/li\u003e\n\u003cli\u003eCash2Go\u003c/li\u003e\n\u003cli\u003ePayNow\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eVia the Metrobank App and Online site. For transfers to other banks via InstaPay or PESONet, please double-check the account or mobile number carefully before sending.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhat should I do when I see the account name?\u003c/p\u003e","answer":"\u003cp\u003eCheck the displayed name and make sure it matches the person or business you want to pay.\u0026nbsp;\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhy can't I see the full name?\u003c/p\u003e","answer":"\u003cp\u003eTo help protect customer privacy, only part of the account name is displayed.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eHow can I protect myself from scams?\u003c/p\u003e","answer":"\u003cp\u003eBefore sending money:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eMake sure you know the recipient.\u003c/li\u003e\n\u003cli\u003eCheck the displayed name carefully.\u003c/li\u003e\n\u003cli\u003eBe careful of urgent or unexpected payment requests.\u003c/li\u003e\n\u003cli\u003eIf something doesn't feel right, don't proceed.\u0026nbsp;\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eRemember\u003c/strong\u003e: When in doubt, stop and verify before you send money.\u003c/p\u003e"}]}]},{"__typename":"FaqSubcategoryRecord","name":"Metrobank Business Online Solution","slug":"/metrobank-business-online-solution","topics":[{"__typename":"FaqTopicRecord","name":"Signup/Login","displayName":"Signup/Login","slug":"/signup-login","items":[{"__typename":"FaqItemV2Record","question":"I did not receive the temporary password. I only have a temporary user ID. How do I sign in?","answer":"Generate a temporary password by clicking Forgot Password found on the Sign In page of Metrobank Business Online Solutions. Once you generate a temporary password, you can use it to sign in together with your temporary user ID sent to your registered email address."},{"__typename":"FaqItemV2Record","question":"I did not receive a temporary user ID. Where can I get it?","answer":"Contact your Implementation Officer so they can send it to you via email."},{"__typename":"FaqItemV2Record","question":"I have not received my temporary user ID and temporary password. How can I sign in?","answer":"Check if your name and email address are included in the System Administration Designation Form. If not, resubmit the form with your details and provide a scanned copy to your Implementation Officer."}]},{"__typename":"FaqTopicRecord","name":"Account Settings - MBOS","displayName":"Account Settings","slug":"/account-settings-mbos","items":[{"__typename":"FaqItemV2Record","question":"I am the only user. Can I have one user ID for all accounts?","answer":"No. A user that initiates a transaction cannot be the same one that authorizes it."},{"__typename":"FaqItemV2Record","question":"Since I hold various user IDs, can I have the same password for all? ","answer":"For your company’s security, it is strongly recommended that each Metrobank Business Online Solutions account uses a different password."}]}]}]},"selectedSubcategory":{"__typename":"FaqSubcategoryRecord","name":"Metrobank Online"},"selectedTopic":{"__typename":"FaqTopicRecord","name":"Instapay \u0026 PESOnet transactions"},"quickSearchLabel":"","quickSearchItems":[]}],"externalLinkWarningTitle":"You are leaving the Metrobank website","externalLinkWarningDescription":"The link you clicked leads to an external website where\nour Terms and Conditions and Privacy Policy do not apply.\n\nWhen you click Proceed, the external website will open in\na new browser window or tab."},"layoutV2Data":{"navbarV2":{"menuItemsV2":[{"desktopLabel":"Home","mobileLabel":"Home","dataName":"navbar-home","redirectLabel":"Go To Homepage","redirectSlug":"/home","showDropdownLinks":true,"dropdownLinks":[{"groupLabel":"About Us","redirectLabel":"Explore About Us","redirectSlug":"/about-us","categories":[]},{"groupLabel":"Careers","redirectLabel":"Explore Careers","redirectSlug":"https://careers.metrobank.com.ph/","categories":[]}]},{"desktopLabel":"Personal","mobileLabel":"Personal","dataName":"navbar-personal","redirectLabel":"Go To Personal Banking","redirectSlug":"/personal","showDropdownLinks":true,"dropdownLinks":[{"groupLabel":"Accounts","redirectLabel":"Explore Accounts","redirectSlug":"/personal/accounts","categories":[{"label":"","labelSlug":"","navbarPageLinks":[{"slug":"/personal/accounts/savings","label":"Savings","dataName":"navbar-personal-savings","description":"Reach your savings goals while you keep your money safe.","isExternalLink":false,"navbarPage":{"id":"UyIvMbM4ROanrLBBnzoMGg","slug":"/personal/accounts/savings"}},{"slug":"","label":"Checking","dataName":"navbar-personal-checking","description":"Make important payments securely.","isExternalLink":false,"navbarPage":{"id":"ethbYoPNTPaVj78Rw1s91A","slug":"/personal/accounts/checking"}},{"slug":"","label":"Time Deposit","dataName":"navbar-personal-timedeposit","description":"Grow your money while keeping i
