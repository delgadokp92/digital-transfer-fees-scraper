d Installments:\n\u003cul\u003e\n\u003cli\u003eCash2Go \u0026ndash; Convert your available credit limit to cash\u003c/li\u003e\n\u003cli\u003eBalance Transfer \u0026ndash; Consolidate your balances from your other credit cards to your Metrobank credit card\u003c/li\u003e\n\u003cli\u003eBalance Conversion \u0026ndash; Settle your Metrobank credit card balance through installments\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eNote that credit card transactions reflect in your monthly statement.\u003c/p\u003e\n\u003cp\u003eTo know more about these credit card services, please read the terms and conditions for applicable conditions and fees.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eCredit Card Activation\u003c/strong\u003e \u0026ndash; Activate your credit cards right from the app\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eReport Lost Credit Card\u003c/strong\u003e \u0026ndash; Easily report and permanently block credit cards using the app\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eThe NEW Metrobank App also has these standard features which you can use anytime:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eView account balance and details\u003c/li\u003e\n\u003cli\u003eSend Money and Pay Bills using your deposit, prepaid, or credit card account\u003c/li\u003e\n\u003cli\u003eView previous, current, and unbilled Metrobank Credit Card transactions\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eHowever, do note that the app sometimes undergoes maintenance to make sure everything runs smoothly.\u003c/p\u003e\n\u003cp\u003eClick \u003ca href=\"https://www.metrobank.com.ph/personal/services/digital/metrobank-app\"\u003ehere\u003c/a\u003e to learn more.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"What do I need to do before the new app is launched? ","answer":"We will reach out if you have to do something to prepare for the NEW Metrobank App. To be specific:\n\n\u003ctable\u003e\n\u003cthead\u003e\n  \u003ctr\u003e\n\t\t\u003cth style=\"width:33.3%;background-color:#001a88;color:#ffffff\"\u003eCondition\u003c/th\u003e\n    \u003cth style=\"width:33.3%;background-color:#001a88;color:#ffffff\"\u003eWhat will happen\u003c/th\u003e\n    \u003cth style=\"width:33.3%;background-color:#001a88;color:#ffffff\"\u003eWhat you can do\u003c/th\u003e\n  \u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n  \u003ctr style=\"vertical-align:top\"\u003e\n    \u003ctd\u003eIf you only have credit cards enrolled on online banking account\u003c/td\u003e\n    \u003ctd\u003eFor security purposes, accounts on Metrobank Online and the Metrobank Mobile App that only have credit cards will be deleted.\u003c/td\u003e\n    \u003ctd\u003eDon’t worry. You can create a new account on the new app and re-enroll your credit cards.\u003c/td\u003e\n  \u003c/tr\u003e\n  \u003ctr style=\"vertical-align:top\"\u003e\n    \u003ctd\u003eIf you have deposit accounts and credit cards with details that do not match  \u003c/td\u003e\n    \u003ctd\u003eFor security purposes, only YOU should have access to your own credit card and deposit accounts. Credit cards with the same details (name, mobile number, date of birth) registered with your deposit account will be retained on our online banking platforms. To be safe, any credit card that has details that do not match your deposit   account information will be removed by November 11, 2022.     \u003c/td\u003e\n    \u003ctd\u003eDon’t worry. If a credit card is really yours, you can easily re-enroll it and re-validate your details on the new app.\u003c/td\u003e\n  \u003c/tr\u003e\n  \u003ctr style=\"vertical-align:top\"\u003e\n    \u003ctd\u003eIf you have scheduled transactions on the Metrobank Mobile App:    \u003c/td\u003e\n    \u003ctd\u003eTo prevent duplicate transactions on your accounts, all scheduled transactions on the Metrobank Mobile App after December 15, 2022, are cancelled.\u003c/td\u003e\n    \u003ctd\u003eFor your scheduled transactions to continue uninterrupted, please enroll them on Metrobank Online at onlinebanking.metrobank.com.ph by the said date, otherwise you may enroll them again manually once you download the new app.    \u003c/td\u003e\n  \u003c/tr\u003e\n  \u003ctr style=\"vertical-align:top\"\u003e\n    \u003ctd\u003e If you have accounts, billers, and payees on the Metrobank Mobile App:\u003c/td\u003e\n    \u003ctd\u003eYour accounts, payees, and billers on your Metrobank Mobile App and Metrobank   Online accounts will automatically be on the new app.    \u003c/td\u003e\n    \u003ctd\u003eNote that starting November 7, 2022, you can no longer enroll new accounts, payees, and billers on the Metrobank Mobile App. Instead, please enroll them on the new app.\u003c/td\u003e\n  \u003c/tr\u003e\n  \u003ctr style=\"vertical-align:top\"\u003e\n    \u003ctd\u003eIf you currently have an online banking account and do not fall under any of the above \u003c/td\u003e\n    \u003ctd\u003eYou can use the new app straight away. starting November 16, 2022.   \u003c/td\u003e\n    \u003ctd\u003eJust download the app and log in using your existing username and password.\u003c/td\u003e\n  \u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e"},{"__typename":"FaqItemV2Record","question":"Why should I switch to the NEW Metrobank App?","answer":"With the NEW Metrobank App, you can customize your dashboard so that you see everything you need at a single glance.\n\nOn top of the app's must-have features, you can now do more with just a few taps:\n\n* Send money using your credit card via PayNow\n* Pay bills using your credit or prepaid card\n* Get cash installment via Cash2Go\n* Move your balance from other credit cards with Balance Transfer\n* Convert purchases to installments with Balance Conversion\n* Activate your new Metrobank credit card\n* Report and deactivate lost credit card\n\nDownload the NEW Metrobank App and enjoy a seamless online banking experience anytime, anywhere. Just log in using your existing credentials.\n\nLearn more at http://metrobank.com.ph/mb-app"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eCan I use my Metrobank Online account to log in to the Metrobank App?\u003c/p\u003e","answer":"Yes, your login details on Metrobank Online can be used on the NEW Metrobank App."},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eCan I install the Metrobank App on multiple devices?\u003c/p\u003e","answer":"Yes. Just register your new device and enter the verification codes sent to your registered mobile number and email address."},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWill the Metrobank App work even if I\u0026rsquo;m overseas?\u003c/p\u003e","answer":"Yes. Though for transactions that require SMS verification codes, make sure your registered Philippine-issued mobile is activated for international roaming.\n\nDo also check if your telecommunication provider overseas allows you to receive SMS from the Philippines."},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eDoes it matter if I use the\u0026nbsp;Metrobank App or Metrobank Online for my transactions?\u003c/p\u003e","answer":"You can do your transactions on the NEW Metrobank App or Metrobank Online. They share the same accounts overview, transaction history (up to 90 days) as well as scheduled transactions. You will be able to see your accounts on both platforms, however, one might have features not present in the other."}]},{"__typename":"FaqTopicRecord","name":"Account Access and Security","displayName":"Account Access and Security","slug":"/account-access-and-security","items":[{"__typename":"FaqItemV2Record","question":"\u003cp\u003eI tried to sign up on the Metrobank App but an error occurred. What should I do?\u003c/p\u003e","answer":"\u003cp\u003eIf this is your first time to sign up and the error screen below appears, tap on \u0026ldquo;Check Details\u0026rdquo; and verify your account details such as name, date of birth, or contact number.\u003cbr\u003e\u003cbr\u003e\u003cimg src=\"https://web-assets.metrobank.com.ph/1771899593-image-1-issue-something-went-wrong.jpg\"\u003e\u003c/p\u003e\n\u003cp\u003eIf you are signing up using an Metrobank current or savings account, credit card account, Metrobank prepaid card, or YAZZ prepaid card, make sure your account is active.\u003cbr\u003e\u003cbr\u003eIf you have an existing Metrobank Online or Metrobank Mobile Banking App account, just log in directly on the NEW Metrobank App using your existing username and password. No need to sign up.\u003cbr\u003e\u003cbr\u003eIf you experience further issues, call our Contact Center at (02) 88-700-700 or domestic toll-free: 1-800-1888-5775 for assistance.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhen I try to sign up, I get the error: \u0026ldquo;Mobile Number / Email are invalid. Please provide another.\u0026rdquo; What do I do?\u003c/p\u003e","answer":"\u003cp\u003eIf the error screen below appears during sign up, make sure the mobile number and email address you provide match what you registered when you opened your account and that no account is using the same mobile number or email address.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"https://web-assets.metrobank.com.ph/1771899986-1672278815-mobile-number_email-address-invalid.jpeg\"\u003e\u003c/p\u003e\n\u003cp\u003eIf you need to update your registered details of your checking or deposit account, you may update your registered details through our online platform. Please refer to \u003ca href=\"/articles/update-your-mb-contact-info-online\"\u003ehttps://www.metrobank.com.ph/articles/update-your-mb-contact-info-online\u003c/a\u003e.\u003cbr\u003e\u003cbr\u003eIf you need to update your registered details of your credit card account, you may contact Metrobank\u0026rsquo;s Contact Center (02) 88-700-700 (domestic toll-free1-800-1888-5775) to update your account details.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"I need to update my registered mobile number and/or email address, how do I do that?","answer":"For checking or deposit accounts, you may update your registered details through our online platform. Please refer to https://www.metrobank.com.ph/articles/update-your-mb-contact-info-online\n\nFor credit card accounts, you may contact Metrobank’s Contact Center (02) 88-700-700 or 1-800-1888-5775 to update your account details."},{"__typename":"FaqItemV2Record","question":"What should I do if I forgot my username?","answer":"1. From the login page, click on \"Recover Access.\" \n2. Select the \"Username\" tab. \n3. Enter the email address or mobile number you registered during signup. \n4. Authenticate the transaction. \n\nYour username will be sent to your email address or mobile number.\n"},{"__typename":"FaqItemV2Record","question":"What is a passcode?","answer":"Metrobank Passcode is a security feature of the NEW Metrobank App and Metrobank Online. You are required to nominate a 6-digit code when you sign up. You will need this code for some transactions in the app."},{"__typename":"FaqItemV2Record","question":"I forgot my passcode, how do I recover it?","answer":"Call our Contact Center at (02) 88-700-700 or domestic toll-free number: 1-800-1888-5775 to request for a passcode reset."},{"__typename":"FaqItemV2Record","question":"I did not receive my SMS One-Time Password (OTP), what should I do?","answer":"Please make sure you have a strong signal and the mobile number you are using is the one you provided to your branch when you opened your account."},{"__typename":"FaqItemV2Record","question":"When I try to sign up, I get the error: “Device security alert”, What do I do?","answer":"Before logging-in, make sure that the “developer mode” in your phone’s settings is turned off. This is to prevent performance issues whenever you use the NEW Metrobank App.\n\n![](https://web-assets.metrobank.com.ph/1672279079-device-security-alert-img.jpeg)\n\nIn order to turn off the “developer mode”, go to the Settings your phone, look for “Developer Options”, then switch off the developer option. \n\nHere’s a sample from a Samsung device:\n\n![](https://web-assets.metrobank.com.ph/1672279105-developer-mode-mboa-28dec.png)\n\nIn case you cannot find the “Developer Options” in your phone’s Settings, you may check your device’s online manual to help you on how to turn off the “developer mode”. Here are sample links for common mobile devices:\n\n* [Apple](https://developer.apple.com/documentation/xcode/enabling-developer-mode-on-a-device)\n* [Huawei](https://developer.huawei.com/consumer/en/doc/quickapp-open-developer-option)\n* [Oppo](https://support.oppo.com/eg-en/answer/?aid=neu7554)\n"},{"__typename":"FaqItemV2Record","question":"Do I have to use the same mobile number registered with my bank or credit card account?","answer":"Yes. The mobile number you register on the NEW Metrobank App should be the same as the mobile number registered at your branch of account."},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eHow secure is the Metrobank App?​\u003c/p\u003e","answer":"The NEW Metrobank App complies with the best security practices to protect your account information and bank transactions through:\n\n* User ID and password login\n* Biometrics login\n* SMS verification code and/ or Passcode for financial transactions\n* Two-factor (SMS and email) verification codes to add registered device\n* Email and SMS notifications for critical transactions\n* Firewall protection\n* Message encryption\n* Device authentication"},{"__typename":"FaqItemV2Record","question":"What is a verification code?","answer":"A verification code or One-Time Password (OTP) is a single-use, random, 6-digit numeric code you use to authenticate a transaction. This can be an email or SMS one-time password (OTP) code and is valid for only 5 minutes.\n\nYou can request for a new one-time password (OTP) code by tapping _Resend_."},{"__typename":"FaqItemV2Record","question":"What are biometrics?","answer":"Depending on your phone, you can use biometrics such as touch ID / fingerprint or facial recognition to log in to the NEW Metrobank App.\n\nNote that you can only use this feature on one registered device. If you enable it on a new device, the app will automatically deactivate it on your current device and register the new device on your user profile."},{"__typename":"FaqItemV2Record","question":"What should I do if I can’t enroll my biometrics?","answer":"Check if you have enrolled biometrics in your phone settings and if your phone supports biometrics."},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eIf I change my mobile phone, can I still use the Metrobank App?\u003c/p\u003e","answer":"Yes. Just download the app on your new device and log in. The app will require you to do a two-step verification process. First, you will need to verify your registered mobile number, and then your email address. You will receive these verification codes so enter these in the app to authenticate your new device."},{"__typename":"FaqItemV2Record","question":"What should I do if I lose my mobile device?","answer":"If your mobile device is lost or stolen, call our Contact Center at (02) 88-700-700 or domestic toll-free: 1-800-1888-5775 to deactivate your account.\n\nTo reactivate your account, call our Contact Center and have your mobile number updated."},{"__typename":"FaqItemV2Record","question":"What should I do if my profile has been locked? ","answer":"If your profile has been locked, please change your password via Recover Access. This will automatically unlock your profile, and there is no need to contact the hotline for assistance."},{"__typename":"FaqItemV2Record","question":"How can I delete my user profile on the Metrobank App?","answer":"To delete your online banking account, call our Contact Center at (02) 88-700-700 or our domestic toll-free number at 1-800-1888-5775.\n\nNote that if you delete your online banking account, you will not be able to access Metrobank Online and the NEW Metrobank App.\n\nAfter deletion, you can create a new online banking account. However, you will have to re-enroll your accounts, credit cards, billers, and contacts."},{"__typename":"FaqItemV2Record","question":"I am the secondary accountholder of a joint-or account. Can I enroll my account in online banking?\u000b","answer":"Yes, you can enroll your account on Metrobank Online and the Metrobank App. Visit this [link](https://www.metrobank.com.ph/articles/mbo-how-to) to learn more."},{"__typename":"FaqItemV2Record","question":"Can both accountholders in a joint-or account sign up for an online banking account?\u000b","answer":"Yes, as long as\n\n1. The primary and secondary accountholders have different mobile numbers registered with the bank\n2. The mobile number of the secondary account should be up to date in bank records. If you need to update it, you may do so at your branch of account. "},{"__typename":"FaqItemV2Record","question":"Can I change password, passcode and manage device using my other devices? ","answer":"No, you can only perform these activities using your AppKey Device."},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eCan I block my login credentials in Metrobank App?\u003c/p\u003e","answer":"\u003cp\u003eNo, you can only block your login account credentials in Metrobank Online (https://onlinebanking.metrobank.com.ph/signin). You may click \u003ca href=\"/help/digital-banking/metrobank-online/account-login-security?faq=how_do_i_block_my_metrobank_online_account\"\u003ethis\u003c/a\u003e to know more.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eCan I still access my Metrobank App after blocking my login account in Metrobank Online?\u003c/p\u003e","answer":"\u003cp\u003eNo, since Metrobank Online/App uses the same login account.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eCan I still receive funds deposited to my account or will my check payment be processed even if my Metrobank Online/App login account is blocked?\u003c/p\u003e","answer":"\u003cp\u003eBlocking of login account will not change or impact the status of your linked accounts. Eligibility is dependent on the current status of your account.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWill my scheduled transactions proceed even if my login account is blocked?\u003c/p\u003e","answer":"\u003cp\u003eYes, all scheduled transactions made Metrobank Online/App before successfully blocking the login account will run as planned.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eMy online transaction requires to login in Metrobank Online/App (e.g. Tax Payment, MB Pay, and among others) can I still proceed even if my login account is blocked?\u003c/p\u003e","answer":"\u003cp\u003eNo, all online transactions that will connect to Metrobank Online/App will not be processed.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eCan I unblock my Metrobank Online/App after using Block your account facility?\u003c/p\u003e","answer":"\u003cp\u003eYes, you may request to unblock by calling Customer Hotline (02) 88-700-700.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eHow long will it take to access my account after I request to unblock it?\u003c/p\u003e","answer":"\u003cp\u003eYour accounts will be unblocked within 24 hrs after request.\u003c/p\u003e"}]},{"__typename":"FaqTopicRecord","name":"Bills Payment - Metrobank App","displayName":"Bills Payment","slug":"/bills-payment-metrobank-app","items":[{"__typename":"FaqItemV2Record","question":"How do I pay bills and manage billers?","answer":"\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eHow do I pay bills?\u003c/b\u003e\u003c/summary\u003e\n→ To learn how to pay your bills, you may watch the how-to video at https://www.metrobank.com.ph/articles/mb-app-how-to  \n\nYou may also follow these steps:\n\t\n1.\tGo to Pay Bills from any of these screens then tap _‘Pay Bills’_ button.    \n\t* Dashboard\n\t* Shortcuts\n\t* Deposit Account overview screen\n\t* Prepaid Account overview screen\n\t* Credit Card overview screen\n\t* Enrolled or All Billers\n\t* Side navigation menu\n\t* Bottom navigation bar\n2.\tSelect the source account by tapping the _“From”_ field. The _“From”_ will be pre-filled if you came from an account overview page or have only one account enrolled. Otherwise, you have to select the source account.\n3.\tType the amount. It can’t be higher than the available balance of the source account.\n4.\tChoose the biller. Tap on the _“To”_ field to select the type of biller.\n5.\tChoose the schedule. You can tap either immediate or later depending on your preference.\n6.\tEnter any notes you want to add (but this is optional), then tap _“Next”_\n7.\tReview the details and tap _“Confirm”_ if correct\n8.\tEnter your Passcode and tap _“Next”_\n9.\tA confirmation screen will appear confirming that your transaction is being processed.\n10.\tConfirm the status of your transaction through email or SMS notifications. You may also check the Activity Log of the app by tapping the bell icon at the upper right corner of the Dashboard screen.\n\t\u003c/details\u003e\n\u003cbr\u003e\t\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eHow long does it take for bill payments to be posted or credited?\u003c/b\u003e\u003c/summary\u003e\n\t→ Bill payments are posted in 2 to 3 banking days.\n\u003c/details\u003e\n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eHow do I enroll my billers?\u003c/b\u003e\u003c/summary\u003e\n\t→ To learn how to enroll billers, you may watch the how-to video at https://www.metrobank.com.ph/articles/mb-app-how-to\n\nYou may also follow these steps:\n1. Choose “Billers” under the Side Navigation Menu\n2. Tap “+Enroll” button\n3. Select or type in the biller’s name in the search bar\n4. Fill out biller details and tap “Next”\n5. Review the biller’s details and tap “Confirm”\n6. Enter your passcode and tap “Proceed”       \n\u003c/details\u003e\n\u003cbr\u003e\t\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eCan I pay bills using my Metrobank credit card?\u003c/b\u003e\u003c/summary\u003e\t\n→ Yes. All credit cards except ON Internet Mastercard and Metrobank Dollar Card can be used as a source of payment for bills payment.\n\u003c/details\u003e\n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eI made an error with the Biller Name and Account/Subscriber Number and proceeded with my transaction. Will I get a refund?\u003c/b\u003e\u003c/summary\u003e\t\n→ No refunds are allowed once the transaction has been successfully processed and charged to your Metrobank credit card. You need to ensure that the details required to process bills payment and the amount are complete and accurate.\n\u003c/details\u003e\n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eHow do I delete enrolled billers?\u003c/b\u003e\u003c/summary\u003e\t\n→ Follow these steps to delete your billers:\n\t\n1. Choose “Billers” under the Side Navigation Menu\n2. Tap the enrolled biller you wish to delete\n3. Tap “Edit Details”\n4. Tap “Unenroll Biller”\n5. A verification prompt will appear. Tap “Unenroll” to proceed.\n6. Enter your passcode and tap “Proceed”\n\u003c/details\u003e"},{"__typename":"FaqItemV2Record","question":"Why is Metrobank putting a PHP250,000 daily account limit for bill payment transactions?","answer":"As part of Metrobank’s efforts to ensure the security of clients’ accounts, it has capped clients’ daily bill payment transaction to PHP250,000 starting 14 April 2023."},{"__typename":"FaqItemV2Record","question":"How does this affect my bill payment transactions via Metrobank Online and the Metrobank App?","answer":"The PHP250,000 daily bill payment transaction limit is applied per Metrobank account. This means, it is your total bills payment transaction limit via Metrobank Online and the Metrobank app."},{"__typename":"FaqItemV2Record","question":"Is it possible to increase my daily bill payment transaction limit?","answer":"Yes, we can change/ customize the daily bill payment transaction limit of your account. You may visit or call your branch of account to request for this change. Visit https://www.metrobank.com.ph/locator to get the contact details and address of your branch."},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhere can I find my enrolled billers and contacts on the Metrobank App?\u003c/p\u003e","answer":"On the dashboard, tap Menu. Select Billers for viewing of enrolled billers. You may also select Enrolled Contacts if you wish to view your contacts."}]},{"__typename":"FaqTopicRecord","name":"Funds Transfer","displayName":"Funds Transfer","slug":"/funds-transfer-metrobank-app","items":[{"__typename":"FaqItemV2Record","question":"How do I send money to other local banks (via InstaPay or PESONet)?","answer":"\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eWhat is Instapay?\u003c/b\u003e\u003c/summary\u003e\n→ InstaPay is an electronic fund transfer (EFT) service that enables a customer of a participating Bangko Sentral ng Pilipinas (BSP)-supervised financial institution (BSFI) to transfer Philippine peso funds from their account to another BSFI account.\u003cbr\u003e\u003cbr\u003eInstaPay can be used for:\u003cbr\u003ea. Person-to-person payments\u003cbr\u003eb. Domestic remittances\u003cbr\u003ec. Payment to service providers, such as plumbers, electricians, carpenters, etc.\u003cbr\u003ed. Face-to-face, non-cash payments for goods (e.g. sari-sari stores, bazaars, garage sales)\u003cbr\u003ee. Donation to charitable institutions\u003cbr\u003ef. Top ups to digital wallets like GCash or Maya\u003cbr\u003e\u003cbr\u003eYou may watch the video on how to send money via InstaPay at https://www.metrobank.com.ph/articles/mb-app-how-to\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eWho are the partner InstaPay financial institutions?\u003c/b\u003e\u003c/summary\u003e\n→ For a list of partner financial institutions, go to https://www.metrobank.com.ph/articles/list-of-ft-partners\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eIs InstaPay secure?\u003c/b\u003e\u003c/summary\u003e\n→ Yes. InstaPay is secure and protected by the same level of security standards applied to the interbank funds transfer service currently provided by BSP-supervised financial institutions.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eHow does InstaPay work?\u003c/b\u003e\u003c/summary\u003e\n→ The sender’s financial institution debits their account and transfers the funds to the recipient’s financial institution. Crediting of funds happens in real time on InstaPay so the funds are available in the recipient’s account right away.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eIs there an InstaPay transaction fee charged to the sender?\u003c/b\u003e\u003c/summary\u003e\n→ No. There is no transaction fee when you send money via InstaPay. The beneficiary is also not charged a transaction fee and receives the full amount sent. \u003cbr\u003e\u003cbr\u003e\u003cbr\u003eHowever, using your credit card as source of funds incurs a charge of 1.5% of the transacted amount, or PHP 25 whichever is higher.\u0026nbsp;\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eHow much can I send via InstaPay?\u003c/b\u003e\u003c/summary\u003e\n→ You can send up to PHP 100,000 per day, with a maximum of PHP 50,000 per transaction.​ Note that receiving limits may differ with every receiving institution. Make sure to check with your beneficiary’s transaction limits before sending money.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eWhat happens if I type the wrong account number of my InstaPay beneficiary?\u003c/b\u003e\u003c/summary\u003e\n→ If you type an account number incorrectly and the transaction pushed through, contact the receiving bank to coordinate with the recipient if he/she is willing to reverse the transaction. If not, the funds cannot be credited back, especially since there is a confirmation page and verification before proceeding with the fund transfer.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eDo the sending institution and receiving institution check the InstaPay beneficiary's name against the account number?\u003c/b\u003e\u003c/summary\u003e\n→ Both sending and receiving institutions validate the account number only. According to BSP Circular No. 980, InstaPay participants are not required to match the name against the account number.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eCan I cancel an InstaPay transaction?\u003c/b\u003e\u003c/summary\u003e\n→ InstaPay transactions are debited from your account and credited to your beneficiary in real time. Once your account is debited, the transaction cannot be cancelled.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eMy app’s screen says “Transaction Successful” for my InstaPay transaction but my beneficiary did not receive the funds. How can my beneficiary claim the money I sent?\u003c/b\u003e\u003c/summary\u003e\n→ If a transaction is successful but the funds are not credited to your beneficiary’s account, there might be a connection issue with BancNet or the receiving institution. Should this happen, your beneficiary can contact their receiving institution to know when the funds will be credited.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eWhat is PESONet?\u003c/b\u003e\u003c/summary\u003e\n→ PESONet is an electronic fund transfer (EFT) service that enables customers of participating financial institutions to transfer funds in Philippine peso to customers of other financial institutions in the Philippines. You can send up to PHP 200,000 to other bank accounts using PESONet. \u003cbr\u003e\u003cbr\u003eYou may watch the video on how to send money via PESONEt at https://www.metrobank.com.ph/articles/mb-app-how-to.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eWho are the partner PESONet financial institutions?\u003c/b\u003e\u003c/summary\u003e\n→ For a list of partner financial institutions, go to https://www.metrobank.com.ph/articles/list-of-ft-partners\u003c/details\u003e"},{"__typename":"FaqItemV2Record","question":"How to transfer funds and receive funds using Quick Response (QR) Code?","answer":"\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eWhat is QR PH?\u003c/b\u003e\u003c/summary\u003e\t\n→ QR PH is the Philippine’s QR code standard for secure payments and fund transfers, as approved by the Philippine Payments Management, Inc. (PPMI) and the Bangko Sentral ng Pilipinas (BSP). \n\u003c/details\u003e  \n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eHow do I use QR PH on the Metrobank App?\u003c/b\u003e\u003c/summary\u003e\n\n→ To send money via QR code, scan or upload a compatible QR code using the Metrobank App to send money to Metrobank accounts, other banks, and other Receiving Financial Institutions (RFIs).\u003cbr/\u003e \nTo receive money via QR code, generate a QR code using the Metrobank App and share it to the sender.\n\u003c/details\u003e  \n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eAre there fees or charges for using QR codes?\u003c/b\u003e\u003c/summary\u003e\n\n→ No. Using QR codes is free. However, transfer fees apply when sending via InstaPay.\n\u003c/details\u003e  \n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eWhat are the transaction limits when using QR codes?\u003c/b\u003e\u003c/summary\u003e\n\n→ The daily limit for sending money via QR codes to unenrolled Metrobank accounts is PHP 50,000 per day.\u003cbr/\u003e  \nFor sending to other banks via InstaPay, it’s also PHP 50,000 per day.\n\u003c/details\u003e  \n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eCan I send money via PESONet using QR codes?\u003c/b\u003e\u003c/summary\u003e\n\n→ No, it is currently not possible. You can only send money to unenrolled Metrobank accounts and other banks using QR via InstaPay for now.\n\u003c/details\u003e  \n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eHow do I generate a QR code on the Metrobank App?\u003c/b\u003e\u003c/summary\u003e\n\n→ There are several ways to generate a QR code on the Metrobank App:\u003cbr/\u003e\n\t**Option 1:** On the login screen, at the bottom, tap on the arrow pointing up. This opens the “Other Actions” menu. Tap on “QR code”\u003cbr/\u003e\n\t**Option 2:** On the dashboard bottom navigation menu, Tap on “QR”,\u003cbr/\u003e\n\t**Option 3:** On the dashboard shortcuts, tap on “Generate or Scan QR code” icon\u003cbr/\u003e\n\t**Option 4:** On account overview, tap on “Generate QR”. \n\t\nJust follow the on-screen instructions. When you select an account that you like to generate QR for, please provide an Alias. You can opt to also provide amount and notes, but this is optional.  \n\nAfter generating the QR code, it can be scanned, shared, and downloaded to your device, as long as device permissions are enabled.\n\n\u003c/details\u003e  \n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eHow do I scan or upload a QR code to the Metrobank App?\u003c/b\u003e\u003c/summary\u003e\n\n→ There are several ways to scan a QR code using the Metrobank App:\u003cbr/\u003e\n\t**Option 1:** On the login screen, at the bottom, tap on the arrow pointing up. This will open “Other Actions” menu, tap “QR code”\u003cbr/\u003e \n\t**Option 2:** On the static landing page, tap “Scan QR”,\u003cbr/\u003e \n\t**Option 3:** On the dashboard bottom navigation menu, tap “QR”, \nFollow the on-screen prompts to Scan or Upload the QR code. Once the QR is scanned, the send money form will appear. Just fill in the required details to send money.\n\n\u003c/details\u003e  \n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eWhat are the device requirements to use QR codes?\u003c/b\u003e\u003c/summary\u003e\n\n→ Your device needs the to have a camera and enough gallery and storage space, with permissions to use these services granted to the Metrobank App.\n\u003c/details\u003e  \n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eWhy can’t I generate QR code for my foreign currency account, credit cards, or Yazz prepaid cards?\u003c/b\u003e\u003c/summary\u003e\n\n→ At this time, we can generate QR for active peso deposit accounts only.\n\u003c/details\u003e"},{"__typename":"FaqItemV2Record","question":"If my transaction is not yet reflected after 2 to 3 banking days, what should I do?","answer":"Call our Contact Center at (02) 88-700-700 or domestic toll-free: 1-800-1888-5775 for assistance."}]},{"__typename":"FaqTopicRecord","name":"Other Features","displayName":"Other Features","slug":"/other-features","items":[{"__typename":"FaqItemV2Record","question":"How to send load via the Metrobank App?","answer":"\u003cstyle\u003e\n/* Create two equal columns that floats next to each other */\n.faq-mboa-left {\n  float: left;\n \tmargin: 3px;\n background-color: #019ed8;\n}\n\n/* Create two equal columns that floats next to each other */\n.faq-mboa-right {\n    margin: 3px;\n background-color: #019ed8;\n}\n\n/* Clear floats after the columns */\n.faq-mboa:after {\n  content: \"\";\n  display: table;\n  clear: both;\n}\n\n/* Responsive layout - makes the two columns stack on top of each other instead of next to each other */\n@media screen and (max-width: 600px) {\n  .faq-mboa {\n    width: 100%;\n  }\n}\n\u003c/style\u003e\n\n\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eCan I send load using the Metrobank App?\u003c/b\u003e\u003c/summary\u003e\t\n\t\n→ Yes.  The send load service is available on the Metrobank App. You can also send load using Metrobank Online. \n\u003c/details\u003e\n\t\u003cbr\u003e\n \u003cdetails\u003e \n\t\u003csummary\u003e\u003cb\u003eIs there a convenience fee on every successful send load transaction via the Metrobank App?\u003c/b\u003e\u003c/summary\u003e\t\n\t\n→ No. This service is FREE of charge. \n\u003c/details\u003e \n\t\u003cbr\u003e\n \u003cdetails\u003e \n\t\u003csummary\u003e\u003cb\u003eHow to load a prepaid mobile number?\u003c/b\u003e\u003c/summary\u003e\t\n\t\n→ Here are the steps in sending load via the Metrobank App: \n\t\n* Select Send Load via the Shortcut Widget, via Account Overview Actions or via Bottom Navigation Bar  \n* Enter details on the following fields:    \n\t - From (source account)    \n\t -\tMobile Number   \n\t -\tLoad Product    \n\t -\tNotes (Optional)    \n* Tap ‘Next’     \n* Review your details, then tap ‘Confirm’   \n\u003c/details\u003e \n\u003cbr\u003e\n \u003cdetails\u003e \n\u003csummary\u003e\u003cb\u003eCan I load a postpaid mobile number?\u003c/b\u003e\u003c/summary\u003e \n\n→ No. Only prepaid mobile numbers can be loaded using this service.  \n\u003c/details\u003e \n\u003cbr\u003e\n\u003cdetails\u003e \n\t\u003csummary\u003e\u003cb\u003eWhat are the available telco networks for send load on the Metrobank App?\u003c/b\u003e\u003c/summary\u003e \n\t\n→ You can send load to Globe, TM, Smart, SUN and TNT. \n\u003c/details\u003e \n\u003cbr\u003e \n\u003cdetails\u003e \n\t\u003csummary\u003e\u003cb\u003eCan I send gaming pins for my gaming account?\u003c/b\u003e\u003c/summary\u003e  \n\t\n→ Yes, we offer gaming pins for Cherry, Garena, Mobile Legends, PUBG, Ragnarok Mobile, and Warp Portal. \n\t\u003c/details\u003e \n\u003cbr\u003e \n\u003cdetails\u003e \n\t\u003csummary\u003e\u003cb\u003eCan I send load using my credit card account as a source?\u003c/b\u003e\u003c/summary\u003e  \n\t\n→ No. You can only use a deposit account as your source. \n\u003c/details\u003e \n\u003cbr\u003e \n\u003cdetails\u003e \n\t\u003csummary\u003e\u003cb\u003eWhy didn’t I receive my prepaid load request?\u003c/b\u003e\u003c/summary\u003e  \n\n→ You may experience delays in receiving your load due to technical or network issues, which depend on your mobile network provider. Please expect your load within 24 hours.\n\u003c/details\u003e \n\u003cbr\u003e \n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eWhat is Send Load?\u003c/b\u003e\u003c/summary\u003e  \n\n→ Is a feature that allows you to purchase and send prepaid mobile load to yourself or others using your Metrobank account. \n\u003c/details\u003e\n\u003cbr\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eWhat are the new features for Send Load? \u003c/b\u003e\u003c/summary\u003e  \n\n→ Scheduled Send Load - allows users to easily schedule send load transactions in advance, users may also cancel their scheduled transactions.\n\n→ Enroll Contacts - allows users to access the device's phonebook for their intended recipients.\n\u003c/details\u003e \n\u003cbr\u003e \n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eWhat are the frequencies available for scheduled send load? \u003c/b\u003e\u003c/summary\u003e  \n\n→ Customers can conveniently schedule send load transaction as One-Time Future dated or Repeating \n\u003c/details\u003e \n\u003cbr\u003e \n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eWhat are the steps to perform scheduled send load?  \u003c/b\u003e\u003c/summary\u003e  \n\n→ Step 1: Enter the recipient’s details or select from your contacts\n\t\n![](https://web-assets.metrobank.com.ph/1748858598-picture1.jpg)\n![](https://web-assets.metrobank.com.ph/1748858597-picture-2.jpg)\n\n\n→ Step 2: For Repeating Transaction, set the Frequency then hit the next button\n\n![](https://web-assets.metrobank.com.ph/1748858597-picture-3.jpg)\n![](https://web-assets.metrobank.com.ph/1748858597-picture-4.jpg)\n\n\n→ Step 3: Confirm details \u0026 tap Confirm button\n\n![](https://web-assets.metrobank.com.ph/1748858598-picture5.jpg)\n![](https://web-assets.metrobank.com.ph/1748858598-picture6.jpg)\n\n→ Step 4: Authenticate the transaction \u0026 wait for the confirmation\n\n![](https://web-assets.metrobank.com.ph/1748858598-picture-7.jpg)\n![](https://web-assets.metrobank.com.ph/1748858598-picture-8.jpg)\n\u003c/details\u003e \n\u003cbr\u003e \n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003e How to perform enrollment of contacts?  \u003c/b\u003e\u003c/summary\u003e  \n\n→ Step 1: On the menu (≡),Tap Enrolled Contacts \n\n![](https://web-assets.metrobank.com.ph/1747189394-picture9.jpg)\n\n→ Step 2: Tap + Enroll      \n\n![](https://web-assets.metrobank.com.ph/1747189394-picture10.jpg)\n\n→ Step 3: Enter the contact details \n\t\n![](https://web-assets.metrobank.com.ph/1747189393-picture11.jpg)\n\n→ Step 4: Select a provider\n\t\n![](https://web-assets.metrobank.com.ph/1747189392-picture12.jpg)\n\n→ Step 5: Access your device's enrolled  contacts to get the mobile number Load!\n\t\n![](https://web-assets.metrobank.com.ph/1747189393-picture13.jpg)\n\n→ Step 6: If there's an invalid input, error message will prompt  \n\t\n![](https://web-assets.metrobank.com.ph/1747189393-picture-14.jpg)\n\n→ Step 7: Review and confirm the details \n\t\n![](https://web-assets.metrobank.com.ph/1747189393-picture15.jpg)\n\n→ Step 8: You've successfully a new contact for Send\n\n![](https://web-assets.metrobank.com.ph/1747189393-picture-16.jpg)\n\n\n\u003c/details\u003e \n\u003cbr\u003e  \n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eCan the user edit the details of previously scheduled load transaction, e.g. client want to change the load amount, or change the date of scheduled transaction, etc? \u003c/b\u003e\u003c/summary\u003e  \n\n→ No, client can only perform cancellation.  \n\u003c/details\u003e\n\t\u003cbr\u003e \n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eHow to perform cancellation of scheduled send load transactions?  \u003c/b\u003e\u003c/summary\u003e  \n→ Step 1: On the menu (≡), tap Schedules \n\n![](https://web-assets.metrobank.com.ph/1747190176-picture-17.jpg)\n\n→ Step 2: Tap the SEND LOAD tab and select the scheduled transaction \n\t\n![](https://web-assets.metrobank.com.ph/1747190176-picture-18.jpg)\n\n→ Step 3: Tap Cancel Schedule and authenticate the transaction  \n\n![](https://web-assets.metrobank.com.ph/1747190176-picture-19.jpg)\n\t\n\u003c/details\u003e \n\t\u003cbr\u003e \n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eWhat is the authentication used for scheduling and cancelling of Send load transaction? \u003c/b\u003e\u003c/summary\u003e  \n\n→ AppKey authentications if activated. If not, default authentications such as Passcode \u0026 SMS OTP will apply.  \n\u003c/details\u003e \n\t\u003cbr\u003e \n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eWill I be notified if the scheduled transaction/s is processed or rejected?  \u003c/b\u003e\u003c/summary\u003e  \n\n→  Yes, client will receive a success/failed SMS \u0026 email notifications on the day of schedule\n\u003c/details\u003e \n\t\u003cbr\u003e \n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eHow soon will the send load transaction take effect? Do we need batch run?\u003c/b\u003e\u003c/summary\u003e  \n\n→ Yes, batch run shall be executed starting 8:30 AM up to 9:30 AM \n\u003c/details\u003e \n\t\u003cbr\u003e \n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eHow soon will the cancellation take effect? Can this be done by a CSR via MB Command Center?  \u003c/b\u003e\u003c/summary\u003e  \n\n→ Cancellation can only be done by the User. It can be cancelled right away after the authentication.  \n\u003c/details\u003e \n\t\u003cbr\u003e \n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eHow to perform unenroll of contacts? \u003c/b\u003e\u003c/summary\u003e \n\t\n→ Step 1: Go to the Side Navigation -  Tap Enrolled Contacts\n\n![](https://web-assets.metrobank.com.ph/1747190201-picture-20.jpg)\n\n→ Step 2: Under Enrolled Contacts, select  \"Load Products\" tab  \n\t\n![](https://web-assets.metrobank.com.ph/1747190201-picture-21.jpg)\n\n→ Step 3: Select the contact to be deleted, then Click ‘Bin’ icon \n\t\n![](https://web-assets.metrobank.com.ph/1747190202-picture-22.jpg)\n\n→ Step 4: Choose Delete Contact   \n\n![](https://web-assets.metrobank.com.ph/1747190201-picture-23.jpg)\n\u003c/details\u003e \t\n\t\u003cbr\u003e \n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eWill the scheduled transaction push through if lost phone and the sim card is already blocked by the telco? \u003c/b\u003e\u003c/summary\u003e  \n\n→ Yes, the scheduled sendload will still push through as long as the account linked to that mobile is funded. \n\u003c/details\u003e "},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eCan I buy load, send remittance via Cash Pick-Up, do Cardless Withdrawal, Order Checkbook, apply for Auto Debit Arrangement in the Metrobank App?\u003c/p\u003e","answer":"These features and more will be added to the NEW Metrobank App and Metrobank Online in the future.\n\nFor the meantime, you can buy load, do a cardless withdrawal, order a checkbook using Metrobank Online at https://onlinebanking.metrobank.com.ph and you can send remittance via Cash Pick-Up using the old Metrobank Mobile App."},{"__typename":"FaqItemV2Record","question":"How do I find the nearest Branch, ATM and CAM through the Metrobank App?","answer":"From the login screen, slide up the bottom arrow to access “Other Actions” menu. Tap on “Branch, ATM, CAM Locator” and follow the prompts to be sent to the Branch, ATM, and CAM locator page on our website."},{"__typename":"FaqItemV2Record","question":"How do I get the latest Metrobank forex rates via the Metrobank App?","answer":"From the login screen, slide up the bottom arrow to access “Other Actions” menu. Click on Forex Rates and follow the on-screen instructions.  \n\nYou can also tap to the hamburger menu after logging in and tap “Forex Rates.”"}]},{"__typename":"FaqTopicRecord","name":"Credit Card Features - Metrobank App","displayName":"Credit Card Features","slug":"/credit-card-features-metrobank-app","items":[{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhere can I find my credit card, prepaid, and YAZZ prepaid card account details on the Metrobank App?\u003c/p\u003e","answer":"On the dashboard, tap Menu then select My Accounts. You may also customize your dashboard so that it shows your credit and prepaid cards."},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhere can I find my spouse\u0026rsquo;s credit card account details on the Metrobank App?\u003c/p\u003e","answer":"If you are the primary cardholder, you may view your spouse’s credit card accounts under My Accounts (supplementary account).\n\nThis is not available if you are not the primary cardholder."},{"__typename":"FaqItemV2Record","question":"How do I send money using your credit card (PayNow)?","answer":"\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eWhat is PayNow?\u003c/b\u003e\u003c/summary\u003e\n\n→ PayNow is a credit card feature that provides electronic fund transfer and payment solution services from an active credit card to select or nominated individual bank accounts.\n\u003c/details\u003e\n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eHow can I send money using PayNow?\u003c/b\u003e\u003c/summary\u003e\n\n→ You may watch the video on how to send money via PayNow at https://www.metrobank.com.ph/articles/mb-app-how-to\n\u003c/details\u003e\n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eWho are qualified to avail of PayNow?\u003c/b\u003e\u003c/summary\u003e\n\n→ Anyone who is currently a principal or supplementary Metrobank credit cardholder in good standing can avail of PayNow.\n\u003c/details\u003e\n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eHow much is the minimum PayNow transaction amount you can avail?\u003c/b\u003e\u003c/summary\u003e\n\n→ There is no minimum amount. However, PayNow money transfers are subject to a total maximum daily limit of PHP 50,000 per credit card account, and a maximum of PHP 100,000 within a period of 15 calendar days.\n\u003c/details\u003e\n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eIs there a PayNow processing fee?\u003c/b\u003e\u003c/summary\u003e\n\n→ A processing fee of up to 1.5% of the transacted amount, or PHP 25, whichever is higher, is charged upfront for every use of PayNow. \n\nThe amount sent using the PayNow service will be included in the next billing cycle. Like other billed transactions, it is subject to the usual credit card charges.\n\u003c/details\u003e"},{"__typename":"FaqItemV2Record","question":"How to avail of Cash2Go?","answer":"\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eWhat is Cash2Go?\u003c/b\u003e\u003c/summary\u003e\n\n→ Cash2Go is a credit card installment feature which allows you to convert available credit limit in your Metrobank credit card to cash you pay back in installments of three to 60 months.\n\u003c/details\u003e\n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eHow can I avail of Cash2Go?\u003c/b\u003e\u003c/summary\u003e\n\n→ You may watch the video on how to avail of Cash2Go at https://www.metrobank.com.ph/articles/mb-app-how-to\n\u003c/details\u003e\n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eWho are qualified to avail of Cash2Go?\u003c/b\u003e\u003c/summary\u003e\n\n→ Anyone who is currently a principal or supplementary Metrobank credit cardholder for at least 3 months can avail of Cash2Go.\n\u003c/details\u003e\n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eHow much is the minimum Cash2Go transaction amount you can avail?\u003c/b\u003e\u003c/summary\u003e\n\n→ The minimum transaction amount is PHP 6,000.00.\n\u003c/details\u003e\n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eIs there a Cash2Go processing fee?\u003c/b\u003e\u003c/summary\u003e\n\n→ Yes. You are charged PHP 350 fee for every approved Cash2Go application. \n\nA PHP 100 transaction fee is charged for proceeds deposited to a non-Metrobank deposit account or for checks delivered to the billing address.\n\nIn case you make advance payments, with or without advice, you are charged a pre-termination fee of PHP 550 or 5% of the remaining principal balance, whichever is higher. Any remaining balance (i.e. remaining principal amount based on diminishing balance computation and/or penalties, interest and other charges) is billed in the next statement cycle together with the applicable interest charge. Unbilled interest for accelerated amortizations will no longer be collected.\n\u003c/details\u003e\n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eIf my Cash2Go application is approved, how fast can I receive the proceeds and where it will be credited?\u003c/b\u003e\u003c/summary\u003e\n\n→ For approved Cash2Go applications, proceeds are released to the cardholder’s Metrobank deposit account in five banking days from the date of approval. \n\nCash2Go cannot be used for with corporate, time deposit, cash deposit, and dollar accounts. \n\nProceeds released through the issuance of a Manager’s check or deposited to a non-Metrobank account are payable only to the name of the principal / supplementary cardholder availing of the Cash2Go Installment Plan. Funds are released within seven  to 10 banking days from the date of approval.\n\u003c/details\u003e"},{"__typename":"FaqItemV2Record","question":"How to avail of Balance Transfer?","answer":"\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eWhat is Balance Transfer?\u003c/b\u003e\u003c/summary\u003e\n\n→ Balance Transfer is a special credit card installment feature where you can transfer your other credit card balances to your Metrobank credit card and pay in installments of six to 60 months.\n\u003c/details\u003e\n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eHow can I avail of Balance Transfer?\u003c/b\u003e\u003c/summary\u003e\n\n→ You may watch the video on how to avail of Balance Transfer at https://www.metrobank.com.ph/articles/mb-app-how-to\n\u003c/details\u003e\n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eWho are qualified to avail of Balance Transfer?\u003c/b\u003e\u003c/summary\u003e\n\n→ You must be the principal cardholder of the non-Metrobank credit card to transfer balance to your Metrobank credit card.\n\nBalance Transfer payments can only be done using credit card accounts that are under the name of the applicant.\n\nIn the event of an erroneous payment, a payment is made to an account found to belong to a different person, and the account number or other account identification supplied by the applicant is incorrect, erroneous, or does not belong to said applicant, Metrobank will hold the applicant liable for the amount paid unless the beneficiary returns the payment in full to Metrobank. \n\nAll applications for Balance Transfer are subject to verification and credit approval by Metrobank.\n\u003c/details\u003e\n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eHow much is the minimum Balance Transfer transaction amount you can avail?\u003c/b\u003e\u003c/summary\u003e\n\n→ The minimum transaction amount is PHP 6,000 and the applied amount must not exceed the principal cardholder’s available credit limit. If the Balance Transfer applicant is an extension cardholder, the amount must not also exceed his or her available monthly spending limit.\n\u003c/details\u003e\n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eIs there a Balance Transfer processing fee?\u003c/b\u003e\u003c/summary\u003e\n\n→ Yes. You are charged PHP 350 fee for every approved Balance Transfer application. \n\nIn case you make advance payments, with or without advice, you are charged a pre-termination fee of PHP 550 or 5% of the remaining principal balance, whichever is higher. Any remaining balance (i.e. remaining principal amount based on Diminishing Balance computation and/or penalties, interest and other charges) shall be billed in the next statement cycle together with the applicable interest charge. Unbilled interest for accelerated amortizations are forgone or will no longer be collected.\n\u003c/details\u003e\n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eIf my Balance Transfer application is approved, how fast will the payment be posted to non-Metrobank  credit card/s?\u003c/b\u003e\u003c/summary\u003e\n\n→ Payment is made to non-Metrobank credit card companies in eight business days from date of approval.\n\u003c/details\u003e"},{"__typename":"FaqItemV2Record","question":"How to avail of Balance Conversion?","answer":"\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eWhat is Balance Conversion?\u003c/b\u003e\u003c/summary\u003e\n\n→ Balance Conversion is a special installment product where you can convert your Metrobank credit card’s outstanding balance to installments from three to 60 months.\n\u003c/details\u003e\n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eHow can I avail of Balance Conversion?\u003c/b\u003e\u003c/summary\u003e\n\n→ You may watch the video on how to avail of Balance Conversion at https://www.metrobank.com.ph/articles/mb-app-how-to\n\u003c/details\u003e\n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eWho are qualified to avail Balance Conversion?\u003c/b\u003e\u003c/summary\u003e\n\n→ Anyone who is a principal cardholder of a Metrobank credit card for at least six months, and in good credit standing may apply to convert their current Metrobank credit card outstanding balances, inclusive of finance charge and other fees and charges.\n\nThe Balance Conversion application is subject to verification and credit approval by Metrobank.\n\u003c/details\u003e\n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eHow much is the minimum Balance Conversion transaction amount you can avail?\u003c/b\u003e\u003c/summary\u003e\n\n→ The minimum transaction amount is PHP 6,000.\n\u003c/details\u003e\n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eIs there a Balance Conversion processing fee?\u003c/b\u003e\u003c/summary\u003e\n\n→ Yes. You are charged PHP 500 fee for every approved Balance Conversion application.\n\nIn case you choose to make advance payments, with or without advice, you are charged a pre-termination fee of PHP 550 or 5% of the remaining principal balance, whichever is higher. Any remaining balance (i.e. remaining principal amount based on Diminishing Balance computation and/or penalties, interest and other charges) will be billed in the next statement cycle together with the applicable interest charge. Unbilled interest for accelerated amortizations are forgone or will no longer be collected.\n\u003c/details\u003e\n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eIf my Balance Conversion application is approved, how fast is the processing time?\u003c/b\u003e\u003c/summary\u003e\n\n→ The application takes three to five business days from the date of approval.\n\nWhen Metrobank approves a Balance Conversion application, the conversion cannot be cancelled.\n\u003c/details\u003e"}]},{"__typename":"FaqTopicRecord","name":"PayNow","displayName":"PayNow","slug":"/paynow","items":[{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhat is PayNow?\u003c/p\u003e","answer":"\u003cp\u003ePayNow is a Metrobank credit card feature that lets you send money to any local bank account or e-wallet using your credit card as the source.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhat can I use PayNow for?\u003c/p\u003e","answer":"\u003cp\u003eYou can use PayNow to transfer to any bank or e-wallet, and even pay using QR codes at merchants that accept bank or e-wallet payments.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eHow can I send money using PayNow?\u003c/p\u003e","answer":"\u003col\u003e\n\u003cli\u003eDownload the Metrobank app and enroll your credit card.\u0026nbsp;\u003c/li\u003e\n\u003cli\u003eTap \"Send Money\" and select your credit card as the source.\u0026nbsp;\u003c/li\u003e\n\u003cli\u003eInput the account no. and complete the transaction.\u003c/li\u003e\n\u003c/ol\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eIs there a processing fee?\u003c/p\u003e","answer":"\u003cp\u003eYes. A processing fee of PHP 25.00 or 1.5% of the transaction amount (whichever is higher) is charged upfront for every PayNow transaction.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhen will my payee receive the money?\u003c/p\u003e","answer":"\u003cp\u003eTransfers are sent in real time though posting speed may vary depending on the receiving bank or e-wallet. You\u0026rsquo;ll also get an SMS confirmation once your PayNow transaction is successful.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eIs there a limit to how much I can send via PayNow?\u003c/p\u003e","answer":"\u003cp\u003eYes. You can send up to PHP 50,000 per day and up to PHP 250,000 per calendar month.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eDo I need to apply to use PayNow?\u003c/p\u003e","answer":"\u003cp\u003eNo need. As long as you have the Metrobank App and an enrolled Metrobank credit card, you can start using PayNow.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eCan I schedule PayNow transactions?\u003c/p\u003e","answer":"\u003cp\u003eYes. When sending money, choose \u0026ldquo;Schedule\u0026rdquo;, tick \u0026ldquo;Later\u0026rdquo;, and set your preferred date and time.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eCan I set a recurring PayNow transaction?\u003c/p\u003e","answer":"\u003cp\u003eYes. Follow the steps for scheduling a transaction, then under \u0026ldquo;Occurrence\u0026rdquo;, select \u0026ldquo;Repeating\u0026rdquo; and set your frequency and start/end dates.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhat should I do if the PayNow transaction fails?\u003c/p\u003e","answer":"\u003cp\u003ePlease check if you have a stable internet connection, if you have available credit limit and PayNow limit, and if the payee details are correct. If the transaction still fails, you may contact our customer service at (02)88-700-700.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhy was my PayNow transaction rejected?\u003c/p\u003e","answer":"\u003cp\u003e\u003cspan\u003eMost rejected transfers happen due to invalid or inactive payee details. Double-check the information and try again. A PHP 3.00 rejection fee will be charged for every rejected PayNow transaction.\u003c/span\u003e\u003c/p\u003e"}]},{"__typename":"FaqTopicRecord","name":"Scheduled Transactions - Metrobank App","displayName":"Scheduled Transactions","slug":"/scheduled-transactions-metrobank-app","items":[{"__typename":"FaqItemV2Record","question":"What are scheduled transactions and how can they benefit a customer?","answer":"Scheduled transactions can be executed automatically on a given date. This guarantees timely processing of payments and minimizes payment delays.\n"},{"__typename":"FaqItemV2Record","question":"How to schedule a transaction?","answer":"Go to ‘Pay Bills'. Select the transaction you want to schedule, input details and on the schedule field choose \"Later\" tab and select frequency (daily, weekly, monthly and quarterly) and the desired date of a transaction. Scheduling can also be done for one-time scheduled transactions. \n\n\n* Standard time of processing starts at 8:30am up to 9:30am. \n* Transactions that can be scheduled are as follows: Send Money, Pay Bills \u0026 Send Load (for MBO only).\n"},{"__typename":"FaqItemV2Record","question":"Where can I see scheduled transactions?","answer":"Scheduled transactions are listed under “Pending Transactions” for Metrobank Online, sorted based on your latest transactions."},{"__typename":"FaqItemV2Record","question":"How can I cancel my scheduled transactions?","answer":"To cancel scheduled transactions:\nGo to “Pending Transactions” for Metrobank Online in the Dashboard\n* Select a scheduled transaction\n* Click “Cancel Pending Transaction” and choose “Yes”\n* Enter passcode / AppKey"},{"__typename":"FaqItemV2Record","question":"Can I edit the details of scheduled transactions?","answer":"No. Please cancel the scheduled transaction and create a new one.\n"},{"__typename":"FaqItemV2Record","question":"How would I know if my scheduled transactions pushed through? ","answer":"On the day of your schedule, you will receive notifications on the status of your scheduled transactions.\n"},{"__typename":"FaqItemV2Record","question":"In case of unscheduled system downtime/maintenance, will my scheduled transaction still push through?","answer":"No. You will receive a failed notification. "}]},{"__typename":"FaqTopicRecord","name":"eSOA - Metrobank App","displayName":"eSOA","slug":"/esoa-metrobank-app","items":[{"__typename":"FaqItemV2Record","question":"Can I download my Statement of Account (eSOA) through the Metrobank App?","answer":"\u003cp\u003eTransactions for the past 90 days can now be downloaded through the Metrobank App. Simply follow these steps to download your eSOA: 1. On your dashboard, select the deposit account for which you want to download the statement.\u003c/p\u003e\n\u003cdiv class=\"mbd-row\"\u003e\n\u003cdiv class=\"mbd-column\"\u003e\u003cimg src=\"https://web-assets.metrobank.com.ph/1726824444-mboa-casa-esoa-download-step-01.jpg\" /\u003e\u003c/div\u003e\n\u003c/div\u003e\n\u003cp\u003e2. Under the Transaction History, click \u0026ldquo;Download Statement.\u0026rdquo;\u003c/p\u003e\n\u003cdiv class=\"mbd-row\"\u003e\n\u003cdiv class=\"mbd-column\"\u003e\u003cimg src=\"https://web-assets.metrobank.com.ph/1726824519-mboa-casa-esoa-download-step-02.jpg\" /\u003e\u003c/div\u003e\n\u003c/div\u003e\n\u003cp\u003e3. You can customize your statement of account by choosing the date range, type of transaction, and/or amount range\u003c/p\u003e\n\u003cdiv class=\"mbd-row\"\u003e\n\u003cdiv class=\"mbd-column\"\u003e\u003cimg src=\"https://web-assets.metrobank.com.ph/1726824519-mboa-casa-esoa-download-step-03.jpg\" /\u003e\u003c/div\u003e\n\u003c/div\u003e\n\u003cp\u003e4. Choose a file type: PDF or XLSX.\u003c/p\u003e\n\u003cdiv class=\"mbd-row\"\u003e\n\u003cdiv class=\"mbd-column\"\u003e\u003cimg src=\"https://web-assets.metrobank.com.ph/1726824519-mboa-casa-esoa-download-step-04.jpg\" /\u003e\u003c/div\u003e\n\u003c/div\u003e\n\u003cp\u003e5. Your eSOA will be downloaded.\u003c/p\u003e\n\u003cdiv class=\"mbd-row\"\u003e\n\u003cdiv class=\"mbd-column\"\u003e\u003cimg src=\"https://web-assets.metrobank.com.ph/1726824520-mboa-casa-esoa-download-step-05.jpg\" /\u003e\u003c/div\u003e\n\u003c/div\u003e\n\u003cp\u003eThe file is password-protected. You can open your eSOA by entering your password in this format: your last name in lowercase letters combined with the last four digits of your account (e.g. manipol6933). Refer to the sample \u003ca href=\"https://web-assets.metrobank.com.ph/1726825403-1725351251-sample_esoa08302024_155437.pdf\"\u003eeSOA\u003c/a\u003e for reference. You can use the sample password above to view the file.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"For which type of account can I download my eSOA?","answer":"You can download eSOA for your savings and checking account."},{"__typename":"FaqItemV2Record","question":"What type of transactions can I see in the eSOA?","answer":"Transactions made across all platforms (Metrobank Online, Metrobank App, Over-the-Counter, ATMs, CAMs, e-Commerce, POS) will show in the eSOA since it gets information from the deposit system."},{"__typename":"FaqItemV2Record","question":"What is the date reflected on the eSOA?","answer":"The eSOA shows the date when the transaction was made. However, descriptive transaction details will reflect on the following day. "},{"__typename":"FaqItemV2Record","question":"I would like to download my eSOA, but no transaction history is shown on the Metrobank App. What should I do?","answer":"\nOnly transactions from the past 90 days are available on the Metrobank App. If you have made transactions within this period but cannot find them, please check if the date range, type of transaction, and amount range are filtered properly.\n\nIf you still cannot find your previous transactions, refresh your app or kindly contact our Contact Center hotline at (02) 88-700-700 or Domestic toll-free number: 1-800-1888-5775\n\nIf you would like to view or get a copy of your SOA with transactions older than 90 days, please contact or visit your branch of account to request.\n"},{"__typename":"FaqItemV2Record","question":"Can I also download my credit card eSOA?","answer":"We are continuously enhancing the app to make this feature available soon. Stay tuned!"}]},{"__typename":"FaqTopicRecord","name":"Auto Debit Arrangement (e-ADA) - Metrobank App","displayName":"Auto Debit Arrangement (e-ADA)","slug":"/auto-debit-arrangement-e-ada-metrobank-app","items":[{"__typename":"FaqItemV2Record","question":"Auto Debit Arrangement (E-ADA) in Metrobank App","answer":"The electronic automatic debit arrangement or e-ADA is a feature that allows your monthly or recurring payments to be automatically deducted from your nominated Metrobank Savings or Checking account. "},{"__typename":"FaqItemV2Record","question":"How to request Auto Debit Arrangement (e-ADA) in Metrobank App?","answer":"\u003cstyle\u003e\n* {\n  box-sizing: border-box;\n}\n\n/* Create two equal columns that floats next to each other */\n.mbd-column {\n  float: left;\n  width: 30%;\n}\n\n/* Clear floats after the columns */\n.mbd-row:after {\n  content: \"\";\n  display: table;\n  clear: both;\n}\n\n/* Responsive layout - makes the two columns stack on top of each other instead of next to each other */\n@media screen and (max-width: 600px) {\n  .mbd-column {\n    width: 100%;\n  }\n}\n\u003c/style\u003e\n1. Log in to the Metrobank App and Select 'Enroll Auto Debit'.\n\u003cdiv class=\"mbd-row\"\u003e\n\u003cdiv class=\"mbd-column\"\u003e\n\u003cimg src=\"https://web-assets.metrobank.com.ph/1741587324-3-1-log-in-to-the-metrobank-app-and-select-enroll-auto-debit.png\"\u003e\n\u003c/div\u003e \t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\u003c/div\u003e\n\u003c/br\u003e\n\n2. Review the Authorization to Debit Account page, then tap 'Accept'\n\u003cdiv class=\"mbd-row\"\u003e\n\u003cdiv class=\"mbd-column\"\u003e\n\u003cimg src=\"https://web-assets.metrobank.com.ph/1741587324-3-2-review-the-authorization-to-debit-account-page-then-tap-accept.png\"\u003e\n\u003c/div\u003e \t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\u003c/div\u003e\n\u003c/br\u003e\n\n3. Enter the required details then tap “Next”, Tap “Confirm” once details are confirmed correct.\n\n\u003cdiv class=\"mbd-row\"\u003e\n\u003cdiv class=\"mbd-column\"\u003e\n\u003cimg src=\"https://web-assets.metrobank.com.ph/1741587323-3-3-enter-the-required-details-then-tap-next-tap-confirm-once-details-are-confirmed-correct.png\"\u003e\n\u003c/div\u003e \t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\u003c/div\u003e\n\u003c/br\u003e\n\n\u003cdiv class=\"mbd-row\"\u003e\n\u003cdiv class=\"mbd-column\"\u003e\n\u003cimg src=\"https://web-assets.metrobank.com.ph/1741587323-3-3-enter-the-required-details-then-tap-next-tap-confirm-once-details-are-confirmed-correct-2.png\"\u003e\n\u003c/div\u003e \t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\u003c/div\u003e\n\u003c/br\u003e\n\n4. Authenticate Using AppKey.\n\u003cdiv class=\"mbd-row\"\u003e\n\u003cdiv class=\"mbd-column\"\u003e\n\u003cimg src=\"https://web-assets.metrobank.com.ph/1741587324-3-4-authenticate-using-appkey.png\"\u003e\n\u003c/div\u003e \t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\u003c/div\u003e\n\u003c/br\u003e\n\n5. That’s it! Your eADA request is successfully submitted.\n\u003cdiv class=\"mbd-row\"\u003e\n\u003cdiv class=\"mbd-column\"\u003e\n\u003cimg src=\"https://web-assets.metrobank.com.ph/1741587324-3-5-that-s-it-your-eada-request-is-successfully-submitted.png\"\u003e\n\u003c/div\u003e \t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\u003c/div\u003e\n\u003c/br\u003e"},{"__typename":"FaqItemV2Record","question":"I filed a request to set up e-ADA for a biller, when will it be enrolled?","answer":"All enrollment requests submitted before 11 PM will be processed on the next banking day."},{"__typename":"FaqItemV2Record","question":"What type of account can I use as source","answer":"You can only nominate an active savings or checking account as your source. "},{"__typename":"FaqItemV2Record","question":"What billers can I request for e-ADA?","answer":"You may click this link for the [list of billers](https://web-assets.metrobank.com.ph/1711528446-1711076899-metrobank-online_eada_billers_03222024.pdf) available for e-ADA."},{"__typename":"FaqItemV2Record","question":"Will I receive a notification upon successful enrollment?","answer":"Yes, you will receive an email/SMS notification of your e-ADA enrollment."},{"__typename":"FaqItemV2Record","question":"Will I receive a notification of my successful payment/auto-debit?","answer":"Will I receive a notification of my successful payment/auto-debit?"},{"__typename":"FaqItemV2Record","question":"Can I still cancel my e-ADA enrollment request?","answer":"Yes, but only if the request is still pending. You may go to your branch of account in case there’s a need to discontinue the enrolled e-ADA. "},{"__typename":"FaqItemV2Record","question":"Can I discontinue my e-ADA?","answer":"Yes. Please go to your branch of account and kindly accomplish Customer Disenrollment form to discontinue your e-ADA. \n\nDon’t worry, we are working on making this cancellation facility available online. "}]},{"__typename":"FaqTopicRecord","name":"Credit Card Lock/Unlock","displayName":"Credit Card Lock/Unlock","slug":"/credit-card-lock-unlock","items":[{"__typename":"FaqItemV2Record","question":"How do I temporarily lock my Metrobank Credit Card using the Metrobank App?","answer":"\u003cstyle\u003e\n* {\n  box-sizing: border-box;\n}\n\n/* Create two equal columns that floats next to each other */\n.mbd-column {\n  float: left;\n  width: 30%;\n}\n\n/* Clear floats after the columns */\n.mbd-row:after {\n  content: \"\";\n  display: table;\n  clear: both;\n}\n\n/* Responsive layout - makes the two columns stack on top of each other instead of next to each other */\n@media screen and (max-width: 600px) {\n  .mbd-column {\n    width: 100%;\n  }\n}\n\u003c/style\u003e\n1.\tLog in to the Metrobank App.\n2.\tSelect the credit card you wish to lock.\n\n\u003cdiv class=\"mbd-row\"\u003e\n\u003cdiv class=\"mbd-column\"\u003e\n\u003cimg src=\"https://web-assets.metrobank.com.ph/1741766042-10-1-4a-primary-edited.png\"\u003e\n\u003c/div\u003e \t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\u003c/div\u003e\n\u003c/br\u003e\n\n3.\tOn the credit card overview, toggle the “Unlocked” button.\n\n\u003cdiv class=\"mbd-row\"\u003e\n\u003cdiv class=\"mbd-column\"\u003e\n\u003cimg src=\"https://web-assets.metrobank.com.ph/1741766008-10-1-3b-reminder-card-is-locked.png\"\u003e\n\u003c/div\u003e \t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\u003c/div\u003e\n\u003c/br\u003e\n\n4.\tTap “Yes, lock card now” to proceed.\n\n\u003cdiv class=\"mbd-row\"\u003e\n\u003cdiv class=\"mbd-column\"\u003e\n\u003cimg src=\"https://web-assets.metrobank.com.ph/1741768717-10-1-2-c-success-edited-2.png\"\u003e\n\u003c/div\u003e \t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\u003c/div\u003e\n\u003c/br\u003e\n\nThat’s it! Your credit card is now temporarily locked. You will receive SMS and email notifications confirming that your credit card has been successfully locked. "},{"__typename":"FaqItemV2Record","question":"What happens if I temporarily lock my Metrobank Credit Card? ","answer":"When your credit card is locked, all subsequent transactions will be automatically rejected or cancelled, including but not limited to: \n\n* Retail transactions (in-store or online/e-commerce, local or international) \n* Processing of new application for credit card instalments such as Cash2Go, Balance Transfer, Balance Conversion made via the Metrobank App or Customer Service \n* Processing of one-time or recurring transactions such as: \n\t* Bill payments made directly via the biller (e.g. insurance, utilities, telco)  \n\t* Subscriptions (e.g. Netflix, Microsoft OneDrive, Spotify, gym membership) \n* Immediate or scheduled Pay Bills (See list of billers [here](/articles/bills))  \n* Immediate or scheduled Send Money via PayNow using the Metrobank App or MIA Chatbot \n* Rewards Redemption \n* Processing of credit card conversion \n* Processing of credit adjustments from merchants \n\n You will be notified of declined transactions due to locked status of your credit card. \n \nThe following transactions will still push through: \n\n* Bills2Pay (See list of billers [here](/help#FAQ-Metrobank_Credit_Card_BillsPay-What_billers_are_available_for_enrollment))  \n* Crediting of payment/s made to the locked credit card using the Metrobank App or other payment channels  \n* Charging of credit card fees such as Annual Fee, Finance Charges, Late Charges \n\n* Posting of merchant instalments  \n* Posting of Cash2Go/Balance Transfer/Balance Conversion amortizations  \n* Posting of pre-orders/reservations (e.g. book now, pay later) transacted before the credit card was locked \n* Reporting of lost credit card or requesting for permanent blocking via the Metrobank App or Customer Service "},{"__typename":"FaqItemV2Record","question":"What is the benefit of temporarily locking my credit card?","answer":"Temporarily locking your credit card offers peace of mind as it prevents unauthorized transactions from being charged to the account. It is advisable to keep your credit card locked when not in use or if you think you might have misplaced it. You may keep it locked for as long as you want."},{"__typename":"FaqItemV2Record","question":"Can I also temporarily lock my Metrobank ATM/Debit/Prepaid Card in the Metrobank App?","answer":"This feature is not yet available for ATM, Debit, or Prepaid Cards. We are working on making this available soon. Stay tuned!"},{"__typename":"FaqItemV2Record","question":"I cannot see the lock/unlock button. What should I do?","answer":"If you cannot see the lock/unlock button, check if your Metrobank App is updated to the latest version. If not, kindly update the app and try again. If the issue persists, you can try the following troubleshooting steps:\n\n* Ensure you have a stable internet connection. \n*\tSwipe or pull down to refresh the page.\n*\tClose or quit the app and reopen it.\n*\tFor iPhone users: Go to Settings and enable “Background App Refresh” for the Metrobank App.  \n\nFor Android users, try to clear your app cache:\n\n1. Log out from the Metrobank App.  \n2. Go to your device’s Settings.  \n3. Tap “Applications” and select “Metrobank App.”  \n4. Tap “Storage.”  \n5. Tap “Clear Cache.”  \n6. Log in again on the app.  \n\n* Uninstall and reinstall the app.\n"},{"__typename":"FaqItemV2Record","question":"I locked my card in the Metrobank App, but I received an SMS or email notification about a transaction. What should I do?","answer":"Check the transaction if it is any of the following:\n* Bills2Pay\n* Crediting of payments made to the locked credit card using the Metrobank App or other payment channels\n* Charging of credit card fees such as Annual Fee, Finance Charges, Late Charges\n* Posting of merchant installments\n* Posting of Cash2Go/Balance Transfer/Balance Conversion amortizations\n* Posting of pre-orders/reservations (e.g. book now, pay later) transacted before the credit card was locked\n* Reporting of lost credit card or requesting permanent blocking via the Metrobank App or Customer Service\n\nThese transactions will still continue even if your card is temporarily locked.\n\nIf you believe your credit card is compromised, report it immediately:\n* Call (02) 88-700-700 or domestic toll-free 1-800 1888 5775\n* Email customerservice@metrobankcard.com and use \"Report on Possible Fraud\" as the subject line."},{"__typename":"FaqItemV2Record","question":"How do I unlock my Metrobank Credit Card?","answer":"\u003cstyle\u003e\n* {\n  box-sizing: border-box;\n}\n\n/* Create two equal columns that floats next to each other */\n.mbd-column {\n  float: left;\n  width: 30%;\n}\n\n/* Clear floats after the columns */\n.mbd-row:after {\n  content: \"\";\n  display: table;\n  clear: both;\n}\n\n/* Responsive layout - makes the two columns stack on top of each other instead of next to each other */\n@media screen and (max-width: 600px) {\n  .mbd-column {\n    width: 100%;\n  }\n}\n\u003c/style\u003e\nTo unlock your Metrobank Credit Card:\n\n1.\tLog in to the Metrobank App.\n\n2.\tSelect the credit card you wish to unlock \n\t\n\u003cdiv class=\"mbd-row\"\u003e\n\u003cdiv class=\"mbd-column\"\u003e\n\u003cimg src=\"https://web-assets.metrobank.com.ph/1741766249-10-1-3a-cc-locked-edited.png\"\u003e\n\u003c/div\u003e
