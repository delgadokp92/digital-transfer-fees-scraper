content":"Digital Banking - Metrobank Online - Instapay \u0026 PesoNET","tag":"title"},{"__typename":"Tag","attributes":{"property":"og:title","content":"Digital Banking - Metrobank Online - Instapay \u0026 PesoNET"},"content":null,"tag":"meta"},{"__typename":"Tag","attributes":{"name":"twitter:title","content":"Digital Banking - Metrobank Online - Instapay \u0026 PesoNET"},"content":null,"tag":"meta"},{"__typename":"Tag","attributes":{"name":"description","content":"Metrobank gives meaning to your financial journey with these broad range of products and services. Start your journey to meaningful banking now."},"content":null,"tag":"meta"},{"__typename":"Tag","attributes":{"property":"og:description","content":"Metrobank gives meaning to your financial journey with these broad range of products and services. Start your journey to meaningful banking now."},"content":null,"tag":"meta"},{"__typename":"Tag","attributes":{"name":"twitter:description","content":"Metrobank gives meaning to your financial journey with these broad range of products and services. Start your journey to meaningful banking now."},"content":null,"tag":"meta"},{"__typename":"Tag","attributes":{"property":"og:image","content":"https://web-assets.metrobank.com.ph/1758206631-transporter-banner.jpg?auto=format\u0026fit=max\u0026w=1200"},"content":null,"tag":"meta"},{"__typename":"Tag","attributes":{"property":"og:image:width","content":"1200"},"content":null,"tag":"meta"},{"__typename":"Tag","attributes":{"property":"og:image:height","content":"800"},"content":null,"tag":"meta"},{"__typename":"Tag","attributes":{"name":"twitter:image","content":"https://web-assets.metrobank.com.ph/1758206631-transporter-banner.jpg?auto=format\u0026fit=max\u0026w=1200"},"content":null,"tag":"meta"},{"__typename":"Tag","attributes":{"property":"og:locale","content":"en"},"content":null,"tag":"meta"},{"__typename":"Tag","attributes":{"property":"og:type","content":"article"},"content":null,"tag":"meta"},{"__typename":"Tag","attributes":{"property":"og:site_name","content":"https://metrobank.com.ph"},"content":null,"tag":"meta"},{"__typename":"Tag","attributes":{"property":"article:modified_time","content":"2026-02-03T16:43:25Z"},"content":null,"tag":"meta"},{"__typename":"Tag","attributes":{"property":"article:publisher","content":""},"content":null,"tag":"meta"},{"__typename":"Tag","attributes":{"name":"twitter:card","content":"summary_large_image"},"content":null,"tag":"meta"}],"seoSiteKeywords":"","seo":null,"title":"Help \u0026 Support","pageName":"Digital Banking - Metrobank Online - Instapay \u0026 PesoNET","backgroundImageColor":"linear-gradient(171.84deg, #003FEC 0%, #01068F 45.6%)","bannerImage":{"__typename":"FileField","url":"https://web-assets.metrobank.com.ph/1758206631-transporter-banner.jpg","focalPoint":{"__typename":"focalPoint","x":0.5,"y":0.5}},"searchItems":[{"__typename":"QuicklinkV2Record","quicklinkV2Text":"Open an account","quicklinkV2Url":"/promos","external":false,"buttonDataName":""},{"__typename":"QuicklinkV2Record","quicklinkV2Text":"ATM","quicklinkV2Url":"https://www.facebook.com/metrobank/","external":true,"buttonDataName":""},{"__typename":"QuicklinkV2Record","quicklinkV2Text":"Debit Cards","quicklinkV2Url":"/home","external":false,"buttonDataName":""},{"__typename":"QuicklinkV2Record","quicklinkV2Text":"Loan","quicklinkV2Url":"/espresso","external":false,"buttonDataName":""},{"__typename":"QuicklinkV2Record","quicklinkV2Text":"Metrobank Online","quicklinkV2Url":"/espresso","external":false,"buttonDataName":""},{"__typename":"QuicklinkV2Record","quicklinkV2Text":"Investment","quicklinkV2Url":"/promos","external":false,"buttonDataName":""}],"filters":[{"__typename":"SearchFiltersV2Record","label":"All Results","value":""},{"__typename":"SearchFiltersV2Record","label":"Articles ","value":"articles"},{"__typename":"SearchFiltersV2Record","label":"Documents","value":"documents"},{"__typename":"SearchFiltersV2Record","label":"Promos","value":"promos"},{"__typename":"SearchFiltersV2Record","label":"Pages","value":"pages"},{"__typename":"SearchFiltersV2Record","label":"FAQs","value":"faqs"}],"pageContent":[{"__typename":"HelpCategorySectionRecord","id":"SfmmpykZScyk8Mq6nKqL1w","navigationLabel":"","category":{"__typename":"FaqCategoryRecord","name":"Digital Banking","subcategories":[{"__typename":"FaqSubcategoryRecord","name":"Metrobank Online","slug":"/metrobank-online","topics":[{"__typename":"FaqTopicRecord","name":"General Information - Metrobank Online","displayName":"General Information and Enrolment","slug":"/general-information-metrobank-online","items":[{"__typename":"FaqItemV2Record","question":"What is Metrobank Online?","answer":"It is Metrobank’s new internet banking service that features enhanced user experience and interface, allowing customers to do various banking transactions conveniently, 24/7."},{"__typename":"FaqItemV2Record","question":"How do I use Metrobank Online?","answer":"Here are some how-to videos for the different features of Metrobank Online: [https://metrobank.com.ph/mbo-how-to](https://metrobank.com.ph/articles/mbo-how-to)."},{"__typename":"FaqItemV2Record","question":"Who can enroll in Metrobank Online?","answer":"\u003cp\u003eMetrobank Online is available to individual Metrobank clients with:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eA peso or foreign currency deposit account.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eHowever, please note that if you have a joint \u0026ldquo;AND/OR\u0026rdquo; account and In-Trust-For (ITF) account, you may only use Metrobank Online to view your account balance and transaction history\u003c/p\u003e\n\u003cp\u003eReminder: You would need the following to enroll your account in Metrobank Online:\u003c/p\u003e\n\u003cp\u003e1. Your active mobile number (postpaid or prepaid) registered with us where we can send an SMS verification code\u003c/p\u003e\n\u003cp\u003e2. Your active e-mail address registered with us where we can send an e-mail verification code. Click \u003ca href=\"https://metrobank.com.ph/articles/mbo-signup\"\u003ehere\u003c/a\u003e to view the step-by-step guide on how to sign-up to Metrobank Online.\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eNote: Non-individual account types that were not mentioned above cannot be enrolled in Metrobank Online and the Metrobank App.\u003c/em\u003e\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"Will I be able to receive the verification code if I enroll to Metrobank Online while overseas?","answer":"Yes, as long as the Philippine-issued mobile number you have registered is activated for international roaming. This is needed for you to receive the verification code, one-time password, and other SMS notifications for secure banking transactions."},{"__typename":"FaqItemV2Record","question":"What are the new and current features available in Metrobank Online?","answer":"You can:\n* Send money to other local banks via InstaPay and PESONet\n* Buy prepaid load\n* Request cardless withdrawal \n* Schedule transactions \n* Scan and generate QR code for fund transfers\n* Manage your investments in unit investment trust funds (UITFs)\n* Make a time deposit placement\n* Manage your investment portfolio with Wealth Manager\n\nYou can continue enjoying existing functionalities like:\n* View account balance and transaction history\n* Bill payments\n* Move money to own and other Metrobank accounts\n* Order a checkbook\n* Download your Statement of Account (SOA)\n* Tax Payments\n\nMetrobank Online has also been designed to display better on browsers of smartphones, tablets, laptops, and other devices."},{"__typename":"FaqItemV2Record","question":"What browser is Metrobank Online compatible with?","answer":"Metrobank Online is best viewed in the latest browser versions of:\n* Safari\n* Mozilla Firefox\n* Google Chrome\n* Microsoft Edge\n* Samsung Internet"},{"__typename":"FaqItemV2Record","question":"How secure is it to do bank transactions via Metrobank Online?","answer":"*\tAll messages go through an encryption process to ensure security. \n*\tOnly one login session can be active at a time. \n*\tYour username and password secure access to your account. \n*\tEmail and SMS notifications on activities and transactions are sent to your registered email address and mobile number.  \n*\tAuthentication is done via: \n\t* Email and SMS verification codes sent to your registered email address and mobile number \n\t* A 6-digit Metrobank passcode required for every transaction \n\t* AppKey - Click [here](/help#FAQ-Metrobank_AppKey) to know more on how to authenticate using biometrics or passcode via Metrobank AppKey."},{"__typename":"FaqItemV2Record","question":"What is a Metrobank Passcode?","answer":"A Metrobank Passcode is a new security feature of Metrobank Online. You are required to nominate a 6-digit code upon first log-in.  You need to remember this passcode as it will be required to authenticate transactions in Metrobank Online. If you forgot your Metrobank Passcode, you can reset it by calling the Metrobank contact center at (02) 88-700-700."},{"__typename":"FaqItemV2Record","question":"Can I use an international number?","answer":"Yes as long as the mobile number is from these SMS-supported countries:\n\n\u003cdetails\u003e\n\u003csummary\u003eSee the list here:\u003c/summary\u003e\n\n* Afghanistan\n* Albania\n* Algeria\n* American Samoa\n* Andorra\n* Angola\n* Anguilla\n* Antigua and Barbuda\n* Argentina\n* Armenia\n* Aruba\n* Australia\n* Austria\n* Azerbaijan\n* Bahamas\n* Bahrain\n* Bangladesh\n* Barbados\n* Belarus\n* Belgium\n* Belize\n* Benin\n* Bermuda\n* Bhutan\n* Bolivia\n* Bosnia and Herzegovina\n* Botswana\n* Brazil\n* British Virgin Islands\n* Brunei\n* Bulgaria\n* Burkina Faso\n* Burundi\n* Cambodia\n* Cameroon\n* Canada\n* Cape Verde\n* Cayman Islands\n* Central African Republic\n* Chad\n* Chile\n* China\n* Colombia\n* Comoros\n* Cook Islands\n* Costa Rica\n* Croatia\n* Cuba\n* Cyprus\n* Czech Republic\n* Democratic Republic of the Congo\n* Denmark\n* Djibouti\n* Dominica\n* Dominican Republic\n* Dominican Republic\n* Dominican Republic\n* East Timor\n* Ecuador\n* Egypt\n* El Salvador\n* Equatorial Guinea\n* Estonia\n* Ethiopia\n* Falkland Islands\n* Faroe Islands\n* Fiji\n* Finland\n* France\n* French Polynesia\n* Gabon\n* Gambia\n* Georgia\n* Germany\n* Ghana\n* Gibraltar\n* Greece\n* Greenland\n* Grenada\n* Guam\n* Guatemala\n* Guernsey\n* Guinea\n* Guinea-Bissau\n* Guyana\n* Haiti\n* Honduras\n* Hong Kong\n* Hungary\n* Iceland\n* India\n* Indonesia\n* Iran\n* Iraq\n* Ireland\n* Isle of Man\n* Israel\n* Italy\n* Jamaica\n* Japan\n* Jersey\n* Jordan\n* Kazakhstan\n* Kenya\n* Kuwait\n* Kyrgyzstan\n* Laos\n* Latvia\n* Lebanon\n* Lesotho\n* Liberia\n* Libya\n* Liechtenstein\n* Lithuania\n* Luxembourg\n* Macau\n* Macedonia\n* Madagascar\n* Malawi\n* Malaysia\n* Maldives\n* Mali\n* Malta\n* Mauritania\n* Mauritius\n* Mexico\n* Moldova\n* Monaco\n* Mongolia\n* Montenegro\n* Montserrat\n* Morocco\n* Mozambique\n* Namibia\n* Nauru\n* Nepal\n* Netherlands\n* Netherlands Antilles\n* New Caledonia\n* New Zealand\n* Nicaragua\n* Niger\n* Nigeria\n* Northern Mariana Islands\n* Norway\n* Oman\n* Pakistan\n* Palau\n* Panama\n* Papua New Guinea\n* Paraguay\n* Peru\n* Poland\n* Portugal\n* Puerto Rico\n* Puerto Rico\n* Qatar\n* Republic of the Congo\n* Reunion\n* Romania\n* Russia\n* Rwanda\n* Saint Kitts and Nevis\n* Saint Lucia\n* Saint Vincent and the Grenadines\n* Samoa\n* San Marino\n* Sao Tome and Principe\n* Saudi Arabia\n* Senegal\n* Serbia\n* Seychelles\n* Sierra Leone\n* Singapore\n* Sint Maarten\n* Slovakia\n* Slovenia\n* Solomon Islands\n* Somalia\n* South Africa\n* South Korea\n* South Sudan\n* Spain\n* Sri Lanka\n* Sudan\n* Suriname\n* Swaziland\n* Sweden\n* Switzerland\n* Syria\n* Taiwan\n* Tajikistan\n* Tanzania\n* Thailand\n* Togo\n* Tonga\n* Trinidad and Tobago\n* Tunisia\n* Turkey\n* Turkmenistan\n* Turks and Caicos Islands\n* U.S. Virgin Islands\n* Uganda\n* Ukraine\n* United Arab Emirates\n* United Kingdom\n* United States\n* Uruguay\n* Uzbekistan\n* Vanuatu\n* Venezuela\n* Vietnam\n* Yemen\n* Zambia\n* Zimbabwe\n\n\u003c/details\u003e"},{"__typename":"FaqItemV2Record","question":"Can I use a different mobile number during enrollment?","answer":"No. When signing up to Metrobank Online, you should use the mobile number you registered with the bank. If you need to update your mobile number, visit any Metrobank branch or request for an update online [here](https://metrobank.com.ph/articles/update-your-info)."},{"__typename":"FaqItemV2Record","question":"How do I update my registered mobile number and/or email address?","answer":"Go to the Metrobank branch of your account to have your customer information updated.\n\nFor the requirements, please refer to https://www.metrobank.com.ph/articles/update-your-info "},{"__typename":"FaqItemV2Record","question":"I have an existing Metrobank Mobile app account, do I need to sign up to access Metrobank Online? ","answer":"No, there is no need to sign up. Just log in to Metrobank Online using your existing username and password. In your first log-in, an account verification process will have to be completed. All enrolled accounts (own and third party), load prepaid, billers, and scheduled transactions are auto-enrolled to your Metrobank Online account.  Scheduled transactions will be processed in Metrobank Online to avoid double debit. Make sure to check emails on how to upgrade are coming from us. It should always be from info.communications@metrobank.com.ph."},{"__typename":"FaqItemV2Record","question":"Can I still use my existing Metrobank Mobile App account when I have successfully set-up my Metrobank Online account?","answer":"Yes, transactions performed in the Metrobank Mobile App and Metrobank Online will run independently. Doing the same transaction on the Metrobank Mobile App and Metrobank Online will cause double debit."},{"__typename":"FaqItemV2Record","question":"Can I enroll third- party accounts? How?","answer":"1. Log in to https://onlinebanking.metrobank.com.ph\n2. Tap on “Contacts” in the menu\n3. Click plus icon to add account\n4. Select “Account” tab\n5. Enter contact name\n6. Select bank in the drop down menu\n7. Enter account details. Click on “Create”\n8. Enter Metrobank Passcode. Click on “Submit”\n\nAfter following these steps, your third partythird-party account will be enrolled as contact."},{"__typename":"FaqItemV2Record","question":"Can I delete enrolled Contacts?  How?","answer":"1. Log in to https://onlinebanking.metrobank.com.ph\n2. Tap on “Contacts” in the menu\n3. Select the contact that needs to be deleted\n4. Click “delete account” then click “Yes”\n5. Enter Metrobank Passcode. Click on “Submit”\n\nAfter following these steps, your contact will be deleted."},{"__typename":"FaqItemV2Record","question":"During migration it says “Something went wrong.”  What do I do?","answer":"Call our Contact Center Hotline at (632) 88-700-700 or Domestic toll-free number: 1-800-1888-5775 to enable account to upgrade to Metrobank Online."},{"__typename":"FaqItemV2Record","question":"I got a “You cannot enroll a third-party account as your own account” message.  What do I do?","answer":"Check if your registered mobile number is same as in your bank records.  If not, please visit your branch of account to have your mobile number updated.\n\nYou can also update your contact info via website by following the steps at https://metrobank.com.ph/articles/update-your-info."}]},{"__typename":"FaqTopicRecord","name":"Account Login \u0026 Security","displayName":"Account Login \u0026 Security","slug":"/account-login-security","items":[{"__typename":"FaqItemV2Record","question":"I have an existing Metrobank Mobile App account without any credit card or deposit account enrolled.  Can I log in to Metrobank Online?","answer":"No, Metrobank Online requires at least one (1) enrolled credit card or deposit account."},{"__typename":"FaqItemV2Record","question":"I did not receive the verification code.  What should I do?  Until when is it valid? ","answer":"Check if you entered the correct mobile number and email address.  If correct, click on “Send another one” to receive another verification code through SMS and/or email. Verification code is valid for five (5) minutes."},{"__typename":"FaqItemV2Record","question":"Can I still access Metrobank Online if I change my mobile number?","answer":"No. You will need the verification code sent to your registered mobile number to log-in. Please coordinate with your branch of account to have your mobile number updated. \n\nYou can also update your contact info via website by following the steps at https://metrobank.com.ph/articles/update-your-info."},{"__typename":"FaqItemV2Record","question":"What should I do if I forgot my username?","answer":"1. From the login page, click on \"Recover Access.\" \n2. Select the \"Username\" tab. \n3. Enter the email address or mobile number you registered during signup. \n4. Authenticate the transaction. \n\nYour username will be sent to your email address or mobile number.\n"},{"__typename":"FaqItemV2Record","question":"What should I do if I forgot my password?","answer":"1. From the login page, click on \"Recover Access.\" \n2. Select the \"Password\" tab. \n3. Enter the email address or mobile number you registered during signup. \n4. Authenticate the transaction. \n5. Enter the verification code sent to your registered mobile number or email address. \n6. Enter a new password and click \"Next.\" \n\nYour password has been updated."},{"__typename":"FaqItemV2Record","question":"Can I retrieve my Metrobank Mobile App username and password through Metrobank Online if I have never logged-in to Metrobank Online?","answer":"Yes, you may use the recover access through Metrobank Online."},{"__typename":"FaqItemV2Record","question":"What should I do if I forgot my Metrobank passcode?","answer":"Kindly call our Contact Center Hotline at (632) 88-700-700 or Domestic toll-free number: 1-800-1888-5775 for Metrobank passcode reset."},{"__typename":"FaqItemV2Record","question":"How do I change my password on Metrobank Online? ","answer":"To change your Metrobank password, follow these steps: \n\n1. Select \"Settings\" from the navigation bar on the left. \n2. Click \"Change Password.\" \n3. Enter your current password. \n4. Enter a new password. \n5. Click \"UPDATE.\" \n6. Enter your 6-digit Metrobank passcode. \n\nAfter following these steps, your Metrobank password will be updated. \n\nNote: You can only perform this activity if you have activated your AppKey device.\n"},{"__typename":"FaqItemV2Record","question":"What is card alias?","answer":"Card alias is any name that you give to your bank accounts to help you distinguish them from each other. You can edit your account's alias at any time."},{"__typename":"FaqItemV2Record","question":"How do I change my Metrobank passcode?","answer":"To change your Metrobank passcode, follow these steps: \n\n1. Select \"Settings\" from the navigation bar on the left. \n2. Click \"Change Passcode.\" \n3. Enter your current 6-digit Metrobank passcode. \n4. Enter a new Metrobank passcode. \n5. Click \"UPDATE.\" \n\nAfter following these steps, your Metrobank passcode will be updated. \n\nNote: You can only perform this activity if you have activated your AppKey device.\n"},{"__typename":"FaqItemV2Record","question":"Can I use the new password I nominated through Metrobank Online in the Metrobank Mobile App?","answer":"Yes. Nominated passwords are synced in the app and Metrobank Online."},{"__typename":"FaqItemV2Record","question":"I sometimes get a “server encountered an error” when  I access my account.  What does that mean?","answer":"Your device internet protocol (IP) could be blocked. Try to login again after changing your device IP.\n\n1. Through mobile phone, you can follow these steps:\n\n\t\ta. Set your phone to airplane mode\n\t\tb. Turn off airplane mode\n\t\tc. Reconnect to an internet connection\n\t\td. Log in to Metrobank Online\n\n\n\u0026nbsp;\n\n\n2. Through a Windows computer:\n\n\t\ta. Click “Start” then “Run”\n\t\tb. Type cmd, press “Enter”\n\t\td. Your current IP configuration will show\n\t\te. Type ipconfig /renew at the prompt window, press “Enter\"\n\t\tf. The server will assign a new IP address for your computer\n"},{"__typename":"FaqItemV2Record","question":"I cannot log-in, the error reads, “service is still unavailable…”","answer":"Call our Contact Center Hotline at (632) 88-700-700 or Domestic toll-free number: 1-800-1888-5775 to log-in to Metrobank Online."},{"__typename":"FaqItemV2Record","question":"Why did I receive a verification code when I logged in to Metrobank Online?","answer":"As part of the verification process, a code is sent  to your registered email address and mobile number on your initial log-in to Metrobank Online, or if you update the versions of the operating system  of your mobile phone or desktop browsers."},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eI cannot log-in, the error says, \u0026ldquo;Account disabled.\u0026rdquo; or \u0026ldquo;Account is Blocked\u0026rdquo;. What should I do?\u003c/p\u003e","answer":"\u003cp\u003eCall our Contact Center Hotline at (632) 88-700-700 or Domestic toll-free number: 1-800-1888-5775 to your enable account.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhat is the Block your account feature?\u003c/p\u003e","answer":"\u003cp\u003eThis allows you to temporarily block your login account from accessing the Metrobank Online/App in case of lost device or you think your online account is compromised. You can still transact offline e.g. via the Branch for savings accounts, or POS transactions for credit cards.\u003c/p\u003e\n\u003cp\u003e\u003cbr\u003eNo changes in the existing status of all enrolled accounts.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eHow do I block my Metrobank Online account?\u003c/p\u003e","answer":"\u003cp\u003eHere are few easy steps:\u0026nbsp;\u003c/p\u003e\n\u003cp\u003e1. Metrobank Online (https://onlinebanking.metrobank.com.ph/signin)\u003c/p\u003e\n\u003cp\u003e2. Click \u0026ldquo;Block your account\u0026rdquo; in Metrobank Online login page\u003c/p\u003e\n\u003cp\u003e3. Enter your username\u003c/p\u003e\n\u003cp\u003e4. Enter your SMS OTP for verification\u003c/p\u003e\n\u003cp\u003e5. Enter your passcode for verification\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhat will happen if I block my account?\u003c/p\u003e","answer":"\u003cp\u003eYou will no longer be able to log in to Metrobank Online/App, and the following actions will be performed:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eUnregister or unlink all registered devices\u0026nbsp;\u003c/li\u003e\n\u003cli\u003eLog out all active log in sessions\u0026nbsp;\u003c/li\u003e\n\u003cli\u003eDisable biometrics and AppKey\u003c/li\u003e\n\u003c/ul\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eCan I still receive funds deposited to my account or will my check payment be processed even if my Metrobank Online/App login account is blocked?\u003c/p\u003e","answer":"\u003cp\u003eBlocking of login account will not change or impact the status of your linked accounts. Eligibility is dependent on the current status of your account.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWill my scheduled transactions proceed even if my login account is blocked?\u003c/p\u003e","answer":"\u003cp\u003eYes, all scheduled transactions made in Metrobank Online/App before blocking the online account will be processed as planned.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eMy online transaction requires to login in Metrobank Online/App (e.g. Tax Payment, MB Pay, and among others) can I still proceed even if my login account is blocked?\u003c/p\u003e","answer":"\u003cp\u003eNo, all online transactions that will connect to Metrobank Online/App will not be processed.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eCan I unblock my Metrobank Online/App after using Block your account facility?\u003c/p\u003e","answer":"\u003cp\u003eYes, you may request to unblock by calling our Customer Hotline (02) 88-700-700, your accounts will be automatically unblocked within 24 hours after the request.\u003c/p\u003e"}]},{"__typename":"FaqTopicRecord","name":"Account Management","displayName":"Account Management","slug":"/account-management","items":[{"__typename":"FaqItemV2Record","question":"How do I view balances on Metrobank Online?","answer":"* Total deposits for enrolled peso and foreign accounts can be viewed through the dashboard\n* You can click on Total Deposits or go to Deposits menu to view balances per account\n* You can also go to Transaction History to view an account’s running balance"},{"__typename":"FaqItemV2Record","question":"How do I add deposit accounts and credit cards?","answer":"To add deposit accounts and credit cards, please follow the step-by-step guide available in the video below: \n\n[Watch the guide here.](https://youtu.be/NUK1-XJ_YNQ?si=EvxdTONSKj-fJwpx)"},{"__typename":"FaqItemV2Record","question":"Why can’t I enroll my credit card?","answer":"Please check if the entered details are the same as what is indicated in your credit card. Also,  make sure you are enrolling the latest issued card by the bank."},{"__typename":"FaqItemV2Record","question":"How do I delete accounts and credit cards?","answer":"To delete your Metrobank accounts and credit card, follow these steps:\n\n1. Log in to https://onlinebanking.metrobank.com.ph\n2. Click “Deposits” or “Credit Cards” on the menu\n3. Select the account to be deleted\n4. Click “delete account” on the upper right of the screen \n5. Confirm the action by clicking “Yes”\n\nAfter following these steps, your Metrobank account or credit card will be deleted."},{"__typename":"FaqItemV2Record","question":"I noticed that not all shortcuts are available in some of my accounts. Why is this so?","answer":"The shortcuts you can see on each account depend on what transactions you are allowed to do using that account. (For example, you cannot order a checkbook using a savings account)."}]},{"__typename":"FaqTopicRecord","name":"Account Eligibility \u0026 Restrictions","displayName":"Account Eligibility \u0026 Restrictions","slug":"/account-eligibility-restrictions","items":[{"__typename":"FaqItemV2Record","question":"How can I delete my user profile on Metrobank Online?","answer":"To delete your profile, call our Contact Center at (02) 88-700-700 or our domestic toll-free number at 1-800-1888-5775.\n\nNote that if you delete your profile, you will not be able to access Metrobank Online and the Metrobank Mobile App.\n\nAfter deletion, you can create a new user profile. However, you will have to re-enroll your accounts, credit cards, billers, and contacts."},{"__typename":"FaqItemV2Record","question":"Why am I getting a prompt that says “Your account is ineligible” in Metrobank Online and the Metrobank App?","answer":"You’re seeing this error message because your account type has a product code and/or relationship code that is/are not allowed or has/have limited access to the features of Metrobank Online and the Metrobank App. \n\nIt is highly likely that your account type is non-individual in nature and is not for active or personal use. These account types include, but are not limited to, commercial accounts; third party access accounts; sole proprietorship accounts; and accounts that are inactive in status.\n\nIf you previously had access to your account in Metrobank Online and the Metrobank App, this means that there was a recent change in your account type, which is usually due to an update that was initiated by your branch of account.\n\nShould you have questions or concerns about your account, you may visit your branch of account or you may reach us via the Metrobank 24/7 Customer Hotline at (02) 88-700-700. For provincial areas, you may call 1-800-1888-5775 (toll-free)."},{"__typename":"FaqItemV2Record","question":"What are the accounts that are not allowed or have limited access to Metrobank Online and the Metrobank App?","answer":"Below are the account types that have **limited access** to the features of Metrobank Online and the Metrobank App. Accountholders of these accounts can only view their balance and transaction history. All transactions must be done via their branch of account:\n\n* In-Trust-For (ITF) Accounts\n* Joint-AND Accounts    \n\nOn the other hand, below are the account types that have **no access** to Metrobank Online and the Metrobank App. All transactions of these accounts must be done via the accountholder’s branch of account:\n\n* Cash Cards\n* Paycards\n* Commercial Accounts \n* Sole Proprietorship Accounts\n* Third-party Accounts (Agent, Debtor, Guarantee, Guardian, Power of Atty., Pay on Death, Survivorship, Trust, Gift, etc.)\n* Inactive Status Accounts\n\nAlternatively, business/commercial accounts may use the Metrobank Business Online Solutions to monitor and do transactions in their account. If these accounts were once enrolled in Metrobank’s retail online banking platforms, it will now display “Unable to retrieve balance” or “Your account is ineligible.” If you encounter this prompt, you’re encouraged to register in Metrobank Business Online. For assistance on how to enroll your commercial account in MBOS, kindly coordinate with your branch of account or Relationship Manager.\n\nLearn more about MBOS at https://www.metrobank.com.ph/business/solutions/mbos."},{"__typename":"FaqItemV2Record","question":"If I have an account type that is not allowed in Metrobank Online and the Metrobank App, can I still use my other enrolled accounts for online banking?","answer":"Yes, you can continue using Metrobank Online and the Metrobank App for your other eligible retail accounts."},{"__typename":"FaqItemV2Record","question":"How should I know if my account type is or has become ineligible in Metrobank Online and the Metrobank App?","answer":"If you have an ineligible account, you will receive a prompt notification in Metrobank Online and/or the Metrobank App indicating “Unable to retrieve balance” or “Your account is ineligible.” This notification means you cannot view your balance or do any transactions through Metrobank Online or the Metrobank App."},{"__typename":"FaqItemV2Record","question":"What should I do if my account has become ineligible in Metrobank Online and the Metrobank App?","answer":"Please reach out to your branch of account or call the Metrobank 24/7 Customer Hotline at (02) 88-700-700 to guide you on how you can access your account and do transactions. Meantime, please delete or unenroll your ineligible account/s in Metrobank Online and the Metrobank App."},{"__typename":"FaqItemV2Record","question":"Why can’t I access my JOINT ‘AND’ account in Metrobank Online and the Metrobank App?","answer":"Since your joint account is classified as **JOINT ‘AND’**, all your transactions must be authorized by both account holders/signatories. Hence, your transactions must be done over the counter to ensure the security of your account."},{"__typename":"FaqItemV2Record","question":"Can I still access my JOINT ‘OR’ account in my Metrobank Online and the Metrobank App?","answer":"Yes, you and your co-account holder may access your JOINT-OR account in your respective online banking profile. This means all transactions will reflect in both your Metrobank Online and Metrobank App accounts."},{"__typename":"FaqItemV2Record","question":"If my commercial account is not allowed to be enrolled on Metrobank Online and the Metrobank App, what platform should I use for my online financial transactions?","answer":"You can enroll your business/commercial account in Metrobank Business Online Solutions (MBOS) to complete your financial transactions. For assistance on how to enroll your commercial account in MBOS, kindly coordinate with your branch of account or Relationship Manager.\n\nLearn more about MBOS at https://www.metrobank.com.ph/business/solutions/mbos."},{"__typename":"FaqItemV2Record","question":"If I enroll my commercial account to Metrobank Business Online Solutions (MBOS), can I still send money to other banks?","answer":"Yes, you may still send money to other banks. Fund transfer transactions done in MBOS will be coursed through PESONet.\n\n_Note: PESONet is up to PHP 200,000 with daily cut-offs at 10 AM \u0026 3 PM (on a banking day except holidays)._"}]},{"__typename":"FaqTopicRecord","name":"Auto Debit Arrangement (e-ADA) - Metrobank Online","displayName":"Auto Debit Arrangement (e-ADA)","slug":"/auto-debit-arrangement-e-ada-metrobank-online","items":[{"__typename":"FaqItemV2Record","question":"Can I use e-ADA on Metrobank Online and app?","answer":"Yes, e-ADA is available on both Metrobank App and Online."},{"__typename":"FaqItemV2Record","question":"I filed a request to set up e-ADA for a biller, when will it be enrolled?","answer":"All enrollment requests submitted before 11 PM will be processed on the next banking day."},{"__typename":"FaqItemV2Record","question":"What type of account can I use as source?","answer":"You can only nominate an active savings or checking account as your source. "},{"__typename":"FaqItemV2Record","question":"What billers can I request for e-ADA?","answer":"You may click this link for the [list of billers](https://web-assets.metrobank.com.ph/1711528446-1711076899-metrobank-online_eada_billers_03222024.pdf) available for e-ADA."},{"__typename":"FaqItemV2Record","question":"Will I receive a notification upon successful enrollment?","answer":"Yes, you will receive an email/SMS notification of your e-ADA enrollment."},{"__typename":"FaqItemV2Record","question":"Will I receive a notification of my successful payment/auto-debit?","answer":"Will I receive a notification of my successful payment/auto-debit?"},{"__typename":"FaqItemV2Record","question":"Can I still cancel my e-ADA enrollment request?","answer":"Yes, but only if the request is still pending. You may go to your branch of account in case there’s a need to discontinue the enrolled e-ADA. "},{"__typename":"FaqItemV2Record","question":"Can I discontinue my e-ADA?","answer":"Yes. Please go to your branch of account and kindly accomplish Customer Disenrollment form to discontinue your e-ADA. \n\nDon’t worry, we are working on making this cancellation facility available online. "}]},{"__typename":"FaqTopicRecord","name":"Bills Payment","displayName":"Bills Payment","slug":"/bills-payment-metrobank-online","items":[{"__typename":"FaqItemV2Record","question":"How do I pay bills?","answer":"\u003cp\u003eTo learn how to pay your bills and see our billing partners, you may watch the how-to video at https://www.metrobank.com.ph/articles/bills You may also follow these steps:\u003c/p\u003e\n\u003cp\u003e1. Go to Pay Bills from any of these screens then tap \u003cem\u003ePay Bills\u003c/em\u003e button.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eDashboard\u003c/li\u003e\n\u003cli\u003eDeposit Account overview screen\u003c/li\u003e\n\u003cli\u003ePrepaid Account overview screen\u003c/li\u003e\n\u003cli\u003eCredit Card overview screen\u003c/li\u003e\n\u003cli\u003eEnrolled or All Billers\u003c/li\u003e\n\u003cli\u003eSide navigation menu\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e2. Select the source account by tapping the \u0026ldquo;From\u0026rdquo; field. The \u0026ldquo;From\u0026rdquo; will be pre-filled if you came from an account overview page or have only one account enrolled. Otherwise, you have to select the source account.\u003c/p\u003e\n\u003cp\u003e3. Type the amount. It can\u0026rsquo;t be higher than the available balance of the source account.\u003c/p\u003e\n\u003cp\u003e4. Choose the biller. Tap on the \u0026ldquo;To\u0026rdquo; field to select the type of biller.\u003c/p\u003e\n\u003cp\u003e5. Choose the schedule. You can tap either immediate or later depending on your preference.\u003c/p\u003e\n\u003cp\u003e6. Enter any notes you want to add (but this is optional), then tap \u0026ldquo;Next\u0026rdquo;\u003c/p\u003e\n\u003cp\u003e7. Review the details and tap \u0026ldquo;Confirm\u0026rdquo; if correct\u003c/p\u003e\n\u003cp\u003e8. Enter your Passcode and tap \u0026ldquo;Next\u0026rdquo;\u003c/p\u003e\n\u003cp\u003e9. A confirmation screen will appear confirming that your transaction is being processed. 10. Confirm the status of your transaction through email or SMS notifications. You may also check the Activity Log of the app by tapping the bell icon at the upper right corner of the Dashboard screen.\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eHow long does it take for bill payments to be posted or credited?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; Bill payments are posted in 2 to 3 banking days.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eHow do I enroll my billers?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; You may follow these steps:\u003c/details\u003e\u003cdetails\u003e1. Choose \u0026ldquo;Contacts\u0026rdquo; under the Side Navigation Menu \u003cspan style=\"font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;\"\u003e2. Under the \u0026rdquo;Billers\u0026rdquo; tab, tap \u0026ldquo;+Enroll\u0026rdquo; button 3. Select or type in the biller\u0026rsquo;s name in the search bar 4. Fill out biller details and tap \u0026ldquo;Next\u0026rdquo; 5. Review the biller\u0026rsquo;s details and tap \u0026ldquo;Confirm\u0026rdquo; 6. Enter your passcode and tap \u0026ldquo;Proceed\u0026rdquo; Visit https://www.metrobank.com.ph/articles/bills to see the list of billers.\u003c/span\u003e\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eCan I pay bills using my Metrobank credit card?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; Yes. All credit cards except ON Internet Mastercard and Metrobank Dollar Card can be used as a source of payment for bills payment.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eI made an error with the Biller Name and Account/Subscriber Number and proceeded with my transaction. Will I get a refund?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; No refunds are allowed once the transaction has been successfully processed and charged to your Metrobank credit card. You need to ensure that the details required to process bills payment and the amount are complete and accurate.\u003c/details\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cdetails\u003e\n\u003csummary\u003e\u003cb\u003eHow do I delete enrolled billers?\u003c/b\u003e\u003c/summary\u003e\n\u0026rarr; Follow these steps to delete your billers: 1. Choose \u0026ldquo;Contacts\u0026rdquo; under the Side Navigation Menu 2. Tap the enrolled biller you wish to delete 3. Tap \u0026ldquo;Delete Account\u0026rdquo; 4. A verification prompt will appear 5. Enter your passcode and tap \u0026ldquo;Proceed\u0026rdquo;\u003c/details\u003e"},{"__typename":"FaqItemV2Record","question":"Why is Metrobank putting a PHP250,000 daily account limit for bill payment transactions?","answer":"As part of Metrobank’s efforts to ensure the security of clients’ accounts, it has capped clients’ daily bill payment transaction to PHP250,000 starting 14 April 2023."},{"__typename":"FaqItemV2Record","question":"How does this affect my bill payment transactions via Metrobank Online and the Metrobank App?","answer":"The PHP250,000 daily bill payment transaction limit is applied per Metrobank account. This means, it is your total bills payment transaction limit via Metrobank Online and the Metrobank app."},{"__typename":"FaqItemV2Record","question":"Is it possible to increase my daily bill payment transaction limit?","answer":"Yes, we can change/ customize the daily bill payment transaction limit of your account. You may visit or call your branch of account to request for this change. Visit https://www.metrobank.com.ph/locator to get the contact details and address of your branch."},{"__typename":"FaqItemV2Record","question":"I cannot pay an amount with centavo values when using an iOS device.  What do I do?","answer":"You can do one of the following:\n\na. Put the cursor after the decimal point.\n\nb. Overtype the desired centavo amount.\n\nAlternatively, you can do the following:\n\na. Put the cursor on the space beside the last decimal.\n\nb. Use delete (x) button on the keypad to delete the default zeroes.\n\nc. Type- in desired decimal centavo amount."},{"__typename":"FaqItemV2Record","question":"How long will it take for my transactions to be posted or credited?","answer":"Posting of pay bills will take 2 to 3 banking days."},{"__typename":"FaqItemV2Record","question":"If my transaction is not yet reflected, what should I do?","answer":"Kindly call our Contact Center Hotline at (02) 88-700-700 or 1-800-1888-5775 (Domestic Toll-Free Hotline: 1-800-1888-5775) for assistance."},{"__typename":"FaqItemV2Record","question":"Can I use a peso account to pay a foreign currency biller and vice versa?","answer":"No, only the same currency account and biller bills payment is are allowed."}]},{"__typename":"FaqTopicRecord","name":"Cardless Withdrawal - Metrobank Online","displayName":"Cardless Withdrawal","slug":"/cardless-withdrawal-metrobank-online","items":[{"__typename":"FaqItemV2Record","question":"What is Cardless Withdrawal?","answer":"Metrobank Cardless Withdrawal lets you withdraw cash from any Metrobank or PSBank ATMs without your Metrobank ATM Card.\n\nFor the latest updates on Cardless Withdrawal fees and limits, please refer to https://metrobank.com.ph/rates-and-fees."},{"__typename":"FaqItemV2Record","question":"What are the eligible accounts for Cardless Withdrawal?","answer":"All accounts with issued cards, except for Paycard, can be used for Cardless Withdrawal as long as they are enrolled on Metrobank Online or the Metrobank App."},{"__typename":"FaqItemV2Record","question":"How much can I withdraw through Cardless Withdrawal?","answer":"For a single withdrawal, the minimum amount is PHP 100, while the maximum amount is PHP 10,000.  \n\nThe daily maximum withdrawal limit for Cardless Withdrawal is PHP 30,000.  \n\nNote that these limits apply to both cardless withdrawals and withdrawals using debit cards."},{"__typename":"FaqItemV2Record","question":"How do I make a Cardless Withdrawal?","answer":"\u003cp\u003eTo make a Cardless Withdrawal request, follow these steps:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eLog in to the Metrobank App\u003c/li\u003e\n\u003cli\u003eTap \u0026ldquo;Cardless Withdrawal\u0026rdquo; on the Dashboard\u003c/li\u003e\n\u003cli\u003eSelect a source account\u003c/li\u003e\n\u003cli\u003eEnter the amount you wish to withdraw\u003c/li\u003e\n\u003cli\u003eNominate a 4-digit number as your PIN 1, then tap \"Next\"\u003c/li\u003e\n\u003cli\u003eReview and confirm the details\u003c/li\u003e\n\u003cli\u003eEnter your passcode and SMS OTP\u003c/li\u003e\n\u003cli\u003eYou receive a 6-digit number. This is your PIN2.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cp\u003eAfter doing these steps, you can make your cardless withdrawal. Just do this:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eGo to any Metrobank or PSBank ATM\u003c/li\u003e\n\u003cli\u003ePress \"Enter\u0026rdquo;\u003c/li\u003e\n\u003cli\u003eKey in the PIN 1 followed by PIN 2, then the requested amount.\u003c/li\u003e\n\u003c/ol\u003e"},{"__typename":"FaqItemV2Record","question":"What is the difference between PIN1 and PIN2?","answer":"PIN 1 is the 4-digit number you create when making a Cardless Withdrawal request. Do not use repeating or consecutive numbers.\n\nPIN 2 is a 6-digit number generated by the app when you successfully make a Cardless Withdrawal request.\n\nWhen you go to a Metrobank or PSBank ATM to make your cardless withdrawal, key in PIN1 and PIN2."},{"__typename":"FaqItemV2Record","question":"How long is the validity of the Cardless Withdrawal request?","answer":"A Cardless Withdrawal request is valid for 30 minutes only."},{"__typename":"FaqItemV2Record","question":"Can I withdraw an amount lower than the amount requested?","answer":"No. Partial withdrawal is not allowed."},{"__typename":"FaqItemV2Record","question":"If I see an error message on the ATM for typing incorrect details, can I try again?","answer":"Yes. You have a maximum of three attempts. If you enter incorrect details three times, you will have to create a new request."}]},{"__typename":"FaqTopicRecord","name":"Checkbook - Metrobank Online","displayName":"Checkbook","slug":"/checkbook-metrobank-online","items":[{"__typename":"FaqItemV2Record","question":"How do I order a checkbook?","answer":"Please [click here](https://www.youtube.com/watch?v=lxlDDhqRGIo) to view the step by step guide to Order Checkbook"},{"__typename":"FaqItemV2Record","question":"Can I assign a savings account to be debited for an order checkbook transaction?","answer":"No.The transaction has to be are debited from a checking account."},{"__typename":"FaqItemV2Record","question":"Where can I get the checkbook/s?","answer":"Checkbooks can be picked-up from your branch of account."}]},{"__typename":"FaqTopicRecord","name":"Fund Transfers","displayName":"Fund Transfers","slug":"/fund-transfers","items":[{"__typename":"FaqItemV2Record","question":"How do I transfer funds to my own account?","answer":"Use the “Move Money” feature that allows you to transfer funds to your own enrolled accounts. Please [click here](https://www.youtube.com/watch?v=zNhG5LaKaFA) to view the step by step guide to Move Money."},{"__typename":"FaqItemV2Record","question":"Can I transfer funds if I only have one enrolled account?","answer":"You can transfer money to other Metrobank accounts or to accounts of other banks via ‘Send Money’ feature."},{"__typename":"FaqItemV2Record","question":"Can I transfer funds from a peso to a foreign currency account, and vice versa?","answer":"No, only funds can only be transferred to accounts of the same currency."},{"__typename":"FaqItemV2Record","question":"Can I transfer funds to other Metrobank accounts or to accounts of other banks?","answer":"You can do this through Send Money, where you can send money to other Metrobank accounts or to accounts of other banks via InstaPay and PESONet. Please [click here](https://www.youtube.com/watch?v=DWN3jFV8V-E) to view the step by step guide to Send Money."},{"__typename":"FaqItemV2Record","question":"How do I transfer funds via InstaPay and PESONet?","answer":"Go to \"Send Money\" menu and enter all the required details. The transaction will go through InstaPay or PESONet depending on the amount and recipient bank."},{"__typename":"FaqItemV2Record","question":"What if the recipient bank is participating in both InstaPay and PESONet, where will my transaction be routed?","answer":"Your transaction will automatically be routed to InstaPay if the amount is within the allowed limit of PHP 50,000.00 for immediate crediting and lower service fee."}]},{"__typename":"FaqTopicRecord","name":"QR Ph Transactions - Metrobank Online","displayName":"QR Ph Transactions","slug":"/qr-ph-transactions-metrobank-online","items":[{"__typename":"FaqItemV2Record","question":"How to transfer funds using Quick Response (QR) code?","answer":"Please [click here](https://www.youtube.com/watch?v=gV2c8Zx6juY) to view the step by step guide to transfer funds using QR code."},{"__typename":"FaqItemV2Record","question":"How to request funds using QR code?","answer":"Please [click here](https://www.youtube.com/watch?v=AUZ1oBu8x7E) to view the step by step guide to request funds using QR code."},{"__typename":"FaqItemV2Record","question":"For what transactions can I use the QR code?","answer":"The QR code can be used when requesting and transferring funds from a Metrobank account to another Metrobank account or to another bank account via InstaPay."},{"__typename":"FaqItemV2Record","question":"What is the difference between a regular fund transfer and a QR fund transfer transaction?","answer":"Both transactions are the same. The only difference is that you will no longer have to type in the recipient bank, account number, and amount (if provided) whenever you do a QR fund transfer transaction. These are automatically filled up in the transaction form."},{"__typename":"FaqItemV2Record","question":"Why can’t I scan a QR code?","answer":"Metrobank Online may not be allowed to access your camera. To allow access to your camera:\n\na. Launch Metrobank Online in your browser\n\nb. Tap the ellipsis (three dots) to find “Settings”\n\nc. From Settings, go to “Site settings”\n\nd. Tap “Camera”\n\ne. Toggle on Camera button"},{"__typename":"FaqItemV2Record","question":"Can I pay merchants via QR Ph using Metrobank Online?","answer":"Yes. Person-to-Merchant (P2M) payment via QR Ph is available on the Metrobank Online. For a better experience, we recommend using the Metrobank App. Learn more about the feature [here](/help#FAQ-Metrobank_App-What_is_QR_Ph)."},{"__typename":"FaqItemV2Record","question":"How can I pay merchants via QR Ph using Metrobank Online","answer":"\u003cp\u003eYou can make real-time payment to merchants via QR Ph with a Metrobank Online account. simply follow the steps below:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eSelect \u0026ldquo;QR Code\u0026rdquo; on the lower dashboard menu.\u003c/li\u003e\n\u003cli\u003eChoose \u0026ldquo;Scan or Upload QR Code\u0026rdquo; and select \u0026ldquo;Next\u0026rdquo; to proceed.\u003c/li\u003e\n\u003cli\u003eScan or upload the Merchant QR Ph Code to proceed.\u003c/li\u003e\n\u003cli\u003eFill out or validate the following information on the screen and click \u0026ldquo;Next\u0026rdquo;\n\u003col\u003e\n\u003cli\u003eAmount\u003c/li\u003e\n\u003cli\u003eMerchant Type\u003c/li\u003e\n\u003cli\u003eSource Account\u003c/li\u003e\n\u003c/ol\u003e\n\u003c/li\u003e\n\u003cli\u003eReview and confirm the transactions details then click \u0026ldquo;Continue.\u0026rdquo;\u003c/li\u003e\n\u003cli\u003eEnter your Metrobank Passcode and SMS One-Time Password (OTP) to authorize the transaction. After following these steps, you will receive confirmation that your transaction is successful.\u003c/li\u003e\n\u003c/ol\u003e"}]},{"__typename":"FaqTopicRecord","name":"SOA","displayName":"SOA","slug":"/soa","items":[{"__typename":"FaqItemV2Record","question":"What is the Generate Statement of Account (SOA) function?","answer":"It allows you to generate your UITF statement of account online."},{"__typename":"FaqItemV2Record","question":"What transactions are viewable in the SOA?","answer":"You can view all Invest (Add New and Top Up) and Redemption transactions during your preferred reference period when you generate your SOA."},{"__typename":"FaqItemV2Record","question":"Why can’t I view my transactions from previous months when I generate my SOA?","answer":"Only transactions during the reference month will be displayed after you generate your SOA. To view transactions from previous months, please select the date in the calendar."},{"__typename":"FaqItemV2Record","question":"Can I generate my SOA today?","answer":"No, your SOA includes your Net Asset Value Per Unit (NAVPU) of your UITFs. The NAVPU is only computed at the end of a banking day so you can only generate the SOA formfrom previous days."}]},{"__typename":"FaqTopicRecord","name":"Risk Profile - Metrobank Online","displayName":"Risk Profile","slug":"/risk-profile-metrobank-online","items":[{"__typename":"FaqItemV2Record","question":"What is Update Risk Profile function?","answer":"Update Risk Profile allows you to update your Risk Profile online anytime."},{"__typename":"FaqItemV2Record","question":"Can I invest if my risk profile is expired?","answer":"When you select Invest, you will get an on-screen prompt to update your risk profile. This will lead you to the Suitability Assessment Form (SAF)."}]},{"__typename":"FaqTopicRecord","name":"Prepaid Load","displayName":"Prepaid Load","slug":"/prepaid-load","items":[{"__typename":"FaqItemV2Record","question":"How to load a prepaid mobile number? ","answer":"Please [click here](https://www.youtube.com/watch?v=erTKF_sqIW4) to view the step by step guide to Load Prepaid."},{"__typename":"FaqItemV2Record","question":"Why didn’t I receive my prepaid load request?","answer":"Prepaid loading can be delayed due to technical issues withis dependent on your mobile network provider. You can expect your prepaid load request to be processed within 24 hours."},{"__typename":"FaqItemV2Record","question":"Can I load a postpaid mobile number?","answer":"No. Only prepaid mobile numbers can be loaded using this service."}]},{"__typename":"FaqTopicRecord","name":"Scheduled Transactions - Metrobank Online","displayName":"Scheduled Transactions","slug":"/scheduled-transactions-metrobank-online","items":[{"__typename":"FaqItemV2Record","question":"What transactions can be scheduled? ","answer":"The following transactions can be scheduled depending on your preferred date and time:\n\n* Move Money\n* Send Money\n* Pay Bills\n* Load Prepaid\n* Order Checkbook\n* Tax Payment"},{"__typename":"FaqItemV2Record","question":"What are scheduled transactions and how can they benefit a customer?","answer":"Scheduled transactions can be executed automatically on a given date. This guarantees timely processing of payments and minimizes payment delays.\n"},{"__typename":"FaqItemV2Record","question":"How to schedule a transaction?","answer":"Go to ‘Pay Bills'. Select the transaction you want to schedule, input details and on the schedule field choose \"Later\" tab and select frequency (daily, weekly, monthly and quarterly) and the desired date of a transaction. Scheduling can also be done for one-time scheduled transactions. \n\n\n* Standard time of processing starts at 8:30am up to 9:30am. \n* Transactions that can be scheduled are as follows: Send Money, Pay Bills \u0026 Send Load (for MBO only).\n"},{"__typename":"FaqItemV2Record","question":"Can I schedule transactions if my time zone is not the same as Philippine Standard Time (PST)?","answer":"Yes, but note that the scheduled transaction will follow PST (GMT+08:00)."},{"__typename":"FaqItemV2Record","question":"Where can I see scheduled transactions?","answer":"Scheduled transactions are listed under “Pending Transactions” for Metrobank Online, sorted based on your latest transactions."},{"__typename":"FaqItemV2Record","question":"How can I cancel my scheduled transactions?","answer":"To cancel scheduled transactions:\nGo to “Pending Transactions” for Metrobank Online in the Dashboard\n* Select a scheduled transaction\n* Click “Cancel Pending Transaction” and choose “Yes”\n* Enter passcode / AppKey"},{"__typename":"FaqItemV2Record","question":"Can I edit details of scheduled transactions? ","answer":"No. Instead, you can cancel the scheduled transaction and create a new one."},{"__typename":"FaqItemV2Record","question":"In case of unscheduled system downtime/maintenance, will my scheduled transaction still push through?","answer":"No. You will receive a failed notification. "},{"__typename":"FaqItemV2Record","question":"How would I know if my scheduled transactions pushed through? ","answer":"On the day of your schedule, you will receive notifications on the status of your scheduled transactions.\n"},{"__typename":"FaqItemV2Record","question":"Can I save details of my frequent transactions?","answer":"Yes, you can save the details of another third-party account, biller, or load product with the Add Contacts feature."}]},{"__typename":"FaqTopicRecord","name":"Tax Payments (BIR/eFPS)","displayName":"Tax Payments (BIR/eFPS)","slug":"/tax-payments-bir-efps","items":[{"__typename":"FaqItemV2Record","question":"What is Metrobank Online tax payment facility?","answer":"Metrobank Online Tax Direct Facility is a web-based solution that interfaces with the Electronic Filing and Payment System (EFPS) of the Bureau of Internal Revenue (BIR) and with the Bank. This enables you to conveniently pay taxes online through Metrobank Online.\n\nClick [here](/articles/online-tax-payment) for the step-by-step guide on how to pay your BIR taxes."},{"__typename":"FaqItemV2Record","question":"How can I use the tax payment facility to pay for my income tax?","answer":"To pay for your income tax, follow these steps or visit this [page](/articles/online-tax-payment) to learn more:\n\n1. File your tax return at Bureau of Internal Revenue Electronic Filing and Payment System (BIR EFPS) website at https://efps.bir.gov.ph.\n2. Upon login, enter the required details on the tax payment page, then select “015000 – MBTC (HEAD OFFICE)” under the Transacting Bank (Authorized Agent Bank) field.\n3. Click on the ‘Submit’ button to proceed with your tax payment.\n4. Choose ‘Personal Account’ and click ‘Continue’ to proceed to the direct link page.\n5. Enter your Metrobank Online username and password.\n6. After logging in, the tax payment transaction details screen will be displayed. Select your source account and click Next.\n7. Confirm your tax payment details, then click Continue.\n8. Authenticate your transaction via AppKey. For non-AppKey users:\n\t* Enter your Passcode for transactions below PHP 500,000\n\t* Enter your Passcode and SMS OTP for transactions above PHP 500,000\n9. Once authentication is successful, you will see a transaction acknowledgment.\n\nThat’s it! You’ve successfully paid your BIR taxes."},{"__typename":"FaqItemV2Record","question":"Can I use my credit card to pay income tax?","answer":"No, you may only use your Metrobank savings or checking account as your source of funds to pay for your transaction."},{"__typename":"FaqItemV2Record","question":"My account is a sole proprietor business. Can I use Metrobank Online for this transaction?","answer":"Sole proprietors or business owners, can settle their tax dues via Metrobank Business Online Solutions or MBOS, an online platform that allows business owners to process payments, collections, and do banking transactions.\n\nLearn more about MBOS here: https://www.metrobank.com.ph/business/solutions/mbos\n"},{"__typename":"FaqItemV2Record","question":"How secure is the transmission of my data to the website for online tax payment?","answer":"All transmissions of data done through Metrobank Online are encrypted and secured."},{"__typename":"FaqItemV2Record","question":"What will happen if I terminate my tax payment transaction in the middle of the session?","answer":"You will need to log in again to BIR eFPS and input all the necessary information to proceed with your eFiling. We encourage you to finish your eFiling and ePayment in one session to manage your time."},{"__typename":"FaqItemV2Record","question":"How will I know if my BIR tax payment is successful?","answer":"You will receive an SMS and email notification showing that your BIR tax payment transaction is successful."},{"__typename":"FaqItemV2Record","question":"What should I do if I encounter any errors during the BIR tax payment?","answer":"If you encounter any errors during your tax payment, kindly contact our Contact Center Hotline at (02) 88-700-700."},{"__typename":"FaqItemV2Record","question":"How does Metrobank Online tax payment benefit me as a taxpayer?","answer":"With Metrobank Online, you no longer need to visit the bank branch or any BIR office to complete your tax payment transaction. You can do your tax payment at your own convenience."},{"__typename":"FaqItemV2Record","question":"Can I view my BIR tax payment transaction history?","answer":"Yes, BIR tax payment information is available online. You can view your past tax payment transactions, including those made immediately and those scheduled for future dates, for the past 30 days.\n\nBy clicking on the Transaction Reference Number, you can view the details of the BIR Tax Payment transaction."},{"__typename":"FaqItemV2Record","question":"What are the steps in enrolling to eFPS?","answer":"1. Access BIR website at www.bir.gov.ph, using your internet browser.  \n2. Click on eFPS icon to go the eFPS home page.  \n3. From the eFPS Login page, click on 'Enroll to eFPS' link.  \n4. The eFPS enrollment form appears. Complete the required fields on the   Enrollment Form page. Then, click on the \"Submit\" button. \n\t\neFPS will inform you thru a pop-up message that your enrollment has been successfully received. Then you have to wait for an email message from BIR informing you of the status of your enrollment whether approved or disapproved. Once your account has been activated, you are ready to e-file and e-pay, and perform all the functions within eFPS.  \n\t\nIt is important for you to remember your username and password, as well as the correct answer to the challenge question. Keep your username, password and challenge question answer to yourself. Do not make it easy to guess, nor write it down"},{"__typename":"FaqItemV2Record","question":"How soon will my online tax payment reflect in my BIR eFPS account?","answer":"Your online tax payment will be posted on the next banking day."},{"__typename":"FaqItemV2Record","question":"Can I use my Metrobank Online account to pay for multiple different taxpayers' accounts through the BIR eFPS system? ","answer":"Yes, you can use one Metrobank Online account to pay for multiple different accounts under BIR eFPS. Same e-Filing and e-Payment process will apply."}]},{"__typename":"FaqTopicRecord","name":"Instapay \u0026 PESOnet transactions","displayName":"Instapay \u0026 PESOnet transactions","slug":"/instapay-pesonet-transactions","items":[{"__typename":"FaqItemV2Record","question":"What is InstaPay?","answer":"InstaPay is an electronic fund transfer (EFT) service that enables a customer of a participating Bangko Sentral ng Pilipinas (BSP)-supervised financial institution (BSFI) to transfer Philippine Peso funds from their account to another BSFI account. BSP-supervised financial institutions are banks or electronic money issuers.\n\nInstaPay is part of the National Retail Payment Systems (NRPS) initiative of BSP that seeks to promote electronic payments."},{"__typename":"FaqItemV2Record","question":"InstaPay can be used for:","answer":"* Person-to-person payments\n* Domestic remittances\n* Payment to service providers, such as plumbers, electricians, carpenters, etc.\n* Face-to-face, non-cash payments for goods (for example: sari-sari stores, bazaars, garage sales, etc.)\n* Donation to charitable institutions\n* Top-ups on digital wallets like GCash or PayMaya"},{"__typename":"FaqItemV2Record","question":"Is InstaPay secure?","answer":"Yes, InstaPay is secure and protected by the same level of security standards applied to the interbank funds transfer service currently provided by BSP-supervised financial institutions."},{"__typename":"FaqItemV2Record","question":"How does InstaPay work?","answer":"The sender’s financial institution will debit your account and instantly transfer the funds to your recipient’s financial institution. The funds will instantly be available in the recipient’s account."},{"__typename":"FaqItemV2Record","question":"When I send money via InstaPay and when will my beneficiary receive it?","answer":"Crediting funds is in real-time on InstaPay so your beneficiary will receive it right away."},{"__typename":"FaqItemV2Record","question":"How can I send money via InstaPay?","answer":"You must be enrolled in Metrobank Online and the Metrobank Mobile App to send money via InstaPay.\n\nUsing your Metrobank Online:\n\na. Select \"Send Money\" tab\u003cbr/\u003e\nb. Choose the destination bank.\u003cbr/\u003e\nc. Fill-out the recipient details, amount, and source account.\u003cbr/\u003e\n\nFor the Metrobank Mobile App:\n\na. Choose \"Transfer to Other Bank\" from the menu.\u003cbr/\u003e\nb. Select \"InstaPay\".\u003cbr/\u003e\nc. Click Transfer button under \"One-Time Transfer.\"\u003cbr/\u003e\nd. Fill-out the recipient details, choose source account, and input amount.\u003cbr/\u003e \ne. To authenticate your transactions, a one-time password (OTP) will be sent to your registered mobile number."},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eIs there a transaction fee charged to the sender?\u003c/p\u003e","answer":"\u003cp\u003eNo. There is no transaction or transfer fee charged to the sender when sending money via InstaPay.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"Will the recipient be charged a transaction fee?","answer":"No, the beneficiary will not be charged a transaction fee. The full amount sent will be credited to your beneficiary."},{"__typename":"FaqItemV2Record","question":"How much can I send via InstaPay?","answer":"\u003cp\u003eYou can send up to PHP 100,000 per day, with a maximum of PHP 50,000 per transaction.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"How much funds can my beneficiary receive via InstaPay?","answer":"Receiving limits may differ with every receiving institution. To ensure your transaction is successfully credited, check with your beneficiary’s transaction limits from their receiving institution."},{"__typename":"FaqItemV2Record","question":"What will happen if I type the wrong account number of my beneficiary?","answer":"InstaPay transactions are validated through account numbers. In cases that you type a wrong account number, the transaction will not be pushed through if the account number is wrong. We encourage you to obtain the correct account information from your payee to make the transaction hassle-free."},{"__typename":"FaqItemV2Record","question":"Does the sending institution and receiving institution check the beneficiary's name against the account number?","answer":"Both sending and receiving institutions validate the account number only. InstaPay participants are not required to match their name against an account number. This is in accordance with BSP Circular No. 980, which states that account number matching will work for domestic account-to-account electronic payments or to implement a transaction. To have a hassle-free transaction, obtain the correct account information from your payee."},{"__typename":"FaqItemV2Record","question":"Can I cancel an InstaPay transaction?","answer":"InstaPay transactions are debited from your account and credited to your beneficiary real-time. Once your account has been debited, the transaction made via Metrobank Online or the Metrobank Mobile App is considered final and can no longer be cancelled."},{"__typename":"FaqItemV2Record","question":"My app’s screen says  “Transaction Successful”  but my beneficiary did not receive the funds, how can my beneficiary claim the money I sent?","answer":"In the case you were notified that the transaction was successful and yet the funds have not been credited to the beneficiary account, there might be a connection issue with BancNet or the receiving institution. Your beneficiary shall contact the receiving institution to know when the funds will be credited."},{"__typename":"FaqItemV2Record","question":"What is PESONet?","answer":"PESONet is a fund transfer service available through the Send Money feature of Metrobank Online, where you can transfer money to other bank accounts.\n\nPESONet lets customers of participating banks, e-money issuers or mobile money operators to transfer funds in Philippine peso to customers of other participating banks, e-money issuers or mobile money operators in the Philippines."},{"__typename":"FaqItemV2Record","question":"Who are the participating financial institutions?","answer":"You can check the links below for the list of participating financial institutions:\n* [Bills Payment Partners](/articles/bills)    \n* [List of Financial Technology (FT) Partners](/articles/list-of-ft-partners)"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhat are the fees and limits for InstaPay?\u003c/p\u003e","answer":"\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eTransaction Fee:\u003c/strong\u003e None (FREE)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMaximum Daily Transfer Limit: \u003c/strong\u003ePHP 100,000\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMaximum Amount per Transaction:\u003c/strong\u003e PHP 50,000\u003c/li\u003e\n\u003c/ul\u003e"},{"__typename":"FaqItemV2Record","question":"What are the fees and limits for PESONet?","answer":"\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eTransaction Fee:\u003c/strong\u003e None (FREE)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMaximum Daily Transfer Limit: \u003c/strong\u003ePHP 200,000\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMaximum Amount per Transaction:\u003c/strong\u003e Up to the remaining available daily transfer limit (within PHP 200,000)\u003c/li\u003e\n\u003c/ul\u003e"},{"__typename":"FaqItemV2Record","question":"How long does it take to transfer funds via PESONet?","answer":"\u003cp\u003eFunds can be made available to the recipient account/s within the day if transaction was made before 3:00 PM. If the transaction was made after 3:00 PM, it is processed and credited on the next banking day.\u003c/p\u003e"}]},{"__typename":"FaqTopicRecord","name":"eSOA - Metrobank Online","displayName":"eSOA","slug":"/esoa-metrobank-online","items":[{"__typename":"FaqItemV2Record","question":"Can I download my Statement of Account (eSOA) through Metrobank Online?","answer":"\u003cp\u003eTransactions for the past 90 days can be downloaded through Metrobank Online. Simply follow these steps to download your eSOA: 1. On the menu, go to Deposits, then choose the deposit account for which you want to download the statement.\u003c/p\u003e\n\u003cdiv class=\"mbd-row\"\u003e\n\u003cdiv class=\"mbd-column\"\u003e\u003cimg src=\"https://web-assets.metrobank.com.ph/1726824935-mbo-casa-esoa-download-step-01.png\" /\u003e\u003c/div\u003e\n\u003c/div\u003e\n\u003cp\u003e2. Under the Transaction History, click \u0026ldquo;Download Statement.\u0026rdquo;\u003c/p\u003e\n\u003cdiv class=\"mbd-row\"\u003e\n\u003cdiv class=\"mbd-column\"\u003e\u003cimg src=\"https://web-assets.metrobank.com.ph/1726824935-mbo-casa-esoa-download-step-02.png\" /\u003e\u003c/div\u003e\n\u003c/div\u003e\n\u003cp\u003e3. You can customize your statement of account by choosing the date range, type of transaction, and/or amount range\u003c/p\u003e\n\u003cdiv class=\"mbd-row\"\u003e\n\u003cdiv class=\"mbd-column\"\u003e\u003cimg src=\"https://web-assets.metrobank.com.ph/1726824981-mbo-casa-esoa-download-step-03.png\" /\u003e\u003c/div\u003e\n\u003c/div\u003e\n\u003cp\u003e4. Choose a file type: PDF or CSV\u003c/p\u003e\n\u003cdiv class=\"mbd-row\"\u003e\n\u003cdiv class=\"mbd-column\"\u003e\u003cimg src=\"https://web-assets.metrobank.com.ph/1726824981-mbo-casa-esoa-download-step-04.png\" /\u003e\u003c/div\u003e\n\u003c/div\u003e\n\u003cp\u003e5. Your eSOA will be downloaded.\u003c/p\u003e\n\u003cdiv class=\"mbd-row\"\u003e\n\u003cdiv class=\"mbd-column\"\u003e\u003cimg src=\"https://web-assets.metrobank.com.ph/1726824981-mbo-casa-esoa-download-step-05.png\" /\u003e\u003c/div\u003e\n\u003c/div\u003e\n\u003cp\u003eThe file is password-protected. You can open your eSOA by entering your password in this format: your last name in lowercase letters combined with the last four digits of your account (e.g. manipol6933). Refer to the sample \u003ca href=\"https://web-assets.metrobank.com.ph/1726825403-1725351251-sample_esoa08302024_155437.pdf\"\u003eeSOA\u003c/a\u003e for reference. You can use the sample password above to view the file. The option to download the eSOA is also available on the Metrobank App.\u003c/p\u003e"},{"__typename":"FaqItemV2Record","question":"For which type of account can I download my eSOA?","answer":"You can download eSOA for your savings and checking account."},{"__typename":"FaqItemV2Record","question":"What type of transactions can I see in the eSOA?","answer":"Transactions made across all platforms (Metrobank Online, Metrobank App, Over-the-Counter, ATMs, CAMs, e-Commerce, POS) will show in the eSOA since it gets information from the deposit system."},{"__typename":"FaqItemV2Record","question":"What is the date reflected on the eSOA?","answer":"The eSOA shows the date when the transaction was made. However, descriptive transaction details will reflect on the following day. "},{"__typename":"FaqItemV2Record","question":" I would like to download my eSOA, but no transaction history is shown on Metrobank Online. What should I do?","answer":"Only transactions from the past 90 days are available on Metrobank Online. If you have made transactions within this period but cannot find them, please check if the date range, type of transaction, and amount range are filtered properly.\n\nIf you still cannot find your previous transactions, refresh your browser or kindly contact our Contact Center hotline at (02) 88-700-700 or Domestic toll-free number: 1-800-1888-5775\n\nIf you would like to view or get a copy of your SOA with transactions older than 90 days, please contact or visit your branch of account to request."}]},{"__typename":"FaqTopicRecord","name":"Credit Card Features - Metrobank Online","displayName":"Credit Card Features","slug":"/credit-card-features-metrobank-online","items":[{"__typename":"FaqItemV2Record","question":"Can I temporarily lock my Metrobank Credit Card using Metrobank Online?","answer":"No. Temporary locking and unlocking is only available on the Metrobank App. Download the app now to enjoy this feature."}]}]},{"__typename":"FaqSubcategoryRecord","name":"Metrobank App","slug":"/metrobank-app","topics":[{"__typename":"FaqTopicRecord","name":"Getting Started","displayName":"Getting Started","slug":"/getting-started","items":[{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhere can I download the Metrobank App?\u003c/p\u003e","answer":"\u003cstyle\u003e\n.dl-button img {\n\twidth: 100%;\n \ttext-align: center;\n  margin-left: auto;\n\tmargin-right: auto;\n\tdisplay: inline-block;\n}\n\n.mboa-download {\n\twidth: 100%;\n\tdisplay: flex;\n\tjustify-content: center;\n\talign-items: center;\n\t}\n\u003c/style\u003e\n\n\u003cp\u003eYou can download the NEW Metrobank App from any of the following:\u003c/p\u003e\n\n\u003cdiv class=\"mboa-download\"\u003e\n\u003cdiv class=\"dl-button\"\u003e\u003ca href=\"https://play.google.com/store/apps/details?id=ph.com.metrobank.mcc.mbonline\"\u003e\u003cimg src=\"https://web-assets.metrobank.com.ph/1606384322-googleplay-button-scl-4v2-with-space.png\"\u003e\u003c/a\u003e\u003c/div\u003e\n\u003cdiv class=\"dl-button\"\u003e\u003ca href=\"https://apps.apple.com/ph/app/metrobank-app/id1536081176\"\u003e\u003cimg src=\"https://web-assets.metrobank.com.ph/1622090351-apple-store-logo.png\"\u003e\u003c/a\u003e\u003c/div\u003e\n\u003cdiv class=\"dl-button\"\u003e\u003ca href=\"https://appgallery.huawei.com/app/C103071673\"\u003e\u003cimg src=\"https://web-assets.metrobank.com.ph/1622092674-huawei-button-scl-4-with-space.png\"\u003e\u003c/a\u003e\u003c/div\u003e\n\u003c/div\u003e"},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eHow do I log in or sign up on the Metrobank App?\u003c/p\u003e","answer":"\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eHow do I get started?\u003c/b\u003e\u003c/summary\u003e\n\n→ If you have an existing Metrobank Online or Metrobank Mobile Banking App account, just log in directly on the NEW Metrobank App using your existing username and password. No need to sign up. Watch our video guides at https://www.metrobank.com.ph/articles/mb-app-how-to\n\nIf it’s your first time using an online banking channel of Metrobank, you will need to sign up. You may refer to the guide at: https://www.metrobank.com.ph/articles/mb-app-signup-troubleshoot\n\u003c/details\u003e\n\u003cbr\u003e\n\u003cdetails\u003e\n\t\u003csummary\u003e\u003cb\u003eWhat do I need to sign up on the NEW Metrobank App?\u003c/b\u003e\u003c/summary\u003e\n\n→ You can sign up to the NEW Metrobank App by enrolling any of these account types:\n\n* An individual Metrobank deposit account (either Philippine peso or Foreign Currency) including:  \n\to  Savings account (either debit or passbook)  \n\to   Checking account  \n* A Metrobank credit card\n* A Metrobank prepaid card \n* A YAZZ prepaid card\n\nJust make sure that your account is active. If you have two or more eligible Metrobank account types, you may sign up with one account first, then enroll the other/s as another account after signing up.  \n\t\nNote that you will also need the following:  \n\t\n* An active mobile number (prepaid or postpaid) with any local provider, so you can receive SMS one-time passwords (OTPs) or verification codes.\n* An active email address, so you can receive email OTPs or verification codes, notifications, transaction alerts, maintenance schedules, and service updates.\n* Active data or internet connection on your mobile device\n\nFor joint “OR” accounts, both primary and supplementary account holder can enroll on the app. For joint “AND” accounts, the app can be used for viewing purposes only.\n\u003c/details\u003e"},{"__typename":"FaqItemV2Record","question":"Can I sign up without a deposit account?","answer":"You can sign up to the NEW Metrobank App without a Metrobank deposit account, provided that you have one of these:\n\n*  A Metrobank credit card\n*  A Metrobank prepaid card\n*  A YAZZ prepaid card"},{"__typename":"FaqItemV2Record","question":"What is the difference between Metrobank Online and the Metrobank App?​","answer":"Metrobank Online is our platform which allows you to do your banking on an internet browser on any device, whether it’s a personal computer, a laptop, a tablet, or a mobile phone. \n\nThe Metrobank App is our banking app that can be used on your mobile device so you can monitor and access your funds and transactions anytime, anywhere. Its smart features let you get more from your credit, debit, and prepaid cards. It also has a new, customizable look and feel."},{"__typename":"FaqItemV2Record","question":"\u003cp\u003eWhat features are on the Metrobank App?\u003c/p\u003e","answer":"\u003cp\u003e\u003cstrong\u003eEnrolled Contacts\u003c/strong\u003e \u0026ndash; Enroll your usual payees as \u0026ldquo;Enrolled Contacts\u0026rdquo; for faster transactions.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eScheduled Transactions\u003c/strong\u003e \u0026ndash; Schedule your regular transactions, such as bill payments and fund transfers*.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSend Money\u003c/strong\u003e \u0026ndash; Transact with payees easily by sending money.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eInstaPay \u0026ndash; InstaPay \u0026ndash; Send up to PHP 100,000 per day, with a maximum of PHP 50,000 per transaction, to non-Metrobank accounts. Your payee receives the money instantly.\u003c/li\u003e\n\u003cli\u003ePESONet* \u0026ndash; Transfer up to PHP 200,000 a day to non-Metrobank accounts. The cut-off is at 3 PM, Monday to Friday. \u003cspan style=\"font-size: small;\"\u003e\u003cem\u003e*This feature is exclusive to current and savings accounts only.\u003c/em\u003e\u003c/span\u003e\u003c/li\u003e\n\u003cli\u003e\u003cspan style=\"font-size: small;\"\u003e\u003cem\u003e\u003c/em\u003e\u003c/span\u003eSend and receive funds via QR\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eGet more from your Metrobank Credit Card\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePay Bills \u0026ndash; Use your credit card to pay bills for selected billers\u003c/li\u003e\n\u003cli\u003eSend Money via PayNow \u0026ndash; Transfer funds using your credit card as the source\u003c/li\u003e\n\u003cli\u003eCredit Car
