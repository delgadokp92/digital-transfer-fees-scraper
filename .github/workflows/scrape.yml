name: Scrape transfer fees

on:
  schedule:
    - cron: "0 20 * * *"  # 04:00 Asia/Manila (UTC+8) daily
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m scraper.run_all

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add storage/fees.db storage/snapshots
          git diff --cached --quiet || git commit -m "Scheduled fee scrape $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
