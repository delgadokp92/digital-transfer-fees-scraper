name: Scrape transfer fees

on:
  schedule:
    - cron: "0 1 * * *"   # 09:00 Asia/Manila (UTC+8)
    - cron: "0 10 * * *"  # 18:00 Asia/Manila (UTC+8)
    - cron: "0 16 * * *"  # 00:00 Asia/Manila (UTC+8)
  workflow_dispatch: {}

# storage/fees.db is a binary SQLite file -- if two runs (a scheduled tick
# overlapping a manual workflow_dispatch, or two ticks if GitHub's cron
# scheduler runs late/drifts) each check it out, add their own new rows, and
# try to commit+push independently, git cannot auto-merge the binary content
# and the losing run's rebase fails outright with nobody there to resolve it
# -- confirmed live: an entire manual full-registry run's results (new
# snapshots, new fee_snapshots rows) were silently lost this way. Queuing
# (not cancelling) runs on the same concurrency group means a second run
# always starts its checkout AFTER the first one's commit has landed, so
# there's nothing to conflict -- the actual fix, not just a retry loop.
concurrency:
  group: scrape-transfer-fees
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # GitHub's hard 6h job ceiling kills the runner with NO grace period --
    # steps after it (including the commit below) never run, so anything
    # scraped that run is lost even though storage/fees.db commits each row
    # to disk as it goes (storage/db.py commits after every insert). A
    # self-configured timeout well under that ceiling cancels the job through
    # the *normal* cancellation path instead, which does give `if: always()`
    # steps a grace window to still run -- confirmed via GitHub Actions docs.
    # Combined with the news-source browser-fallback fix (scraper/news.py),
    # this should no longer be needed as a hard stop, but it's cheap insurance
    # against any future slow entity/outlet from silently eating the whole run.
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-browser.txt

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m scraper.run_all

      - name: Commit updated data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add storage/fees.db storage/snapshots
          git diff --cached --quiet && exit 0
          git commit -m "Scheduled fee scrape $(date -u +'%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "Push rejected, rebasing onto latest origin/master (attempt $i)..."
            git fetch origin master
            if git rebase origin/master; then
              continue
            fi
            # storage/fees.db is binary -- git can't auto-merge two
            # independently-modified copies of it (this is the scenario
            # `concurrency:` above exists to prevent; this is only a safety
            # net for the rare case it still happens, e.g. a manual local
            # push landing mid-run). Keep THIS run's freshly-scraped version
            # rather than aborting and losing the whole run's results --
            # "theirs" here means the commit being replayed (ours locally),
            # since rebase swaps the usual merge meaning of ours/theirs.
            echo "Binary conflict on fees.db/snapshots -- keeping this run's freshly-scraped version"
            git checkout --theirs -- storage/fees.db storage/snapshots 2>/dev/null || true
            git add storage/fees.db storage/snapshots
            git rebase --continue || exit 1
          done
          exit 1
