# Registry of BSP-supervised InstaPay/PESONet participants to monitor.
#
# Roster source: BSP's published "List of BSP Supervised Electronic Money
# Issuers (EMIs)" -- https://www.bsp.gov.ph/Lists/Directories/Attachments/7/emi.pdf
# (updated periodically by BSP; re-check that URL for additions/removals; also
# see the general bank/FI directory at
# https://www.bsp.gov.ph/SitePages/FinancialStability/DirBanksFIList.aspx).
# This is a DIRECTORY of who BSP supervises, not a fee report, so using it to
# build the roster doesn't conflict with the "never source fees from BSP
# reports" rule -- that rule is about fee figures specifically, not institution
# names. Re-parsing that PDF into this file is currently a manual step; see the
# open question in README about automating it.
#
# instapay/pesonet flags below are left as an ASSUMPTION (true for
# EMIs/settlement banks) since this BSP list doesn't itself state per-network
# participation -- PPMI (Philippine Payments Management, Inc.) would be the
# authoritative source for that if/when we have it. Treat these flags as
# provisional, not confirmed.
#
# website.base_url is only filled in for institutions whose real domain is
# confidently known -- guessing domains for smaller/less well-known entities
# risks pointing the scraper at the wrong site entirely, so those are left
# without a website block (marked "website: TBD") until a real URL is supplied.
# A domain being listed here is NOT a guarantee the crawler can actually reach
# useful fee content on it -- see the per-entity notes: some real bank sites
# block simple HTTP scraping (bot/WAF protection) or render fee info via
# JavaScript the crawler's plain HTTP fetch can't see, so several are known to
# come back flagged in scraper_health rather than with real data. Also: even
# where the crawler DOES find a number, it's a naive keyword+regex extraction
# on marketing/FAQ copy -- treat every scraped amount as provisional until
# checked against its archived snapshot in the dashboard's audit trail, not as
# ground truth just because it parsed successfully.
#
# Fields:
#   name        - display name of the institution
#   category    - bank | e-wallet | emi (free text, for grouping in the UI later)
#   instapay/pesonet - whether the entity participates in each network (see caveat above)
#   facebook.page_url  - public Facebook page to check for fee announcements (best-effort, see README)
#
# website.mode: "fixed" -- exact fee page URL + CSS selectors (see README).
# website.mode: "crawl" -- only base_url is known; the contextual crawler (sitemap-first,
#   then link-following) finds and parses whichever page looks most fee-related.
#   website.base_url, website.keywords, website.max_pages, website.max_depth -- see README.

